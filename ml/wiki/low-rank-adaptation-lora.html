:100%; border-collapse:collapse; margin:12px 0;\"\u003e\n\u003ctbody\u003e\u003ctr style=\"background:#4a5568; color:#fff;\"\u003e\u003cth style=\"padding:6px; text-align:left;\"\u003eProperty\u003c/th\u003e\u003cth style=\"padding:6px; text-align:left;\"\u003eValue\u003c/th\u003e\u003c/tr\u003e\n\u003ctr style=\"border-bottom:1px solid #ccc;\"\u003e\u003ctd style=\"padding:6px;\"\u003eTrainable params (rank \\( r=16 \\), 7B model)\u003c/td\u003e\u003ctd style=\"padding:6px;\"\u003e~10-40M (0.1-0.5% of total)\u003c/td\u003e\u003c/tr\u003e\n\u003ctr style=\"border-bottom:1px solid #ccc;\"\u003e\u003ctd style=\"padding:6px;\"\u003eCommon target modules\u003c/td\u003e\u003ctd style=\"padding:6px;\"\u003e\\( W_Q, W_K, W_V, W_O \\) projections; sometimes MLP layers\u003c/td\u003e\u003c/tr\u003e\n\u003ctr style=\"border-bottom:1px solid #ccc;\"\u003e\u003ctd style=\"padding:6px;\"\u003eTypical rank \\( r \\)\u003c/td\u003e\u003ctd style=\"padding:6px;\"\u003e4-64 (higher for more complex tasks)\u003c/td\u003e\u003c/tr\u003e\n\u003ctr style=\"border-bottom:1px solid #ccc;\"\u003e\u003ctd style=\"padding:6px;\"\u003eInference overhead\u003c/td\u003e\u003ctd style=\"padding:6px;\"\u003eZero — merge \\( W' = W + \\frac{\\alpha}{r}BA \\) after training\u003c/td\u003e\u003c/tr\u003e\n\u003ctr\u003e\u003ctd style=\"padding:6px;\"\u003eMemory saving vs. full fine-tune\u003c/td\u003e\u003ctd style=\"padding:6px;\"\u003e~100x (only adapter params need optimizer states)\u003c/td\u003e\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e"])</script><script>self.__next_f.push([1,"7:[\"$\",\"main\",null,{\"className\":\"wiki-main wiki-main--wide\",\"children\":[\"$\",\"$9\",null,{\"fallback\":[\"$\",\"div\",null,{\"style\":{\"padding\":\"2rem\",\"textAlign\":\"center\"},\"children\":\"Loading topic...\"}],\"children\":[\"$\",\"$L12\",null,{\"topic\":{\"slug\":\"low-rank-adaptation-lora\",\"title\":\"Low-Rank Adaptation (LoRA)\",\"summary\":\"LoRA fine-tunes a model by expressing each weight update as a low-rank product \\\\( \\\\Delta W = BA \\\\) while keeping the original weight matrix frozen. This dramatically cuts trainable parameters and optimizer state, which is why LoRA became the default PEFT method for LLMs.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"parameter-efficient-fine-tuning-peft\",\"singular-value-decomposition-svd\"],\"related\":[\"lora-adapter\",\"qlora-quantized-lora\",\"full-fine-tune\",\"model-merging\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\",\"papers\":[{\"citation\":\"2021 · Edward Hu, Yelong Shen, Phillip Wallis, Zeyuan Allen-Zhu, Yuanzhi Li, Shean Wang, Lu Wang, Weizhu Chen · LoRA: Low-Rank Adaptation of Large Language Models\",\"url\":\"https://arxiv.org/abs/2106.09685\"}],\"sections\":[{\"kind\":\"prose\",\"body\":\"\u003cp\u003eA parameter-efficient fine-tuning method that represents weight updates as a low-rank decomposition. Instead of updating a full weight matrix \\\\( W \\\\in \\\\mathbb{R}^{d \\\\times k} \\\\), LoRA learns two small matrices \\\\( A \\\\in \\\\mathbb{R}^{d \\\\times r} \\\\) and \\\\( B \\\\in \\\\mathbb{R}^{r \\\\times k} \\\\) with rank \\\\( r \\\\ll \\\\min(d, k) \\\\), so the update \\\\( \\\\Delta W = BA \\\\) has only \\\\( r(d + k) \\\\) trainable parameters instead of \\\\( dk \\\\).\u003c/p\u003e\u003cp\u003eThe forward pass with LoRA becomes:\u003c/p\u003e\\n\\n\\\\[ h = Wx + \\\\Delta Wx = Wx + BAx \\\\]\\n\\n\u003cp\u003ewhere \\\\( W \\\\) is frozen and only \\\\( A, B \\\\) receive gradients. A scaling factor \\\\( \\\\alpha / r \\\\) controls the magnitude of the update:\u003c/p\u003e\\n\\n\\\\[ h = Wx + \\\\frac{\\\\alpha}{r} BAx \\\\]\\n\\n\u003cp\u003ewhere \\\\( \\\\alpha \\\\) is a constant hyperparameter (typically set equal to \\\\( r \\\\) or \\\\( 2r \\\\)). This scaling ensures the update magnitude remains stable as \\\\( r \\\\) varies.\u003c/p\u003e\"},{\"kind\":\"prose\",\"body\":\"$13\"},{\"kind\":\"prose\",\"body\":\"\u003cp\u003e\u003cb\u003eTheoretical motivation.\u003c/b\u003e Aghajanyan et al. (2021) showed that fine-tuning updates have a low intrinsic dimensionality — the weight changes during adaptation occupy a low-rank subspace even when all parameters are updated. LoRA directly parameterises this subspace, making the low-rank constraint explicit rather than emergent.\u003c/p\u003e\"},{\"kind\":\"prose\",\"title\":\"Extensions\",\"body\":\"\u003cul\u003e\\n\u003cli\u003e\u003cb\u003eQLoRA\u003c/b\u003e (Dettmers et al., 2023): Combines LoRA with 4-bit NormalFloat quantisation of the frozen base model, enabling fine-tuning of 65B models on a single 48 GB GPU\u003c/li\u003e\\n\u003cli\u003e\u003cb\u003eDoRA\u003c/b\u003e (Liu et al., 2024): Decomposes the update into magnitude and direction components, improving performance\u003c/li\u003e\\n\u003cli\u003e\u003cb\u003eLoRA+\u003c/b\u003e: Sets different learning rates for \\\\( A \\\\) and \\\\( B \\\\) matrices\u003c/li\u003e\\n\u003c/ul\u003e\"},{\"kind\":\"prose\",\"title\":\"Derivations\",\"body\":\"\u003cdetails\u003e\\n    \u003csummary\u003eDerivations\u003c/summary\u003e\\n    \u003cp\u003e\u003cb\u003eParameter count.\u003c/b\u003e For a weight matrix \\\\( W \\\\in \\\\mathbb{R}^{d \\\\times k} \\\\), full fine-tuning requires \\\\( dk \\\\) trainable parameters. LoRA replaces this with \\\\( A \\\\in \\\\mathbb{R}^{d \\\\times r} \\\\) and \\\\( B \\\\in \\\\mathbb{R}^{r \\\\times k} \\\\), giving \\\\( r(d + k) \\\\) parameters. The compression ratio is:\u003c/p\u003e\\n\\n\\\\[ \\\\frac{r(d + k)}{dk} = r\\\\left(\\\\frac{1}{k} + \\\\frac{1}{d}\\\\right) \\\\]\\n\\n\u003cp\u003eFor a typical attention projection with \\\\( d = k = 4096 \\\\) and \\\\( r = 16 \\\\): ratio \\\\( = 16 \\\\times 2/4096 = 0.0078 \\\\), i.e., 0.78% of the full parameter count.\u003c/p\u003e\\n  \u003c/details\u003e\"}],\"cards\":[{\"noteId\":\"low-rank-adaptation-lora-q1\",\"prompt\":\"A 7B model's attention projections have $d=k=4096$. At rank $r=16$, what fraction of the full-fine-tune parameter count does LoRA train on each projection?\",\"answer\":\"$$r(d+k)/(dk) = 16(4096+4096)/4096^2 = 16 \\\\cdot 2/4096 \\\\approx 0.78\\\\%$. Roughly 0.01× the full-fine-tune parameters per projection.\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"]},{\"noteId\":\"low-rank-adaptation-lora-q2\",\"prompt\":\"Why is $B$ initialized to zero while $A$ is initialized with a random Gaussian, rather than initializing both at random?\",\"answer\":\"With $B = 0$, the initial $\\\\Delta W = BA = 0$, so training starts from exactly the pretrained weights — no random jolt to the model's behavior. Random $A$ breaks symmetry so the low-rank subspace can be learned; making both random would perturb the pretrained model at step 0.\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"]},{\"noteId\":\"low-rank-adaptation-lora-q3\",\"prompt\":\"Explain why a scaling factor of $\\\\alpha/r$ (rather than a fixed 1) is applied to $BAx$, framed in terms of what happens as you change $r$.\",\"answer\":\"As $r$ grows, the product $BAx$ naturally has larger magnitude. The $\\\\alpha/r$ factor normalizes this so the effective step size on the update is roughly constant across choices of $r$, letting you re-tune rank without re-tuning the learning rate.\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"]},{\"noteId\":\"low-rank-adaptation-lora-q4\",\"prompt\":\"LoRA is motivated by the \\\"low intrinsic dimension\\\" result. State that finding in one sentence and say why it makes low-rank updates a principled choice rather than just a heuristic.\",\"answer\":\"Aghajanyan et al. (2021) showed that successful fine-tunes lie in a subspace of very low dimensionality even when all parameters are free to move. LoRA explicitly parameterizes that subspace, so it isn't removing expressivity that the full fine-tune actually used.\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"]},{\"noteId\":\"low-rank-adaptation-lora-q5\",\"prompt\":\"Why does LoRA have zero *inference*-time overhead once training is complete, even though training adds extra parameters?\",\"answer\":\"After training, compute $W' = W + (\\\\alpha/r)BA$ once and replace $W$ with $W'$. The inference forward pass is a single matmul, identical in cost to the original base model; $A$ and $B$ can be discarded.\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"]}]},\"manifest\":{\"version\":1,\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\",\"topics\":[{\"slug\":\"linear-regression-basics\",\"title\":\"Linear regression basics\",\"summary\":\"Linear regression fits an affine function to predict a continuous target by minimizing squared residuals between predictions and observed values. In matrix form, ordinary least squares projects the target vector onto the column space of the design matrix, yielding the normal equations in the full-rank case.\",\"domain\":\"supervised\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"linear-models\",\"least-squares\",\"optimization\",\"path-core-foundations\"],\"prerequisites\":[\"linear-function\",\"loss-function\"],\"related\":[\"linear-regression\",\"ordinary-least-squares-ols-closed-form-solution\",\"mean-squared-error-mse\",\"bias-variance-tradeoff\",\"l2-regularization-ridge-weight-decay\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bias-variance-tradeoff\",\"title\":\"Bias–variance tradeoff\",\"summary\":\"The bias-variance tradeoff describes how expected squared test error decomposes into bias, variance, and irreducible noise. Increasing model flexibility usually lowers bias but raises variance, so the best generalization often lies between underfitting and overfitting.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"generalization\",\"error-decomposition\",\"model-complexity\",\"path-core-foundations\"],\"prerequisites\":[\"generalization\",\"prediction-error\"],\"related\":[\"overfitting\",\"underfitting\",\"regularization\",\"linear-regression-basics\",\"pac-learning-probably-approximately-correct\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multimodal-secure-alignment\",\"title\":\"Multimodal Secure Alignment\",\"summary\":\"Multimodal secure alignment is the problem of making a model's safety behavior consistent across text, images, audio, and mixed-modal inputs. It matters because a model can reconstruct harmful intent across modalities or through images that evade text-only filters, so defenses must align the fused system rather than just one input channel.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"attention\",\"ml\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"vision-language-model-vlm\",\"safety-alignment\"],\"related\":[\"adversarial-prompting\",\"constitutional-ai\",\"what-is-a-jailbreak-in-the-context-of-llms\",\"red-teaming\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"layer-dropping-and-progressive-pruning-trimllm\",\"title\":\"Layer Dropping and Progressive Pruning (TrimLLM)\",\"summary\":\"Layer dropping and progressive pruning reduce inference cost by cutting transformer depth rather than shrinking every matrix. TrimLLM does this progressively for domain-specialized LLMs, exploiting the empirical fact that not all layers are equally important in a target domain and aiming to retain in-domain accuracy while reducing latency.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"structured-pruning\",\"transformer\"],\"related\":[\"pruning\",\"inference-optimization\",\"knowledge-distillation\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"test-time-compute-scaling\",\"title\":\"Test-Time Compute Scaling\",\"summary\":\"Test-time compute scaling improves a model by spending extra computation at inference time, for example through search, verification, reranking, or adaptive refinement, instead of only scaling pretraining. It is most useful on prompts where the base model already has some chance of success, because additional compute can then amplify that success more efficiently than a much larger one-shot model.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"large-language-model-llm\",\"chain-of-thought\"],\"related\":[\"self-consistency\",\"tree-of-thought\",\"scaling-laws\",\"chain-of-thought-monitorability\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gpt-3-and-few-shot-in-context-learning\",\"title\":\"GPT-3 \u0026 Few-Shot In-Context Learning\",\"summary\":\"GPT-3 showed that a 175B-parameter autoregressive Transformer can perform many tasks from natural-language instructions and a few demonstrations in the prompt, without gradient updates or task-specific fine-tuning. That result made in-context learning a central paradigm and showed that scale alone could unlock strong few-shot behavior.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"gpt-2-and-zero-shot-task-transfer\",\"few-shot-prompting\"],\"related\":[\"in-context-learning\",\"scaling-laws\",\"large-language-model-llm\",\"the-bitter-lesson\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"the-bitter-lesson\",\"title\":\"The Bitter Lesson\",\"summary\":\"The Bitter Lesson is Sutton's argument that, over the long run, general methods that scale with compute and data outperform systems built around hand-crafted domain knowledge. It is a historical pattern claim, not a theorem, and its force comes from repeated examples in search, game playing, vision, and language.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"scaling-laws\",\"deep-learning\",\"foundation-model\",\"gpt-3-and-few-shot-in-context-learning\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"constitutional-classifiers-plus-plus\",\"title\":\"Constitutional Classifiers++\",\"summary\":\"Constitutional Classifiers++ is a production-oriented jailbreak defense that uses context-aware classifiers and a cascade of cheap and expensive checks to block harmful exchanges efficiently. The system is designed to keep refusal rates and serving cost low while still catching universal jailbreaks that earlier, response-only filters missed.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"product\",\"safety\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"constitutional-ai\"],\"related\":[\"chain-of-thought-monitorability\",\"safety-alignment\",\"red-teaming\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"continuous-thought-machines\",\"title\":\"Continuous Thought Machines (CTM)\",\"summary\":\"Continuous Thought Machines are models that make neural timing and synchronization part of the representation, instead of treating layers as purely instantaneous mappings. They use neuron-level temporal processing and support adaptive compute, so the same model can stop early on easy inputs or continue reasoning on harder ones.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"neural-odes\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"recurrent-neural-network-rnn\",\"neural-network\"],\"related\":[\"neural-turing-machine-ntm\",\"test-time-compute-scaling\",\"kolmogorov-arnold-networks\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mechanistic-oocr-steering-vectors\",\"title\":\"Mechanistic OOCR Steering Vectors\",\"summary\":\"Mechanistic OOCR steering vectors are a proposed explanation for some out-of-context reasoning results: fine-tuning can act like adding an approximately constant steering direction to the residual stream, rather than learning a deeply conditional new algorithm. That helps explain why a tuned behavior can generalize far beyond the fine-tuning data and why injecting or subtracting the vector can often reproduce or remove it.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"interpretability\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"steering-vectors\",\"mechanistic-interpretability\"],\"related\":[\"activation-patching\",\"critical-representation-fine-tuning\",\"safety-alignment\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"critical-representation-fine-tuning\",\"title\":\"Critical Representation Fine-Tuning (CRFT)\",\"summary\":\"Critical Representation Fine-Tuning (CRFT) is a PEFT method that improves reasoning by editing a small set of causally important hidden states instead of updating model weights broadly. It identifies critical representations through information-flow analysis and learns low-rank interventions on those states while keeping the base model frozen.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"peft\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"low-rank-adaptation-lora\",\"mechanistic-interpretability\"],\"related\":[\"steering-vectors\",\"parameter-efficient-fine-tuning-peft\",\"lora-adapter\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"chain-of-thought-monitorability\",\"title\":\"Chain-of-Thought Monitorability\",\"summary\":\"Chain-of-thought monitorability is the safety claim that when a model needs explicit reasoning to complete a task, its written chain of thought can be monitored for harmful intent or deception. The key property is monitorability rather than perfect faithfulness: hiding the reasoning tends to become harder when the reasoning itself is load-bearing for success.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"product\",\"safety\",\"theory\",\"wiki-import\",\"path-scaling-advanced\"],\"prerequisites\":[\"chain-of-thought\",\"safety-alignment\"],\"related\":[\"constitutional-ai\",\"constitutional-classifiers-plus-plus\",\"self-critique\",\"react-reason-act\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"zero-zero-redundancy-optimizer\",\"title\":\"ZeRO (Zero Redundancy Optimizer)\",\"summary\":\"ZeRO (Zero Redundancy Optimizer) partitions optimizer states, gradients, and eventually parameters across data-parallel workers so each GPU no longer stores a full copy of the training state. This cuts memory dramatically and makes very large-model training feasible without requiring full model-parallel architectures.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"data-parallelism\",\"adam-optimizer\"],\"related\":[\"fully-sharded-data-parallel-fsdp\",\"mixed-precision-training\",\"memory-optimization-ml-training\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"t5-text-to-text-transfer-transformer\",\"title\":\"T5 (Text-to-Text Transfer Transformer)\",\"summary\":\"T5 is an encoder-decoder Transformer that casts every NLP task as text-to-text generation, so translation, question answering, classification, and even some regression tasks share the same model and loss. Its span-corruption pretraining on C4 made it a landmark demonstration of unified transfer learning.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"encoder-decoder-architecture\",\"pretraining\"],\"related\":[\"masked-language-model\",\"transfer-learning\",\"sequence-to-sequence-seq2seq\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gpt-2-and-zero-shot-task-transfer\",\"title\":\"GPT-2 \u0026 Zero-Shot Task Transfer\",\"summary\":\"GPT-2 showed that a large decoder-only language model can perform many tasks in the zero-shot setting by continuing a task-formatted prompt rather than being fine-tuned. The key result was that scale and diverse web text made translation, summarization, and question answering look like ordinary next-token prediction.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"gpt-1-generative-pre-training\"],\"related\":[\"gpt-3-and-few-shot-in-context-learning\",\"zero-shot-learning\",\"scaling-laws\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gpt-1-generative-pre-training\",\"title\":\"GPT-1 (Generative Pre-Training)\",\"summary\":\"GPT-1 established the pretrain-then-fine-tune recipe for Transformers: first train a decoder on unlabeled text with a language-model objective, then adapt it to downstream tasks with minimal task-specific layers. This showed that generic generative pretraining could beat many bespoke NLP architectures on downstream benchmarks.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"decoder-only-transformer\",\"pretraining\"],\"related\":[\"gpt-2-and-zero-shot-task-transfer\",\"masked-language-model\",\"elmo-embeddings-from-language-models\",\"large-language-model-llm\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"elmo-embeddings-from-language-models\",\"title\":\"ELMo (Embeddings from Language Models)\",\"summary\":\"ELMo produces contextualized word embeddings by taking a learned task-specific combination of hidden states from a pretrained bidirectional LSTM language model. Unlike static embeddings such as word2vec or GloVe, it gives the same word different vectors in different sentence contexts.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"word-embedding\",\"long-short-term-memory-lstm\"],\"related\":[\"word2vec\",\"gpt-1-generative-pre-training\",\"masked-language-model\",\"representation-learning\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sparsely-gated-mixture-of-experts-moe\",\"title\":\"Sparsely-Gated Mixture of Experts (MoE)\",\"summary\":\"A sparsely-gated Mixture of Experts (MoE) layer routes each token to only a small subset of expert networks, so model capacity can grow much faster than compute per token. Its central challenge is routing and load balancing: without auxiliary losses, a few experts tend to monopolize traffic.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"multilayer-perceptron-mlp\",\"neural-network\"],\"related\":[\"sparse-mixture-of-experts-moe-layer\",\"switch-transformer\",\"router-network\",\"expert-network\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"key-value-memory-networks\",\"title\":\"Key-Value Memory Networks\",\"summary\":\"Key-Value Memory Networks store each memory slot as a key for retrieval and a separate value for the returned content. This decouples matching from payload and is a direct conceptual precursor to modern query-key-value attention.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"attention\",\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"attention-mechanism\"],\"related\":[\"query-key-value-qkv\",\"self-attention\",\"luong-attention-global-and-local\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"luong-attention-global-and-local\",\"title\":\"Luong Attention (Global and Local)\",\"summary\":\"Luong attention is a sequence-to-sequence attention mechanism that scores decoder states against encoder states using multiplicative forms such as dot or bilinear attention. It distinguishes global attention over all source positions from local attention over a predicted window, helping make neural machine translation more scalable.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"attention\",\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"attention-mechanism\",\"sequence-to-sequence-seq2seq\"],\"related\":[\"self-attention\",\"key-value-memory-networks\",\"multi-head-attention\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"glove-word-embeddings\",\"title\":\"GloVe Word Embeddings\",\"summary\":\"GloVe learns word embeddings by fitting vector dot products to the log of global word-word co-occurrence counts. Because it is trained on ratios of co-occurrence statistics, linear relations such as king minus man plus woman approximately equals queen often emerge in the embedding space.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"word-embedding\",\"document-term-matrix\"],\"related\":[\"word2vec\",\"tf-idf\",\"semantic-similarity\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-turing-machine-ntm\",\"title\":\"Neural Turing Machine (NTM)\",\"summary\":\"A Neural Turing Machine augments a neural controller with a differentiable external memory that it can read from and write to using soft attention over memory locations. It was an early attempt to learn algorithm-like behavior such as copying and sorting while remaining trainable end to end.\",\"domain\":\"history\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"attention\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"recurrent-neural-network-rnn\",\"attention-mechanism\"],\"related\":[\"key-value-memory-networks\",\"long-short-term-memory-lstm\",\"luong-attention-global-and-local\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"xavier-glorot-initialization\",\"title\":\"Xavier/Glorot Initialization\",\"summary\":\"Xavier or Glorot initialization chooses weight variance from fan-in and fan-out so activations and gradients stay roughly stable across deep layers. It is well suited to symmetric activations such as tanh, while ReLU networks usually prefer He initialization.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"weight-initialization\"],\"related\":[\"he-initialization-kaiming-initialization\",\"sigmoid\",\"tanh\",\"what-is-the-vanishing-gradient-problem\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"imagenet-dataset\",\"title\":\"ImageNet Dataset\",\"summary\":\"ImageNet is a large, hierarchically labeled image dataset whose 1000-class ILSVRC benchmark became the defining testbed for modern computer vision. AlexNet's 2012 win on ImageNet triggered the deep learning shift by showing that GPU-trained CNNs could dramatically beat hand-engineered pipelines.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"cv\",\"foundational\",\"landmark\",\"ml\",\"product\",\"wiki-import\",\"path-vision\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"convolutional-neural-network-cnn\",\"vision-encoder\",\"deep-learning\",\"transfer-learning\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-probabilistic-language-model\",\"title\":\"Neural Probabilistic Language Model\",\"summary\":\"The Neural Probabilistic Language Model replaced count-based n-grams with learned word embeddings and a neural network that predicts the next word from a continuous representation of context. Its core contribution was showing that distributed representations let language models generalize to unseen but similar word sequences.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"language-model\",\"neural-network\"],\"related\":[\"word2vec\",\"count-based-language-model\",\"the-curse-of-dimensionality\",\"word-embedding\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"weight-tying\",\"title\":\"Weight Tying\",\"summary\":\"Weight tying uses the same matrix for token embeddings and the output softmax projection, typically by setting the output weights to the transpose of the input embedding table. This cuts parameters and often improves language modeling by forcing input and output token representations to share geometry.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"embedding-layer\",\"output-layer\"],\"related\":[\"softmax-head\",\"embedding-vector\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-checkpointing-activation-recomputation\",\"title\":\"Gradient Checkpointing (Activation Recomputation)\",\"summary\":\"Gradient checkpointing saves memory by storing only selected activations during the forward pass and recomputing the missing ones during backpropagation. The trade-off is extra compute for lower peak memory, which is why it is widely used to train large Transformers that would otherwise not fit in GPU memory.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"backpropagation\",\"forward-pass\"],\"related\":[\"mixed-precision-training\",\"pagedattention\",\"fully-sharded-data-parallel-fsdp\",\"memory-optimization-ml-training\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pagedattention\",\"title\":\"PagedAttention\",\"summary\":\"PagedAttention stores the KV cache in fixed-size non-contiguous blocks, like virtual-memory pages, instead of requiring one contiguous allocation per sequence. This largely removes fragmentation, enables prompt-prefix sharing, and is a key reason vLLM can serve many more concurrent requests.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"attention\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"key-value-kv-caching\"],\"related\":[\"flashattention\",\"speculative-decoding\",\"inference-optimization\",\"memory-optimization-ml-training\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"speculative-decoding\",\"title\":\"Speculative Decoding\",\"summary\":\"Speculative decoding speeds up autoregressive generation by letting a small draft model propose several tokens and then having the large target model verify them in parallel. With the rejection-sampling correction from the original algorithm, the output distribution remains exactly the same as sampling from the target model alone.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"autoregressive-language-model\",\"sampling-in-language-models\"],\"related\":[\"greedy-decoding\",\"key-value-kv-caching\",\"inference-optimization\",\"pagedattention\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"kl-divergence-penalty-in-rlhf\",\"title\":\"KL-Divergence Penalty in RLHF\",\"summary\":\"The KL-divergence penalty in RLHF keeps the learned policy close to a reference model while it maximizes reward, usually by subtracting a term proportional to the KL divergence from the objective. This stabilizes training and reduces reward hacking by discouraging the policy from drifting too far from fluent supervised behavior.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"reinforcement-learning-from-human-feedback-rlhf\",\"cross-entropy\"],\"related\":[\"proximal-policy-optimization-ppo\",\"reward-model\",\"shannon-entropy\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"proximal-policy-optimization-ppo\",\"title\":\"Proximal Policy Optimization (PPO)\",\"summary\":\"Proximal Policy Optimization is a policy-gradient algorithm that improves a policy while clipping how far action probabilities can move from the previous policy in one update. In RLHF it is usually paired with a KL penalty so the model gains reward without drifting too far from a reference model.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-scaling-advanced\"],\"prerequisites\":[\"policy-reinforcement-learning\",\"gradient-descent\"],\"related\":[\"kl-divergence-penalty-in-rlhf\",\"reinforcement-learning-from-human-feedback-rlhf\",\"grpo-group-relative-policy-optimization\",\"q-learning\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"next-token-prediction-objective-causal-language-modeling\",\"title\":\"Next-Token Prediction Objective (Causal Language Modeling)\",\"summary\":\"Next-token prediction trains a causal language model to assign high probability to each token given all previous tokens. Maximizing this likelihood over large text corpora teaches the model syntax, facts, and reusable patterns that later support prompting and generation.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"causal-language-model\",\"negative-log-likelihood\"],\"related\":[\"autoregressive-language-model\",\"pretraining\",\"cross-entropy\",\"language-model\"],\"updatedAt\":\"2026-04-14\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adamw-optimizer\",\"title\":\"AdamW Optimizer\",\"summary\":\"AdamW is Adam with decoupled weight decay: parameter shrinkage is applied directly to the weights instead of being mixed into the adaptive gradient update. This preserves the intended regularization effect and is why AdamW became the default optimizer for many Transformer models.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"adam-optimizer\"],\"related\":[\"weight-decay\",\"l2-regularization-ridge-weight-decay\",\"learning-rate-schedule\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"swiglu-activation-function\",\"title\":\"SwiGLU Activation Function\",\"summary\":\"SwiGLU is a gated feed-forward activation that multiplies one linear projection by a Swish-activated gate from another projection. It usually performs better than standard ReLU-style MLP blocks at similar scale, which is why many modern LLMs use it in their feed-forward layers.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"activation-function\"],\"related\":[\"relu\",\"position-wise-mlp\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pre-norm-vs-post-norm-architecture\",\"title\":\"Pre-Norm vs. Post-Norm Architecture\",\"summary\":\"Pre-Norm vs. Post-Norm is the choice of whether layer normalization is applied before or after each residual sublayer in a Transformer block. Pre-Norm usually trains deeper stacks more stably by preserving gradient flow through the residual path, while Post-Norm was the original design and can be less stable at scale.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"layer-normalization\",\"residual-connection-skip-connection\"],\"related\":[\"root-mean-square-normalization-rmsnorm\",\"transformer\",\"what-is-the-vanishing-gradient-problem\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"byte-pair-encoding-bpe\",\"title\":\"Byte Pair Encoding (BPE)\",\"summary\":\"Byte Pair Encoding is a subword tokenization method that repeatedly merges the most frequent adjacent symbols in a corpus. It builds a vocabulary between characters and whole words, which handles rare words better than word-level tokenization while keeping sequence lengths manageable.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"subword-tokenization\"],\"related\":[\"vocabulary-size\",\"zipf-s-law\",\"tokenization-pipeline\",\"corpus\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"softmax-temperature\",\"title\":\"Softmax Temperature\",\"summary\":\"Softmax temperature rescales logits before softmax to control randomness in the output distribution. Lower temperature makes probabilities sharper and decoding more deterministic, while higher temperature flattens the distribution and increases diversity.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"softmax\"],\"related\":[\"temperature-scaling\",\"top-k-sampling\",\"top-p-sampling-nucleus-sampling\",\"logit\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"key-value-kv-caching\",\"title\":\"Key-Value (KV) Caching\",\"summary\":\"Key-value caching stores the attention keys and values from earlier tokens during autoregressive decoding so they do not need to be recomputed at every step. It speeds up generation dramatically, but the cache grows with sequence length and turns inference into a memory-management problem.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"attention\",\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"self-attention\",\"autoregressive-language-model\"],\"related\":[\"pagedattention\",\"speculative-decoding\",\"grouped-query-attention-gqa\",\"inference-optimization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"rotary-positional-embedding-rope\",\"title\":\"Rotary Positional Embedding (RoPE)\",\"summary\":\"Rotary Positional Embedding encodes position by rotating query and key vectors with token-index-dependent angles before attention is computed. Because the resulting dot products depend on relative offsets, RoPE gives Transformers a simple and widely used way to represent order.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"attention\",\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"positional-encoding\",\"relative-position-encoding\"],\"related\":[\"sinusoidal-positional-encoding\",\"absolute-position-encoding\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sinusoidal-positional-encoding\",\"title\":\"Sinusoidal Positional Encoding\",\"summary\":\"Sinusoidal positional encoding adds fixed sine and cosine patterns of different frequencies to token embeddings so the model can infer token order. The encoding is deterministic and smooth across positions, which let the original Transformer represent position without learning a separate table.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"positional-encoding\"],\"related\":[\"rotary-positional-embedding-rope\",\"absolute-position-encoding\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"causal-masked-self-attention\",\"title\":\"Causal (Masked) Self-Attention\",\"summary\":\"Causal masked self-attention is self-attention with a mask that prevents each position from attending to future tokens. Applying the mask before softmax enforces autoregressive order, so the model can predict the next token without seeing the answer in advance.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"self-attention\",\"causal-mask\"],\"related\":[\"attention-mask\",\"autoregressive-language-model\",\"decoder-only-transformer\",\"masked-attention-score\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"message-passing-in-graph-neural-networks-gnns\",\"title\":\"Message Passing in Graph Neural Networks (GNNs)\",\"summary\":\"Message passing in graph neural networks updates each node by aggregating transformed information from its neighbors and combining it with the node's current representation. After K rounds, a node's state depends on its K-hop neighborhood, which is why message passing is the core operation of most spatial GNNs.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"attention-mechanism\",\"embedding-vector\",\"representation-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"triplet-margin-loss\",\"title\":\"Triplet Margin Loss\",\"summary\":\"Triplet margin loss trains an embedding space so an anchor is closer to a positive example than to a negative example by at least a fixed margin. It is a standard metric-learning objective because it directly enforces relative similarity rather than predicting class labels.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\"],\"prerequisites\":[\"loss-function\",\"cosine-similarity\"],\"related\":[\"clip-contrastive-language-image-pre-training\",\"embedding-space\",\"semantic-similarity\",\"k-means-objective-function-inertia\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"lagrange-multipliers\",\"title\":\"Lagrange Multipliers\",\"summary\":\"Lagrange multipliers solve constrained optimization problems by introducing auxiliary variables that encode the constraints inside a single objective. At a constrained optimum, the gradient of the objective lies in the span of the constraint gradients, which is why the method is central to duality and SVM derivations.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"convex-function\"],\"related\":[\"support-vector-machine-svm\",\"kernel-methods\",\"ordinary-least-squares-ols-closed-form-solution\",\"the-fisher-information-matrix\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ordinary-least-squares-ols-closed-form-solution\",\"title\":\"Ordinary Least Squares (OLS) Closed-Form Solution\",\"summary\":\"The OLS closed-form solution is the exact least-squares answer computed directly from the design matrix rather than by iterative optimization. In the full-rank case it solves the normal equations, and geometrically it projects the target vector onto the column space of the features.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"linear-regression\",\"linear-function\"],\"related\":[\"linear-regression-basics\",\"mean-squared-error-mse\",\"singular-value-decomposition-svd\",\"maximum-likelihood-estimate-mle\",\"l2-regularization-ridge-weight-decay\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pac-learning-probably-approximately-correct\",\"title\":\"PAC Learning (Probably Approximately Correct)\",\"summary\":\"PAC learning formalizes what it means for a hypothesis class to be learnable: with enough samples, an algorithm should return a hypothesis whose error is small with high probability. It is foundational because sample complexity and model capacity can then be expressed as rigorous guarantees instead of heuristics.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"generalization\",\"probability-distribution\"],\"related\":[\"bias-variance-tradeoff\",\"supervised-learning\",\"confidence-interval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"receiver-operating-characteristic-roc-and-auc\",\"title\":\"Receiver Operating Characteristic (ROC) \u0026 AUC\",\"summary\":\"The ROC curve plots true positive rate against false positive rate as a binary classifier's threshold changes, and AUC summarizes that curve into a single number. AUC also has a ranking interpretation: it is the probability that a random positive example scores above a random negative one.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"binary-classification\"],\"related\":[\"precision\",\"recall\",\"accuracy\",\"f1-score\",\"calibration\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hidden-markov-model-hmm\",\"title\":\"Hidden Markov Model (HMM)\",\"summary\":\"A Hidden Markov Model is a sequence model with an unobserved Markov chain of states and an observed emission distribution from each state. It became a standard model for speech, tagging, and other structured sequence tasks because dynamic programming can efficiently infer likely states and sequence probabilities.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"the-markov-property\",\"conditional-probability\"],\"related\":[\"recurrent-neural-network-rnn\",\"language-model\",\"count-based-language-model\",\"sequence-to-sequence-seq2seq\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"convex-function\",\"title\":\"Convex Function\",\"summary\":\"A convex function is one whose value on any line segment lies below the chord connecting that segment's endpoints. This matters in optimization because convex problems have no spurious local minima: every local minimum is global.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"gradient-descent\",\"lagrange-multipliers\",\"stochastic-gradient-descent-sgd\",\"ordinary-least-squares-ols-closed-form-solution\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"shannon-entropy\",\"title\":\"Shannon Entropy\",\"summary\":\"Shannon entropy measures the expected surprisal of a random variable and quantifies how uncertain its outcomes are. It is the basic information-theoretic quantity from which cross-entropy, KL divergence, mutual information, and many ML loss functions are built.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"cross-entropy\",\"negative-log-likelihood\",\"perplexity\",\"information-gain-decision-trees\",\"exponential-family-of-distributions\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"l1-vs-l2-norms\",\"title\":\"L1 vs. L2 Norms\",\"summary\":\"The L1 norm sums absolute values and tends to promote sparsity when used as a penalty, while the L2 norm measures Euclidean length and tends to shrink weights smoothly without zeroing many of them out. That difference is why L1 is associated with feature selection and L2 with stable shrinkage.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"l1-regularization-lasso\",\"l2-regularization-ridge-weight-decay\",\"sparsity\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"k-means-objective-function-inertia\",\"title\":\"K-Means Objective Function (Inertia)\",\"summary\":\"The K-means objective, also called inertia, is the sum of squared distances from each point to its assigned cluster centroid. K-means greedily lowers that objective by alternating between reassigning points and recomputing centroids, though the result still depends on initialization because the problem is nonconvex.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"unsupervised-learning\"],\"related\":[\"principal-component-analysis-pca\",\"l1-vs-l2-norms\",\"triplet-margin-loss\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"the-curse-of-dimensionality\",\"title\":\"The Curse of Dimensionality\",\"summary\":\"The curse of dimensionality is the collection of high-dimensional effects that make data sparse, neighborhoods less informative, and sample requirements explode as dimension grows. It helps explain why distance-based methods, density estimation, and exhaustive search often break down in large feature spaces.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"dimensionality-reduction\",\"principal-component-analysis-pca\",\"neural-probabilistic-language-model\",\"kernel-methods\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"markov-chain-monte-carlo-mcmc\",\"title\":\"Markov Chain Monte Carlo (MCMC)\",\"summary\":\"Markov Chain Monte Carlo samples from a difficult target distribution by constructing a Markov chain whose stationary distribution matches that target. It is essential in Bayesian inference because it replaces intractable posterior integrals with averages over samples, provided the chain mixes well enough.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-transformer-llm\"],\"prerequisites\":[\"conditional-probability\",\"probability-distribution\"],\"related\":[\"reparameterization-trick-vae\",\"the-markov-property\",\"autoencoders\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reparameterization-trick-vae\",\"title\":\"Reparameterization Trick (VAE)\",\"summary\":\"The reparameterization trick writes a stochastic latent sample as a differentiable transformation of parameters and noise, typically z equals mu plus sigma times epsilon. This lets gradients flow through sampling and makes variational autoencoder training practical with backpropagation.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"generative\",\"intermediate\",\"ml\",\"theory\",\"wiki-import\",\"path-vision\"],\"prerequisites\":[\"autoencoders\",\"backpropagation\"],\"related\":[\"gan-minimax-objective\",\"latent-space\",\"markov-chain-monte-carlo-mcmc\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"autoencoders\",\"title\":\"Autoencoders\",\"summary\":\"Autoencoders are neural networks trained to reconstruct their inputs after passing them through a compressed or otherwise constrained latent representation. They are useful because the bottleneck forces the model to learn structure in the data rather than just memorize an identity map.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"neural-network\",\"latent-space\"],\"related\":[\"reparameterization-trick-vae\",\"gan-minimax-objective\",\"principal-component-analysis-pca\",\"representation-learning\",\"dimensionality-reduction\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gan-minimax-objective\",\"title\":\"GAN Minimax Objective\",\"summary\":\"The GAN minimax objective sets up a two-player game in which a generator tries to produce samples that fool a discriminator, while the discriminator tries to distinguish real from generated data. At equilibrium the generator matches the data distribution, though the training game is often unstable in practice.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"generative\",\"intermediate\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-transformer-llm\",\"path-vision\"],\"prerequisites\":[\"neural-network\",\"binary-classification\"],\"related\":[\"autoencoders\",\"reparameterization-trick-vae\",\"loss-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"q-learning\",\"title\":\"Q-Learning\",\"summary\":\"Q-learning is an off-policy reinforcement learning algorithm that learns the optimal action-value function by bootstrapping from a Bellman target over the best next action. Because its update does not require following the current policy, it became a foundational method in both tabular RL and DQN-style deep RL.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-transformer-llm\"],\"prerequisites\":[\"the-bellman-equation\",\"reinforcement-learning-rl\"],\"related\":[\"value-function\",\"policy-reinforcement-learning\",\"the-markov-property\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"the-bellman-equation\",\"title\":\"The Bellman Equation\",\"summary\":\"The Bellman equation recursively expresses the value of a state or state-action pair as immediate reward plus discounted expected future value. It is the backbone of dynamic programming and reinforcement learning because it turns long-horizon return into a local consistency condition.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"the-markov-property\",\"reinforcement-learning-rl\"],\"related\":[\"q-learning\",\"value-function\",\"policy-reinforcement-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"the-markov-property\",\"title\":\"The Markov Property\",\"summary\":\"The Markov property says that the conditional distribution of the future depends only on the present state, not on the full past history, once the state is known. It is the defining assumption behind Markov chains and MDPs and tells you when a state representation is sufficient for planning.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"hidden-markov-model-hmm\",\"the-bellman-equation\",\"q-learning\",\"reinforcement-learning-rl\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bootstrap-aggregating-bagging\",\"title\":\"Bootstrap Aggregating (Bagging)\",\"summary\":\"Bootstrap Aggregating trains multiple models on bootstrap-resampled versions of the training set and averages their predictions to reduce variance. It helps most with unstable base learners such as decision trees, which is why it underlies random forests.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"supervised-learning\",\"bootstrap-resampling\"],\"related\":[\"random-forest\",\"gradient-boosting-machines-gbm\",\"decision-tree\",\"dropout\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-boosting-machines-gbm\",\"title\":\"Gradient Boosting Machines (GBM)\",\"summary\":\"Gradient Boosting Machines build an additive model by fitting each new weak learner to the negative gradient of the current loss. In practice each stage focuses on correcting the remaining errors of the ensemble, which makes boosting powerful but sensitive to overfitting if trees and learning rates are not controlled.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"decision-tree\",\"gradient-descent\"],\"related\":[\"adaboost-adaptive-boosting\",\"random-forest\",\"bootstrap-aggregating-bagging\",\"loss-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"the-fisher-information-matrix\",\"title\":\"The Fisher Information Matrix\",\"summary\":\"The Fisher Information Matrix measures how sensitive a model's log-likelihood is to changes in its parameters and therefore captures local statistical curvature. It underlies asymptotic variance bounds and natural gradient methods because it defines a geometry tied to the model's predictive distribution.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"maximum-likelihood-estimate-mle\",\"probability-distribution\"],\"related\":[\"lagrange-multipliers\",\"exponential-family-of-distributions\",\"convex-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adaboost-adaptive-boosting\",\"title\":\"AdaBoost (Adaptive Boosting)\",\"summary\":\"AdaBoost builds an ensemble by repeatedly fitting weak learners to reweighted data so that previously misclassified examples receive more attention. Its final predictor is a weighted vote of the learners, and its power comes from turning many slightly better-than-random classifiers into a strong one.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"decision-tree\",\"classification\"],\"related\":[\"gradient-boosting-machines-gbm\",\"bootstrap-aggregating-bagging\",\"random-forest\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"information-gain-decision-trees\",\"title\":\"Information Gain (Decision Trees)\",\"summary\":\"Information gain is the reduction in entropy achieved by splitting a dataset on a candidate feature. Decision-tree algorithms use it to choose splits that most reduce label uncertainty, though raw information gain can be biased toward features with many distinct values.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"decision-tree\",\"shannon-entropy\"],\"related\":[\"random-forest\",\"gradient-boosting-machines-gbm\",\"cross-entropy\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dropout\",\"title\":\"Dropout\",\"summary\":\"Dropout regularizes a neural network by randomly zeroing activations during training, which prevents units from co-adapting too strongly. At test time the full network is used with rescaled activations, making dropout behave like an inexpensive ensemble-style regularizer.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"regularization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"regularization\",\"neural-network\"],\"related\":[\"batch-normalization\",\"early-stopping\",\"l2-regularization-ridge-weight-decay\",\"weight-decay\",\"bootstrap-aggregating-bagging\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"singular-value-decomposition-svd\",\"title\":\"Singular Value Decomposition (SVD)\",\"summary\":\"Singular Value Decomposition factors any matrix into orthogonal directions and nonnegative singular values. It is fundamental because low-rank approximation, PCA, pseudoinverses, compression, and many denoising methods all follow from that decomposition.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"linear-function\"],\"related\":[\"principal-component-analysis-pca\",\"low-rank-adaptation-lora\",\"dimensionality-reduction\",\"ordinary-least-squares-ols-closed-form-solution\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"maximum-a-posteriori-map-estimation\",\"title\":\"Maximum A Posteriori (MAP) Estimation\",\"summary\":\"Maximum a posteriori estimation chooses the parameter value that maximizes posterior probability given the data. It is equivalent to maximum likelihood plus a log-prior regularizer, which is why MAP connects Bayesian estimation to familiar penalized optimization objectives.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"maximum-likelihood-estimate-mle\",\"conditional-probability\"],\"related\":[\"l2-regularization-ridge-weight-decay\",\"log-likelihood\",\"probability-distribution\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"supervised-learning\",\"title\":\"Supervised learning\",\"summary\":\"Supervised learning trains a model on labeled input-output pairs so it can predict the correct target on new examples from the same distribution. Classification and regression are its two main forms, depending on whether the target is discrete or continuous.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"unsupervised-learning\",\"reinforcement-learning-rl\",\"classification\",\"regression\",\"loss-function\",\"generalization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"unsupervised-learning\",\"title\":\"Unsupervised learning\",\"summary\":\"Unsupervised learning tries to discover structure in data without labeled targets, such as clusters, latent factors, or a density model. It is used for representation learning, dimensionality reduction, clustering, and generative modeling when explicit supervision is unavailable.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"generative\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-vision\"],\"prerequisites\":[],\"related\":[\"supervised-learning\",\"reinforcement-learning-rl\",\"k-means-objective-function-inertia\",\"principal-component-analysis-pca\",\"autoencoders\",\"representation-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reinforcement-learning-rl\",\"title\":\"Reinforcement learning (RL)\",\"summary\":\"Reinforcement learning studies how an agent should act through trial and error to maximize cumulative reward in an environment. Unlike supervised learning, feedback is delayed and depends on the agent's own actions, so the problem is about sequential decision-making as much as prediction.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"supervised-learning\",\"unsupervised-learning\",\"the-markov-property\",\"reward-signal\",\"policy-reinforcement-learning\",\"q-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"linear-function\",\"title\":\"Linear function\",\"summary\":\"A linear function satisfies additivity and homogeneity, so it can be written as a matrix map with no bias term. In machine learning people often use 'linear' loosely for affine maps, but mathematically the distinction matters because adding a bias breaks true linearity.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"affine-transformation\",\"composite-function\",\"linear-regression\",\"fully-connected-layer\",\"ordinary-least-squares-ols-closed-form-solution\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"affine-transformation\",\"title\":\"Affine transformation\",\"summary\":\"An affine transformation is a linear map followed by a translation, so it has weights and a bias. Dense neural network layers are affine rather than strictly linear, because the bias lets the model shift activations and decision boundaries.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"linear-function\"],\"related\":[\"fully-connected-layer\",\"composite-function\",\"neural-network\",\"multilayer-perceptron-mlp\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"loss-function\",\"title\":\"Loss function\",\"summary\":\"A loss function maps a model's prediction and the true target to a scalar error signal that training aims to minimize. It defines what the model is optimized for, so changing the loss changes which mistakes are treated as costly.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"mean-squared-error-mse\",\"cross-entropy\",\"negative-log-likelihood\",\"prediction-error\",\"gradient-descent\",\"regularization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mean-squared-error-mse\",\"title\":\"Mean squared error (MSE)\",\"summary\":\"Mean squared error averages the squared difference between predicted and true values, making large errors count disproportionately more than small ones. For regression it is especially important because minimizing MSE is equivalent to maximum likelihood under Gaussian noise.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"loss-function\"],\"related\":[\"prediction-error\",\"linear-regression\",\"ordinary-least-squares-ols-closed-form-solution\",\"cross-entropy\",\"maximum-likelihood-estimate-mle\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"prediction-error\",\"title\":\"Prediction error\",\"summary\":\"Prediction error is the difference between a model's prediction and the true target for an example. It is the atomic quantity from which losses, residual analysis, and generalization metrics are built.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"loss-function\"],\"related\":[\"mean-squared-error-mse\",\"bias-variance-tradeoff\",\"overfitting\",\"generalization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-descent\",\"title\":\"Gradient descent\",\"summary\":\"Gradient descent minimizes a differentiable objective by repeatedly moving parameters in the direction of steepest local decrease, namely the negative gradient. Its step size is set by the learning rate, so convergence depends on both objective geometry and update scale.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"loss-function\",\"linear-function\"],\"related\":[\"stochastic-gradient-descent-sgd\",\"mini-batch-gradient-descent\",\"momentum\",\"convex-function\",\"learning-rate\",\"adam-optimizer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mini-batch-gradient-descent\",\"title\":\"Mini-batch gradient descent\",\"summary\":\"Mini-batch gradient descent estimates the gradient on a small subset of training examples at each update instead of on the full dataset or a single example. It is the practical default in deep learning because it balances hardware efficiency with optimization noise.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"gradient-descent\"],\"related\":[\"stochastic-gradient-descent-sgd\",\"epoch\",\"learning-rate\",\"adam-optimizer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"stochastic-gradient-descent-sgd\",\"title\":\"Stochastic gradient descent (SGD)\",\"summary\":\"Stochastic gradient descent updates parameters using a gradient estimate from one example or a very small random batch, making each step noisy but cheap. That noise can slow exact convergence yet often helps large models optimize and generalize in practice.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"gradient-descent\"],\"related\":[\"mini-batch-gradient-descent\",\"momentum\",\"adam-optimizer\",\"convergence\",\"learning-rate\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"convergence\",\"title\":\"Convergence\",\"summary\":\"In optimization, convergence means an algorithm's iterates approach a stable solution or stationary point as updates continue. In practice people often mean that the loss or parameters stop changing much, though true convergence depends on the objective and algorithmic assumptions.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"gradient-descent\",\"stochastic-gradient-descent-sgd\",\"learning-rate\",\"loss-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"generalization\",\"title\":\"Generalization\",\"summary\":\"Generalization is a model's ability to perform well on unseen data from the same underlying distribution as its training data. It is the real goal of learning, because low training error alone can come from memorization rather than useful structure.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"supervised-learning\"],\"related\":[\"overfitting\",\"underfitting\",\"bias-variance-tradeoff\",\"regularization\",\"pac-learning-probably-approximately-correct\",\"convergence\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"regularization\",\"title\":\"Regularization\",\"summary\":\"Regularization is any technique that biases learning toward simpler, more stable, or less overfit solutions. It can appear as an explicit penalty such as weight decay or as an implicit training choice such as data augmentation, dropout, or early stopping.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"overfitting\",\"loss-function\"],\"related\":[\"l1-regularization-lasso\",\"l2-regularization-ridge-weight-decay\",\"dropout\",\"early-stopping\",\"weight-decay\",\"label-smoothing\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"l1-regularization-lasso\",\"title\":\"L1 regularization (Lasso)\",\"summary\":\"L1 regularization adds a penalty proportional to the sum of absolute parameter values, encouraging many coefficients to become exactly zero. That sparsity makes Lasso useful when feature selection is part of the goal, not just shrinkage.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"regularization\",\"l1-vs-l2-norms\"],\"related\":[\"l2-regularization-ridge-weight-decay\",\"sparsity\",\"weight-decay\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"l2-regularization-ridge-weight-decay\",\"title\":\"L2 regularization (Ridge/Weight Decay)\",\"summary\":\"L2 regularization adds a penalty proportional to the sum of squared parameter values, shrinking weights
