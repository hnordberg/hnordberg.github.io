\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"lion-optimizer\",\"title\":\"Lion Optimizer\",\"summary\":\"A momentum-only optimizer discovered by neural search: updates are \\\\( \\\\theta \\\\leftarrow \\\\theta - \\\\eta \\\\, \\\\text{sign}(\\\\beta_1 m + (1-\\\\beta_1) g) \\\\). Uses only the sign of a momentum estimate — no second moment, half the state of AdamW, often matches or beats it on large-scale training with smaller learning rates.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"optimization\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"adam-optimizer\",\"adamw-optimizer\",\"momentum\"],\"related\":[\"muon-optimizer\",\"stochastic-gradient-descent-sgd\",\"adafactor\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"shampoo-kfac-preconditioners\",\"title\":\"Shampoo \u0026 K-FAC Preconditioners\",\"summary\":\"Second-order optimizers for deep nets. K-FAC approximates the Fisher as layerwise \\\\( A \\\\otimes G \\\\) (activation × output-gradient Gram matrices). Shampoo uses a Kronecker factored inverse-\\\\( p \\\\)-th root \\\\( G \\\\leftarrow (L_1^{1/2p} \\\\otimes L_2^{1/2p})^{-1} G \\\\). Both make curvature practical at neural-network scale.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"theory\",\"path-scaling-advanced\"],\"prerequisites\":[\"natural-gradient-fisher-rao-geometry\",\"the-fisher-information-matrix\",\"adam-optimizer\"],\"related\":[\"muon-optimizer\",\"adamw-optimizer\",\"adafactor\",\"trust-region-policy-optimization-trpo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adafactor\",\"title\":\"AdaFactor Optimizer\",\"summary\":\"A memory-efficient Adam variant. Replaces the full second-moment matrix with row and column running averages (a rank-1 factorisation): memory is \\\\( O(m + n) \\\\) instead of \\\\( O(mn) \\\\). Used by T5, Meta's BlenderBot, and many large-scale models to free memory for bigger batches and longer contexts.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"adam-optimizer\",\"adamw-optimizer\"],\"related\":[\"lion-optimizer\",\"muon-optimizer\",\"shampoo-kfac-preconditioners\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"maml-reptile-meta-learning\",\"title\":\"Meta-Learning: MAML \u0026 Reptile\",\"summary\":\"MAML learns an initialisation \\\\( \\\\theta \\\\) such that one or a few SGD steps on a new task yield good performance — formally \\\\( \\\\min_\\\\theta \\\\sum_\\\\tau \\\\mathcal{L}_\\\\tau(\\\\theta - \\\\alpha \\\\nabla \\\\mathcal{L}_\\\\tau(\\\\theta)) \\\\). Reptile is a first-order simplification that moves \\\\( \\\\theta \\\\) toward per-task adapted parameters. Influential early 'learn to learn' recipes, since absorbed into prompt-based few-shot learning.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"optimization\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"gradient-descent\",\"transfer-learning\",\"few-shot-prompting\"],\"related\":[\"active-learning\",\"curriculum-learning\",\"in-context-learning\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"focal-loss-class-imbalance\",\"title\":\"Focal Loss \u0026 Class-Imbalance Objectives\",\"summary\":\"Focal loss \\\\( \\\\text{FL}(p_t) = -(1-p_t)^\\\\gamma \\\\log p_t \\\\) down-weights the loss contribution of confidently-classified easy examples, focusing gradient on hard ones. Designed for extreme foreground-background imbalance in one-stage detection; widely used in segmentation and long-tailed classification.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"cv\",\"implementation\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"cross-entropy\",\"binary-cross-entropy\",\"logistic-regression\"],\"related\":[\"yolo-family\",\"object-detection-rcnn-detr\",\"semantic-instance-segmentation\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"infonce-nt-xent-losses\",\"title\":\"InfoNCE \u0026 NT-Xent Contrastive Losses\",\"summary\":\"InfoNCE maximises a mutual-information lower bound by classifying a positive pair against \\\\( k \\\\) negatives: \\\\( \\\\mathcal{L} = -\\\\log \\\\exp(s^+) / \\\\sum_i \\\\exp(s_i) \\\\). NT-Xent is InfoNCE with temperature-scaled cosine similarities. Drives SimCLR, MoCo, CLIP, and most modern self-supervised representation learning.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\",\"path-generative-models\"],\"prerequisites\":[\"noise-contrastive-estimation\",\"cosine-similarity\",\"contrastive-learning-simclr-moco\"],\"related\":[\"clip-contrastive-language-image-pre-training\",\"siamese-networks-metric-learning\",\"triplet-margin-loss\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-accumulation\",\"title\":\"Gradient Accumulation \u0026 Micro-Batching\",\"summary\":\"Split a large effective batch into \\\\( k \\\\) micro-batches; accumulate their gradients in a buffer, then step once. Decouples statistical batch size from hardware batch size, enabling \\\\( N\\\\cdot k \\\\) effective batch without a \\\\( k\\\\times \\\\) memory blow-up. Essential for training large models on any GPU.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intro\",\"implementation\",\"ml\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"mini-batch-gradient-descent\",\"backpropagation\"],\"related\":[\"data-parallelism\",\"gradient-checkpointing-activation-recomputation\",\"mixed-precision-training\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"expected-calibration-error-ece\",\"title\":\"Expected Calibration Error (ECE) \u0026 Reliability Diagrams\",\"summary\":\"Measures miscalibration: \\\\( \\\\text{ECE} = \\\\sum_b (|B_b|/n) \\\\, |\\\\text{acc}(B_b) - \\\\text{conf}(B_b)| \\\\). Predictions are bucketed by confidence; the gap between mean confidence and accuracy in each bucket sums to ECE. Deep nets are typically over-confident; temperature scaling restores calibration.\",\"domain\":\"evaluation\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"calibration\",\"accuracy\",\"softmax\"],\"related\":[\"temperature-scaling\",\"platt-scaling-isotonic-regression\",\"bayesian-deep-learning-mc-dropout-ensembles\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"platt-scaling-isotonic-regression\",\"title\":\"Platt Scaling \u0026 Isotonic Regression\",\"summary\":\"Two classical post-hoc calibration methods. Platt scaling fits a one-parameter logistic \\\\( \\\\sigma(a f(x) + b) \\\\) on validation scores. Isotonic regression fits a non-parametric monotone step function, trading smoothness for flexibility. Both restore calibration without changing model rankings.\",\"domain\":\"evaluation\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"expected-calibration-error-ece\",\"logistic-regression\",\"calibration\"],\"related\":[\"temperature-scaling\",\"bayesian-deep-learning-mc-dropout-ensembles\",\"conformal-prediction\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bayesian-deep-learning-mc-dropout-ensembles\",\"title\":\"Bayesian Deep Learning: MC Dropout \u0026 Deep Ensembles\",\"summary\":\"Two cheap uncertainty-quantification recipes. MC dropout keeps dropout active at test time, treating each sample as a draw from an approximate posterior. Deep ensembles train \\\\( M \\\\) networks from different seeds and average their predictions. Both reduce over-confidence and improve calibration at the cost of inference compute.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"dropout\",\"bayes-theorem\",\"expected-calibration-error-ece\"],\"related\":[\"variational-inference-elbo\",\"conformal-prediction\",\"pac-bayes-bounds\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"conformal-prediction\",\"title\":\"Conformal Prediction\",\"summary\":\"A distribution-free procedure for turning any point predictor into a prediction \u003cb\u003eset\u003c/b\u003e with guaranteed finite-sample coverage \\\\( 1 - \\\\alpha \\\\) under exchangeability. Requires only a scoring function and a calibration set; no assumption on the underlying model or data distribution.\",\"domain\":\"evaluation\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"expected-calibration-error-ece\",\"bayesian-deep-learning-mc-dropout-ensembles\",\"hypothesis-testing-and-p-values\"],\"related\":[\"platt-scaling-isotonic-regression\",\"pac-bayes-bounds\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"paired-bootstrap-mcnemar-tests\",\"title\":\"Paired Bootstrap \u0026 McNemar's Test for Model Comparison\",\"summary\":\"Two non-parametric procedures for deciding whether model A beats model B with statistical significance. Paired bootstrap resamples matched predictions to estimate a confidence interval on the metric difference. McNemar's test uses a chi-squared on the \\\\( 2\\\\times 2 \\\\) contingency table of agreement / disagreement.\",\"domain\":\"evaluation\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"bootstrap-resampling\",\"confidence-interval\",\"hypothesis-testing-and-p-values\"],\"related\":[\"a-b-testing-ml-systems\",\"model-evaluation\",\"lmsys-chatbot-arena\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"data-curation-quality-filters\",\"title\":\"Data Curation \u0026 Quality Filters (FineWeb, Dolma)\",\"summary\":\"Modern pretraining pipelines filter terabytes of web data through language ID, heuristic rules (repetition, punctuation ratios), classifier-based quality scoring, and toxicity / PII removal. The FineWeb and Dolma recipes document which filters mattered — often delivering per-token quality gains equivalent to 2–3× scale-up.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pretraining-corpus\",\"pretraining-data-deduplication\",\"pretraining\"],\"related\":[\"chinchilla-scaling-laws\",\"data-mixture\",\"synthetic-data-post-training\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"minhash-lsh-deduplication\",\"title\":\"MinHash \u0026 LSH for Large-Scale Deduplication\",\"summary\":\"MinHash approximates Jaccard similarity in constant space by hashing the minimum shingle under \\\\( k \\\\) random permutations. Locality-Sensitive Hashing bands these signatures to retrieve near-duplicates in sub-linear time. The algorithm behind modern corpus dedup (Lee et al. 2021, FineWeb).\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pretraining-data-deduplication\",\"probability-distribution\"],\"related\":[\"hnsw-hierarchical-navigable-small-world\",\"dense-retrieval\",\"sparse-retrieval\",\"data-curation-quality-filters\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"synthetic-data-post-training\",\"title\":\"Synthetic Data Generation for Post-Training\",\"summary\":\"Modern instruction-tuning and RL-based alignment rely on LLM-generated synthetic data: self-instruct / Evol-Instruct expand seed prompts, teacher models produce high-quality completions, and process-reward models validate chain-of-thought steps. The backbone of the post-ChatGPT post-training stack.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\",\"path-alignment\"],\"prerequisites\":[\"instruction-tuning\",\"supervised-fine-tuning-sft\",\"reinforcement-learning-from-human-feedback-rlhf\"],\"related\":[\"self-play-fine-tuning-spin\",\"process-reward-models-vs-outcome-reward-models\",\"rlaif-rl-from-ai-feedback\",\"self-rewarding-language-models\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"continual-pretraining-mid-training\",\"title\":\"Continual Pretraining \u0026 Mid-Training\",\"summary\":\"Continue pretraining an existing base model on a domain or task-focused corpus (code, math, a new language) before final post-training. Achieves domain gains that would cost 10× more to obtain by fine-tuning alone. Sits between pretraining and SFT in modern recipes.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pretraining\",\"continual-learning\",\"finetuning\"],\"related\":[\"instruction-tuning\",\"domain-specific-pretraining\",\"long-context-pretraining\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"langevin-dynamics\",\"title\":\"Langevin Dynamics \u0026 MALA\",\"summary\":\"Langevin MCMC treats gradient noise as deliberate: proposals drift along \\\\( -\\\\nabla \\\\log \\\\pi(\\\\theta) \\\\) plus Gaussian perturbation so the chain targets \\\\( \\\\pi \\\\). Metropolis-adjusted Langevin (MALA) corrects discretisation bias with an MH acceptance; unadjusted Langevin (ULA) trades bias for simplicity and scales to big data via stochastic gradients (SGLD).\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"markov-chain-monte-carlo-mcmc\",\"metropolis-hastings-algorithm\",\"gradient-descent\"],\"related\":[\"hamiltonian-monte-carlo-hmc\",\"metropolis-hastings-algorithm\",\"variational-inference-elbo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pixelcnn\",\"title\":\"PixelCNN / PixelCNN++\",\"summary\":\"Autoregressive image models that factor \\\\( p(x) = \\\\prod_i p(x_i \\\\mid x_{1:i-1}) \\\\) with masked convolutions so each pixel sees only pixels above and to the left. Tractable likelihood and sharp samples; PixelCNN++ improves expressive conditioners (e.g. gated activations, horizontal/vertical stacks).\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"chain-rule-of-probability\",\"autoregressive-language-model\"],\"related\":[\"autoregressive-flows-maf-iaf\",\"variational-autoencoder-vae\",\"normalizing-flows\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"self-rewarding-language-models\",\"title\":\"Self-Rewarding Language Models\",\"summary\":\"Train a model to both generate responses and judge them, using the same weights. Each iteration: generate a pool of candidates, self-rate them, extract preference pairs, DPO-train on the pairs. Recursive improvement without external reward data; bottlenecks surface around judgement quality and diversity collapse.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"reinforcement\",\"path-alignment\",\"path-transformer-llm\"],\"prerequisites\":[\"rlaif-rl-from-ai-feedback\",\"direct-preference-optimization-dpo\",\"reward-model\"],\"related\":[\"self-play-fine-tuning-spin\",\"iterative-dpo\",\"synthetic-data-post-training\",\"rlaif-rl-from-ai-feedback\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"long-context-data-recipes\",\"title\":\"Long-Context Data Recipes (RULER, Needle Variants)\",\"summary\":\"Extending effective context beyond 128k requires (a) RoPE-scaling or position-interpolation to keep positional encodings sane, (b) a continued-pretraining dataset with real long documents and synthetic stitched tasks, and (c) evaluation beyond simple needle-in-a-haystack — RULER adds multi-needle, multi-hop, and aggregation subtasks that expose superficial-match shortcuts.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"long-context-pretraining\",\"rotary-positional-embedding-rope\",\"yarn-ntk-aware-rope-scaling\",\"continual-pretraining-mid-training\"],\"related\":[\"needle-in-a-haystack\",\"ring-attention-context-parallel\",\"attention-sinks-streamingllm\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tokenizer-training-dynamics\",\"title\":\"Tokenizer Training Dynamics \u0026 Vocab Sizing\",\"summary\":\"Larger vocab cuts sequence length but inflates embedding / output-softmax compute and fragments rare tokens; too-small vocab over-segments rare words and domain tokens. Choice interacts with data mixture (code needs special tokens), tokenizer algorithm (BPE vs unigram), and downstream compute budget. Getting it wrong costs 5–15% quality.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"byte-pair-encoding-bpe\",\"wordpiece-unigram-sentencepiece-tokenization\",\"tokenization\",\"embedding-layer\"],\"related\":[\"vocabulary-size\",\"pretraining-corpus\",\"data-curation-quality-filters\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"orpo-odds-ratio-preference-optimization\",\"title\":\"ORPO (Odds-Ratio Preference Optimization)\",\"summary\":\"A reference-model-free preference-optimisation objective that combines SFT and preference learning in one loss: \\\\( \\\\mathcal{L}_{\\\\text{ORPO}} = \\\\mathcal{L}_{\\\\text{SFT}} - \\\\lambda \\\\log \\\\sigma(\\\\log \\\\text{odds}(y_w) - \\\\log \\\\text{odds}(y_l)) \\\\). Eliminates DPO's reference-model requirement, halving training memory.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"nlp\",\"path-transformer-llm\",\"path-alignment\"],\"prerequisites\":[\"direct-preference-optimization-dpo\",\"preference-based-alignment\",\"supervised-fine-tuning-sft\"],\"related\":[\"simpo-simple-preference-optimization\",\"ipo-identity-preference-optimization\",\"kto-kahneman-tversky-optimization\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"simpo-simple-preference-optimization\",\"title\":\"SimPO (Simple Preference Optimization)\",\"summary\":\"Reference-free preference objective that replaces DPO's reference ratio with a length-normalised policy log-likelihood: \\\\( r(x, y) = \\\\log \\\\pi_\\\\theta(y\\\\mid x) / |y| \\\\). Adds a margin \\\\( \\\\gamma \\\\) to the preferred response. Simpler than DPO, matches or beats it, and length-normalisation reduces verbosity exploitation.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"nlp\",\"path-transformer-llm\",\"path-alignment\"],\"prerequisites\":[\"direct-preference-optimization-dpo\",\"orpo-odds-ratio-preference-optimization\",\"preference-based-alignment\"],\"related\":[\"ipo-identity-preference-optimization\",\"rlaif-rl-from-ai-feedback\",\"kto-kahneman-tversky-optimization\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ipo-identity-preference-optimization\",\"title\":\"IPO (Identity Preference Optimization)\",\"summary\":\"Replaces DPO's sigmoid objective with a squared-error criterion on preference probabilities: \\\\( \\\\mathcal{L}_{\\\\text{IPO}} = \\\\mathbb{E}[(h_\\\\theta(y_w, y_l) - 1/(2\\\\beta))^2] \\\\). Prevents DPO's tendency to over-separate preferred and rejected responses on easy pairs, reducing overfitting and improving generalisation.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"theory\",\"path-transformer-llm\",\"path-alignment\"],\"prerequisites\":[\"direct-preference-optimization-dpo\",\"preference-based-alignment\",\"cross-entropy\"],\"related\":[\"orpo-odds-ratio-preference-optimization\",\"simpo-simple-preference-optimization\",\"kto-kahneman-tversky-optimization\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"rlvr-rl-verifiable-rewards\",\"title\":\"RLVR: RL from Verifiable Rewards\",\"summary\":\"Train a reasoning policy with pure RL signals from tasks whose answers are automatically verifiable — math (exact match), code (unit-test execution), proof (checker), chess (engine eval). No preference model needed. The method behind DeepSeek-R1-Zero and the o1-style long-CoT reasoning families.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"nlp\",\"reinforcement\",\"path-alignment\",\"path-transformer-llm\"],\"prerequisites\":[\"grpo-group-relative-policy-optimization\",\"proximal-policy-optimization-ppo\",\"reasoning-models-long-cot\"],\"related\":[\"process-reward-models-vs-outcome-reward-models\",\"self-rewarding-language-models\",\"process-supervision\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reward-hacking-specification-gaming-rlhf\",\"title\":\"Reward Hacking \u0026 Specification Gaming in RLHF\",\"summary\":\"When a learned reward model is a proxy for human preference, RL optimisation finds adversarial inputs that maximise reward without matching the true objective — verbose apologies, sycophancy, confident wrong answers, format exploitation. Goodhart's law in practice. Mitigations range from KL penalty and reward normalisation to process supervision and debate.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"nlp\",\"reinforcement\",\"path-alignment\"],\"prerequisites\":[\"goodharts-law-and-specification-gaming\",\"reinforcement-learning-from-human-feedback-rlhf\",\"reward-model\"],\"related\":[\"process-reward-models-vs-outcome-reward-models\",\"kl-divergence-penalty-in-rlhf\",\"constitutional-ai\",\"rlvr-rl-verifiable-rewards\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"refusal-training-harmlessness-objectives\",\"title\":\"Refusal Training \u0026 Harmlessness Objectives\",\"summary\":\"Teach a model to decline unsafe or out-of-policy queries while remaining helpful on benign ones. Typical recipe: SFT on curated refusal examples, preference optimisation with harm-labelled pairs, red-team-driven iteration. Badly done, this causes over-refusal (the 'brittle helpfulness' regime); done well, it achieves high refusal rate with minimal utility loss.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"path-alignment\",\"path-transformer-llm\"],\"prerequisites\":[\"safety-alignment\",\"instruction-tuning\",\"reinforcement-learning-from-human-feedback-rlhf\"],\"related\":[\"red-teaming\",\"constitutional-ai\",\"representation-engineering-refusal-direction\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"graph-of-thoughts\",\"title\":\"Graph of Thoughts\",\"summary\":\"Generalises chain-of-thought and tree-of-thought to an arbitrary DAG of reasoning nodes, each produced by a prompt. Enables aggregation (merge parallel solutions), refinement loops, and reuse of intermediate results. Useful for problems where branch-and-combine dominates (sorting, constraint satisfaction, multi-step planning).\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"path-transformer-llm\"],\"prerequisites\":[\"tree-of-thought\",\"chain-of-thought\",\"self-consistency\"],\"related\":[\"react-reason-act\",\"self-refine-reflexion\",\"mcts-for-llm-reasoning\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"toolformer-learned-tool-use\",\"title\":\"Toolformer \u0026 Learned Tool Use\",\"summary\":\"Trains a language model to decide \u003ci\u003ewhen\u003c/i\u003e to call external tools and \u003ci\u003ewhat\u003c/i\u003e arguments to pass via self-supervised fine-tuning. The model generates candidate API calls, filters them by whether the result reduces perplexity of the continuation, and fine-tunes on the winners. Parent of modern tool-calling agents.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"nlp\",\"path-transformer-llm\"],\"prerequisites\":[\"function-calling\",\"supervised-fine-tuning-sft\",\"prompt-engineering\"],\"related\":[\"react-reason-act\",\"agent-benchmarks-swe-gaia-webarena\",\"tool-use-function-calling-benchmarks\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"plan-and-solve-prompting\",\"title\":\"Plan-and-Solve Prompting\",\"summary\":\"Two-stage prompt pattern: first ask the model to produce a plan (step-by-step outline), then execute the plan step by step. Improves over naive zero-shot CoT on arithmetic and multi-hop reasoning by forcing explicit decomposition. Contrasts with ReAct's interleaved thought-action loop.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"path-transformer-llm\"],\"prerequisites\":[\"chain-of-thought\",\"prompt-engineering\",\"zero-shot-learning\"],\"related\":[\"react-reason-act\",\"tree-of-thought\",\"self-consistency\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"constrained-decoding-grammars\",\"title\":\"Constrained Decoding: Grammars, JSON Mode, Regex\",\"summary\":\"At each decoding step, mask out tokens that would lead to grammar or schema violations, keeping only compliant next-tokens. Guarantees output is valid JSON / XML / regex-matching / grammar-accepted. Implemented via pushdown automata or FSM tracking; used in OpenAI JSON mode, Outlines, llama.cpp's GBNF.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\"],\"prerequisites\":[\"sampling-in-language-models\",\"tokenization\",\"logit-adjustment\"],\"related\":[\"function-calling\",\"beam-search\",\"greedy-decoding\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-context-protocol-mcp\",\"title\":\"Model Context Protocol (MCP)\",\"summary\":\"Anthropic-initiated open standard for connecting LLM agents to external tools, data sources, and services via a uniform JSON-RPC interface. Separates 'what tools does this agent have' from 'which model is running' — any MCP-aware client can load any MCP server, without provider lock-in.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\"],\"prerequisites\":[\"function-calling\",\"toolformer-learned-tool-use\",\"prompt-engineering\"],\"related\":[\"react-reason-act\",\"agent-benchmarks-swe-gaia-webarena\",\"tool-use-function-calling-benchmarks\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"agentic-multi-agent-orchestration\",\"title\":\"Agentic Workflows \u0026 Multi-Agent Orchestration\",\"summary\":\"Systems that compose multiple LLM calls — planner, executor, critic, tool-user — into an end-to-end workflow. Patterns range from ReAct loops to fixed DAGs (LangGraph) to role-playing ensembles (AutoGPT, BabyAGI). Success requires careful handoff design, termination criteria, and cost control.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\"],\"prerequisites\":[\"react-reason-act\",\"model-context-protocol-mcp\",\"function-calling\"],\"related\":[\"tree-of-thought\",\"graph-of-thoughts\",\"debate-and-amplification\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"flashattention-2-3\",\"title\":\"FlashAttention-2 and FlashAttention-3\",\"summary\":\"Two successor designs to the original FlashAttention's tiled softmax. FA-2 reorders loops to parallelise better across GPU warps and removes redundant mask/rescaling work, halving wall-clock latency. FA-3 (Hopper / H100) uses asynchronous warp-specialised pipelines, FP8 / multi-precision, and TMAs to push attention past 80% of peak.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"implementation\",\"ml\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"flashattention\",\"self-attention\",\"tensor-cores-gemm-fundamentals\"],\"related\":[\"xformers-memory-efficient-attention\",\"pagedattention\",\"ring-attention-context-parallel\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"medusa-eagle-speculative-heads\",\"title\":\"Medusa \u0026 EAGLE Speculative-Decoding Heads\",\"summary\":\"Speculative decoding with learned draft heads instead of a separate draft model. Medusa adds \\\\( K \\\\) small lightweight heads on the base model predicting future tokens; the base verifies tree-hypotheses in one forward pass. EAGLE models the residual stream directly and achieves 3–4× speedup with a tiny draft network.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"implementation\",\"ml\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"speculative-decoding\",\"sampling-in-language-models\",\"key-value-kv-caching\"],\"related\":[\"lookahead-decoding\",\"vllm-continuous-batching\",\"rejection-sampling-fine-tuning-rft\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"lookahead-decoding\",\"title\":\"Lookahead Decoding\",\"summary\":\"Exact speculative-like decoding without any draft model: maintain a running n-gram 'Jacobi window' that proposes multiple tokens ahead in parallel; verify in one pass. Lossless — outputs match greedy decoding exactly — and requires no extra training. Trades increased per-step compute for fewer sequential steps.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"speculative-decoding\",\"greedy-decoding\",\"key-value-kv-caching\"],\"related\":[\"medusa-eagle-speculative-heads\",\"beam-search\",\"disaggregated-prefill-decode-serving\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"radix-prefix-cache-attention\",\"title\":\"Radix / Prefix-Cache Attention (SGLang)\",\"summary\":\"Share the KV cache across requests that start with a common prompt prefix. Store prefix trees keyed by token sequence; on a new request, find the longest matching prefix in the cache and reuse it. Cuts prefill latency and memory use for chat applications with shared system prompts or few-shot contexts.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"product\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"key-value-kv-caching\",\"paged-vs-block-kv-cache\",\"pagedattention\"],\"related\":[\"vllm-continuous-batching\",\"flashattention-2-3\",\"disaggregated-prefill-decode-serving\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"quantized-kv-cache\",\"title\":\"Quantized KV Cache (int4 / int8 / KIVI)\",\"summary\":\"Store the KV cache at lower precision — int8 or int4 — instead of fp16. Halves or quarters the memory footprint of long contexts at negligible quality cost. Different quantisation per key / value (K usually int8, V int4 via grouping) and per-head asymmetric scales are the main tricks.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"implementation\",\"ml\",\"product\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"key-value-kv-caching\",\"quantization\",\"post-training-quantization-ptq\"],\"related\":[\"kv-cache-compression-h2o-snapkv\",\"pagedattention\",\"attention-sinks-streamingllm\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"continuous-vs-static-batching\",\"title\":\"Continuous vs Static Batching\",\"summary\":\"Static batching groups requests before a forward pass and runs them to completion together — tail latency is set by the slowest request. Continuous batching (Orca, vLLM) evicts finished requests mid-step and admits new ones each iteration, keeping GPU utilisation high and tail latency bounded. Default in production LLM serving.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"product\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"vllm-continuous-batching\",\"key-value-kv-caching\",\"pagedattention\"],\"related\":[\"radix-prefix-cache-attention\",\"disaggregated-prefill-decode-serving\",\"chunked-prefill\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"transcoders-sparse-crosscoders\",\"title\":\"Transcoders \u0026 Sparse Crosscoders\",\"summary\":\"Sparse-autoencoder successors that aim to factor out interpretable features across layers (crosscoders) or to predict one layer's activations from another's sparsified dictionary (transcoders). Central to modern mechanistic interpretability of large LLMs.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-alignment\",\"path-transformer-llm\"],\"prerequisites\":[\"sparse-autoencoder-mechanistic-interpretability\",\"superposition-neural-networks\",\"monosemanticity-sae-features\"],\"related\":[\"mechanistic-interpretability\",\"circuit-analysis\",\"activation-patching\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"causal-scrubbing-mediation-analysis\",\"title\":\"Causal Scrubbing \u0026 Mediation Analysis\",\"summary\":\"Rigorous protocols for validating interpretability hypotheses. Causal scrubbing replaces the hypothesised-irrelevant computations with samples from a distribution that should preserve the output; mediation analysis tests whether a candidate component mediates the causal effect of an input on an output. Tools for turning 'this feature looks meaningful' into falsifiable claims.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-alignment\"],\"prerequisites\":[\"mechanistic-interpretability\",\"activation-patching\",\"circuit-analysis\"],\"related\":[\"transcoders-sparse-crosscoders\",\"steering-vectors\",\"rome-memit-model-editing\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"circuit-discovery-pipelines\",\"title\":\"Circuit Discovery Pipelines (ACDC, Attribution Patching)\",\"summary\":\"Automated methods to locate the minimal sub-graph of attention heads and MLP components responsible for a given behaviour. ACDC greedily ablates edges in a causal graph, keeping only those whose removal degrades the behaviour; attribution patching approximates this with a single forward-backward pass per hypothesis.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-alignment\"],\"prerequisites\":[\"activation-patching\",\"mechanistic-interpretability\",\"causal-scrubbing-mediation-analysis\"],\"related\":[\"induction-heads\",\"rome-memit-model-editing\",\"transcoders-sparse-crosscoders\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"representation-engineering-refusal-direction\",\"title\":\"Representation Engineering \u0026 the Refusal Direction\",\"summary\":\"Shift model behaviour by directly manipulating residual-stream activations along interpretable directions. The 'refusal direction' (Arditi et al. 2024) is a single direction in activation space whose ablation jailbreaks open-weight chat models, and whose injection forces refusal — evidence that safety training installs a shallow, targeted feature.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-alignment\"],\"prerequisites\":[\"steering-vectors\",\"mechanistic-interpretability\",\"refusal-training-harmlessness-objectives\"],\"related\":[\"activation-patching\",\"circuit-discovery-pipelines\",\"concept-erasure-null-space-projection\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"concept-erasure-null-space-projection\",\"title\":\"Concept Erasure \u0026 Null-Space Projection\",\"summary\":\"Remove a protected concept (gender, ethnicity, refusal, a specific memory) from representations by iteratively projecting activations onto the null space of linear classifiers for that concept. Achieves provable linear guarding of downstream use against the erased attribute, with bounded utility loss.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-alignment\"],\"prerequisites\":[\"representation-engineering-refusal-direction\",\"singular-value-decomposition-svd\",\"bias-mitigation\"],\"related\":[\"rome-memit-model-editing\",\"steering-vectors\",\"transfer-learning\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"differential-privacy-dp-sgd\",\"title\":\"Differential Privacy \u0026 DP-SGD\",\"summary\":\"Formal guarantee that an algorithm's output distribution barely changes if any single training example is replaced. DP-SGD achieves \\\\( (\\\\varepsilon, \\\\delta) \\\\)-DP by clipping per-example gradients and adding calibrated Gaussian noise. Central to privacy-preserving ML training on sensitive data.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"stochastic-gradient-descent-sgd\",\"gradient-clipping\"],\"related\":[\"federated-learning-fedavg\",\"membership-inference-attacks\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"federated-learning-fedavg\",\"title\":\"Federated Learning (FedAvg)\",\"summary\":\"Train a shared model across many clients (phones, hospitals) without centralising data. Each round: clients train locally for a few epochs, server averages their weight updates. Introduces non-IID-data, communication-cost, and privacy / security challenges absent in centralised training.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"product\",\"path-core-foundations\"],\"prerequisites\":[\"stochastic-gradient-descent-sgd\",\"data-parallelism\"],\"related\":[\"differential-privacy-dp-sgd\",\"continual-learning\",\"model-merging\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"membership-inference-attacks\",\"title\":\"Membership Inference Attacks (MIA)\",\"summary\":\"Determine whether a specific example was in the training set of a deployed model. Attacks exploit loss / confidence gaps between seen and unseen examples — trained models are typically more confident on memorised training points. A baseline for privacy leakage in ML systems.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-alignment\"],\"prerequisites\":[\"maximum-likelihood-estimate-mle\",\"loss-function\",\"overfitting\"],\"related\":[\"differential-privacy-dp-sgd\",\"model-stealing-extraction-attacks\",\"pretraining-data-deduplication\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-stealing-extraction-attacks\",\"title\":\"Model Stealing \u0026 Extraction Attacks\",\"summary\":\"Reconstruct a model's weights, architecture, or training data through query access. Ranges from distillation of an API-only model (clone via output matching) to cryptographic-precision extraction of individual weights (Carlini et al. 2024 against OpenAI's ada embedding endpoint). Central concern for commercial ML APIs.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"product\",\"path-alignment\"],\"prerequisites\":[\"knowledge-distillation\",\"membership-inference-attacks\"],\"related\":[\"differential-privacy-dp-sgd\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"data-poisoning-backdoor-attacks\",\"title\":\"Data Poisoning \u0026 Backdoor Attacks\",\"summary\":\"Insert malicious training examples so the model learns a targeted behaviour — misclassification on a trigger pattern, backdoored refusal bypasses, or degraded accuracy on specific classes. BadNets demonstrated pixel-trigger backdoors; modern LLM poisoning targets alignment-layer susceptibilities and pretraining data.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"product\",\"path-alignment\"],\"prerequisites\":[\"pretraining\",\"supervised-fine-tuning-sft\",\"data-curation-quality-filters\"],\"related\":[\"membership-inference-attacks\",\"model-stealing-extraction-attacks\",\"red-teaming\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"llm-watermarking\",\"title\":\"LLM Watermarking (Kirchenbauer et al.)\",\"summary\":\"Embed a statistical signature into generated text that is invisible to humans but detectable by an algorithm with the watermarking secret. Kirchenbauer et al. (2023) partition the vocabulary into a pseudo-random green / red list per step, biasing generation toward green; later detection uses a \\\\( z \\\\)-test on green-token frequency.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"product\",\"path-alignment\",\"path-transformer-llm\"],\"prerequisites\":[\"sampling-in-language-models\",\"top-p-sampling-nucleus-sampling\",\"hypothesis-testing-and-p-values\"],\"related\":[\"data-poisoning-backdoor-attacks\",\"model-stealing-extraction-attacks\",\"constrained-decoding-grammars\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dangerous-capability-evaluations\",\"title\":\"Dangerous-Capability Evaluations (Bio, Cyber, Persuasion, Autonomy)\",\"summary\":\"Benchmarks that specifically probe whether a model can meaningfully assist in high-consequence harms — biological weapon synthesis, offensive cyber operations, mass persuasion, autonomous goal pursuit. Used by frontier labs (Anthropic, OpenAI, DeepMind) to gate deployment and by governments (UK AISI, US AISI) to audit frontier systems.\",\"domain\":\"evaluation\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"product\",\"path-alignment\"],\"prerequisites\":[\"benchmark-ml-evaluation\",\"ai-safety\",\"red-teaming\"],\"related\":[\"constitutional-ai\",\"refusal-training-harmlessness-objectives\",\"weak-to-strong-generalization\",\"model-organisms-of-misalignment\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"prompt-injection-taxonomy-defenses\",\"title\":\"Prompt Injection: Taxonomy \u0026 Defences\",\"summary\":\"Adversarial instructions embedded in model-accessible content — tool outputs, retrieved documents, emails — that override the user's original task. Direct (in user prompt) vs indirect (in external content). Defences include input filtering, dual-model separation, and structured prompt templates; none is a complete solution.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"product\",\"path-alignment\",\"path-transformer-llm\"],\"prerequisites\":[\"prompt-engineering\",\"retrieval-augmented-generation-rag\",\"function-calling\",\"red-teaming\"],\"related\":[\"what-is-a-jailbreak-in-the-context-of-llms\",\"adversarial-prompting\",\"refusal-training-harmlessness-objectives\",\"model-context-protocol-mcp\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ctc-rnn-transducer\",\"title\":\"CTC Loss \u0026 RNN-Transducer\",\"summary\":\"Two objectives for training sequence-to-sequence models when alignment between input and output frames is unknown. CTC sums over all alignment paths with blank symbols; RNN-T decomposes into a prediction network and joint network to model output-length independently. Backbones of modern ASR pipelines.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"cross-entropy\",\"hidden-markov-model-hmm\",\"recurrent-neural-network-rnn\"],\"related\":[\"conformer-architecture\",\"whisper-speech-to-text\",\"sequence-to-sequence-seq2seq\",\"beam-search\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"conformer-architecture\",\"title\":\"Conformer Architecture\",\"summary\":\"A hybrid CNN-plus-attention block for speech recognition: each Conformer layer combines multi-head self-attention (global), depthwise convolutions (local), and sandwiched feed-forward modules. Outperforms pure Transformer and pure CNN on LibriSpeech and became the de facto encoder for production ASR.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"landmark\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"self-attention\",\"convolutional-neural-network-cnn\",\"ctc-rnn-transducer\"],\"related\":[\"whisper-speech-to-text\",\"vision-transformer-vit\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"text-to-image-dalle-imagen\",\"title\":\"Text-to-Image: DALL-E Lineage \u0026 Imagen\",\"summary\":\"Autoregressive (DALL-E 1, Parti) vs diffusion (DALL-E 2, DALL-E 3, Imagen, Stable Diffusion, Flux) lineages for prompt-to-pixel generation. DALL-E 3 uses a specialised caption-rewriting stage; Imagen emphasises text-encoder scale (T5-XXL) as the dominant quality lever.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"cv\",\"generative\",\"landmark\",\"ml\",\"product\",\"path-generative-models\"],\"prerequisites\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"latent-diffusion\",\"classifier-free-guidance\",\"clip-contrastive-language-image-pre-training\"],\"related\":[\"u-net-architecture\",\"stable-diffusion-pipeline\",\"vision-language-model-vlm\",\"video-diffusion-sora-style\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"unified-multimodal-models\",\"title\":\"Unified Multimodal Models (GPT-4o / Gemini any-to-any)\",\"summary\":\"Single models that process and generate multiple modalities — text, image, audio, video — through a shared backbone with per-modality tokenisers. Native multimodal training yields far richer cross-modal reasoning than cascaded pipelines: image understanding in context of speech, audio generation from visual cues, unified embeddings.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"cv\",\"generative\",\"landmark\",\"ml\",\"nlp\",\"product\",\"path-transformer-llm\",\"path-generative-models\"],\"prerequisites\":[\"vision-language-model-vlm\",\"llava-visual-instruction-tuning\",\"encodec-neural-audio-codecs\"],\"related\":[\"audio-language-models-audiolm-musiclm\",\"whisper-speech-to-text\",\"video-diffusion-sora-style\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"video-diffusion-sora-style\",\"title\":\"Video Diffusion (Sora, Veo, Gen-3)\",\"summary\":\"Extend image-diffusion recipes to video with 3D patch embeddings, temporal attention, and long-context handling. Sora (OpenAI), Veo (Google), and Gen-3 (Runway) train DiT-style transformers over space-time patches of 1–60 second clips, conditioning on rich text captions for controllable generation.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"cv\",\"generative\",\"landmark\",\"ml\",\"path-generative-models\"],\"prerequisites\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"diffusion-transformers-dit\",\"text-to-image-dalle-imagen\"],\"related\":[\"flow-matching-rectified-flow\",\"latent-diffusion\",\"unified-multimodal-models\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mean-field-theory-of-neural-networks\",\"title\":\"Mean Field Theory of Neural Networks\",\"summary\":\"An infinite-width analysis of two-layer networks that, unlike the Neural Tangent Kernel, captures genuine feature learning. With width-\\\\( N \\\\) hidden units scaled as \\\\( 1/N \\\\), training dynamics converge to a gradient flow on the empirical distribution of neuron parameters, governed by a Vlasov-McKean PDE. Mei-Montanari-Nguyen, Chizat-Bach, and Sirignano-Spiliopoulos independently established this limit in 2018.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"neural-tangent-kernel-ntk\",\"stochastic-gradient-descent-sgd\",\"over-parameterization\"],\"related\":[\"neural-tangent-kernel-ntk\",\"implicit-regularization-of-sgd\",\"double-descent\",\"spectral-bias-of-neural-networks\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"information-bottleneck-theory\",\"title\":\"Information Bottleneck Theory\",\"summary\":\"A theory of representation learning that frames the goal as finding a compressed code \\\\( T \\\\) of input \\\\( X \\\\) preserving information about target \\\\( Y \\\\). The IB Lagrangian \\\\( I(X;T) - \\\\beta\\\\,I(T;Y) \\\\) trades compression against predictive sufficiency. Tishby \u0026 Zaslavsky (2015) and Schwartz-Ziv \u0026 Tishby (2017) proposed that SGD-trained networks pass through a 'fitting' phase followed by a 'compression' phase along this trade-off — a claim later contested by Saxe et al. (2018).\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-scaling-advanced\"],\"prerequisites\":[\"mutual-information-and-conditional-entropy\",\"kl-divergence\",\"representation-learning\"],\"related\":[\"entropy-cross-entropy-kl-unified\",\"spectral-bias-of-neural-networks\",\"implicit-regularization-of-sgd\",\"double-descent\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"stability-and-generalization\",\"title\":\"Stability and Generalization\",\"summary\":\"An algorithm is uniformly \\\\( \\\\beta \\\\)-stable if replacing one training point changes its output's loss by at most \\\\( \\\\beta \\\\). Bousquet \u0026 Elisseeff (2002) proved that \\\\( \\\\beta \\\\)-stability bounds the generalization gap by \\\\( O(\\\\beta + 1/\\\\sqrt{n}) \\\\); Hardt, Recht \u0026 Singer (2016) showed SGD on smooth losses is \\\\( O(T/n) \\\\)-stable, giving the first algorithm-dependent generalization bound for deep learning that grows with training time.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"generalization\",\"stochastic-gradient-descent-sgd\",\"concentration-inequalities-hoeffding-bernstein\"],\"related\":[\"pac-bayes-bounds\",\"rademacher-complexity\",\"vc-dimension-and-shattering\",\"implicit-regularization-of-sgd\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"algorithmic-alignment-theory\",\"title\":\"Algorithmic Alignment Theory\",\"summary\":\"A neural architecture generalises better on a reasoning task when its computational structure aligns with the algorithm that solves the task. Xu et al. (2020) formalise sample complexity in terms of the number of network modules that must be learned and the per-module learnability, predicting that GNNs (multi-step message passing) align with dynamic-programming algorithms while plain MLPs do not.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"architecture\",\"path-scaling-advanced\"],\"prerequisites\":[\"message-passing-in-graph-neural-networks-gnns\",\"neural-tangent-kernel-ntk\",\"generalization\"],\"related\":[\"mean-field-theory-of-neural-networks\",\"spectral-bias-of-neural-networks\",\"neural-collapse\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"spectral-bias-of-neural-networks\",\"title\":\"Spectral Bias of Neural Networks\",\"summary\":\"Standard SGD-trained networks fit low Fourier frequencies of the target function much faster than high frequencies. Rahaman et al. (2019) demonstrated this empirically; the NTK perspective explains it via the eigendecomposition of the kernel — eigenfunctions with larger eigenvalues (lower frequencies, for typical data) converge first under gradient descent. This bias is why position encodings, Fourier features, and SIREN activations are needed for high-frequency tasks like NeRF.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-scaling-advanced\"],\"prerequisites\":[\"neural-tangent-kernel-ntk\",\"gradient-descent\",\"deep-neural-network\"],\"related\":[\"mean-field-theory-of-neural-networks\",\"implicit-regularization-of-sgd\",\"double-descent\",\"grokking\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-collapse\",\"title\":\"Neural Collapse\",\"summary\":\"At the terminal phase of training (TPT) — long after zero training error — the last-layer features and classifier weights of a deep classifier converge to a highly symmetric configuration: per-class feature means form a Simplex Equiangular Tight Frame (ETF), within-class variability collapses to zero, classifier weights align with the class means, and prediction reduces to nearest-class-centre. Papyan, Han \u0026 Donoho (2020) established this as a robust empirical phenomenon across architectures and datasets.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-scaling-advanced\"],\"prerequisites\":[\"cross-entropy\",\"classification\",\"deep-neural-network\"],\"related\":[\"representation-learning\",\"implicit-regularization-of-sgd\",\"loss-landscape-flat-vs-sharp-minima\",\"spectral-bias-of-neural-networks\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mode-connectivity-in-loss-landscapes\",\"title\":\"Mode Connectivity in Loss Landscapes\",\"summary\":\"Solutions found by SGD from different random initialisations are not isolated minima — Garipov et al. (2018) and Draxler et al. (2018) showed independently trained minima can be connected by simple low-loss curves (quadratic Bezier, polygonal chains). Linear mode connectivity is more subtle: it generally requires permuting one network to the other's neuron labelling first, as Ainsworth et al.'s 'Git Re-Basin' (2022) demonstrated.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"loss-landscape-flat-vs-sharp-minima\",\"stochastic-gradient-descent-sgd\",\"over-parameterization\"],\"related\":[\"lottery-ticket-hypothesis\",\"implicit-regularization-of-sgd\",\"bayesian-deep-learning-mc-dropout-ensembles\",\"double-descent\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-noise-scale\",\"title\":\"Gradient Noise Scale\",\"summary\":\"A scalar diagnostic that estimates the largest useful batch size by comparing the variance of per-example gradients to the squared norm of the mean gradient: \\\\( B_{\\\\text{noise}} = \\\\operatorname{tr}(\\\\Sigma)/\\\\|g\\\\|^2 \\\\). McCandlish et al. (2018) argue that returns to scaling batch size diminish sharply once \\\\( B \\\\gg B_{\\\\text{noise}} \\\\), giving a principled way to choose batch size during large-scale training.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"stochastic-gradient-descent-sgd\",\"gradient-descent\",\"over-parameterization\"],\"related\":[\"adam-optimizer\",\"adamw-optimizer\",\"implicit-regularization-of-sgd\",\"scaling-laws\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adaptive-gradient-clipping-agc\",\"title\":\"Adaptive Gradient Clipping (AGC)\",\"summary\":\"A per-parameter clipping rule introduced by Brock et al. (2021) that bounds each weight's update by a fraction of the weight's own norm: clip \\\\( g \\\\) so \\\\( \\\\|g\\\\|/\\\\|w\\\\| \\\\le \\\\lambda \\\\). Unlike global-norm clipping, AGC scales naturally with parameter magnitude and made it possible to train Normalizer-Free Networks (NFNets) without batch normalisation while matching its training stability.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"gradient-clipping\",\"stochastic-gradient-descent-sgd\",\"batch-normalization\"],\"related\":[\"weight-decay\",\"layer-normalization\",\"residual-connection-skip-connection\",\"sharpness-aware-minimization-sam\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"self-paced-learning\",\"title\":\"Self-Paced Learning\",\"summary\":\"A curriculum-learning variant where the model itself decides which examples are 'easy enough' to train on at the current step, by minimising a joint objective \\\\( \\\\sum_i v_i \\\\ell_i - \\\\lambda \\\\sum_i v_i \\\\) over both parameters \\\\( \\\\theta \\\\) and per-example weights \\\\( v_i \\\\in \\\\{0,1\\\\} \\\\) (or \\\\( [0,1] \\\\)). Kumar, Packer \u0026 Koller (2010) introduced it as a non-convex EM-style alternative to handcrafted curricula; \\\\( \\\\lambda \\\\) is annealed from low (only easy examples) to high (all examples).\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"curriculum-learning\",\"stochastic-gradient-descent-sgd\",\"loss-function\"],\"related\":[\"implicit-regularization-of-sgd\",\"adam-optimizer\",\"data-curation-quality-filters\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"loss-landscape-visualization\",\"title\":\"Loss Landscape Visualization\",\"summary\":\"Methods for visualising high-dimensional loss surfaces by projecting parameters onto 1-D or 2-D subspaces. Goodfellow's linear interpolation (2014) plots loss along the line between two solutions; Li et al.'s filter normalisation (2018) plots loss in a 2-D plane spanned by random Gaussian directions normalised per-filter. The latter reveals that residual connections smooth the landscape and that flat minima correspond to wide bowls in the visualisation.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"loss-function\",\"stochastic-gradient-descent-sgd\",\"deep-neural-network\"],\"related\":[\"loss-landscape-flat-vs-sharp-minima\",\"mode-connectivity-in-loss-landscapes\",\"residual-connection-skip-connection\",\"sharpness-aware-minimization-sam\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-surgery-pcgrad\",\"title\":\"Gradient Surgery (PCGrad) for Multi-Task Learning\",\"summary\":\"When two task gradients in multi-task learning point in conflicting directions (negative cosine), they partially cancel each other and slow learning. Yu et al.'s PCGrad (2020) projects each task gradient onto the normal plane of any conflicting task's gradient before summing, removing the destructive component. This 'gradient surgery' restores monotone progress on both tasks at modest cost.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"gradient-descent\",\"stochastic-gradient-descent-sgd\",\"loss-function\"],\"related\":[\"adam-optimizer\",\"weight-decay\",\"implicit-regularization-of-sgd\",\"sharpness-aware-minimization-sam\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"contrastive-learning-theory\",\"title\":\"Contrastive Learning Theory\",\"summary\":\"The theoretical account of why contrastive self-supervised objectives like InfoNCE produce useful representations. Wang \u0026 Isola (2020) show the InfoNCE loss decomposes into two asymptotic terms — \\\\( \\\\mathcal{L}_{\\\\text{align}} \\\\), pulling positive pairs together, and \\\\( \\\\mathcal{L}_{\\\\text{unif}} \\\\), spreading the marginal feature distribution uniformly on the hypersphere. The downstream linear-probe accuracy correlates almost perfectly with this alignment-uniformity trade-off, giving a geometric explanation for why contrastive learning works at all.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"representation-learning\",\"path-representation-theory\"],\"prerequisites\":[\"contrastive-learning-simclr-moco\",\"infonce-nt-xent-losses\",\"mutual-information-and-conditional-entropy\"],\"related\":[\"noise-contrastive-estimation\",\"byol-self-distillation\",\"representation-learning\",\"clip-contrastive-language-image-pre-training\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"non-contrastive-ssl\",\"title\":\"Non-Contrastive SSL (BYOL, SimSiam, Barlow Twins, VICReg)\",\"summary\":\"Self-supervised methods that learn from positive pairs alone — no negatives — and yet do not collapse to a constant. BYOL (Grill et al. 2020) and SimSiam (Chen \u0026 He 2021) achieve this by an asymmetric architecture: a predictor MLP on one branch and a stop-gradient on the other. Barlow Twins (Zbontar et al. 2021) and VICReg (Bardes et al. 2022) instead enforce non-collapse explicitly via a feature covariance regulariser. The common theme is replacing the contrastive uniformity term by an architectural or statistical anti-collapse mechanism.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"representation-learning\",\"path-representation-theory\"],\"prerequisites\":[\"byol-self-distillation\",\"contrastive-learning-simclr-moco\",\"representation-learning\"],\"related\":[\"dinov2\",\"masked-autoencoder-mae\",\"contrastive-learning-theory\",\"representation-collapse\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"disentangled-representation-learning\",\"title\":\"Disentangled Representation Learning\",\"summary\":\"The pursuit of latent variables \\\\( z = (z_1, \\\\ldots, z_d) \\\\) whose components correspond to independent semantic factors of variation (pose, identity, lighting). β-VAE (Higgins et al. 2017) up-weights the KL term in the VAE ELBO to encourage axis-aligned independent posteriors; FactorVAE (Kim \u0026 Mnih 2018) penalises the total correlation directly. Locatello et al. (2019) prove that fully unsupervised disentanglement is impossible without inductive biases, reframing the field around weak supervision and benchmark-driven evaluation.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"representation-learning\",\"path-representation-theory\",\"generative\"],\"prerequisites\":[\"variational-autoencoder-vae\",\"representation-learning\",\"beta-vae-disentanglement\"],\"related\":[\"reparameterization-trick-vae\",\"autoencoders\",\"sparse-autoencoder-mechanistic-interpretability\",\"distributed-representation\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sparse-representations-in-deep-nets\",\"title\":\"Sparse Representations in Deep Nets\",\"summary\":\"Modern deep networks naturally produce sparse activations: ReLU networks have median activation sparsity \\\\( \\\\sim 50\\\\% \\\\); transformer MLPs reach \\\\( 80–95\\\\% \\\\) per-token sparsity in late layers. Sparsity is a free regulariser, an exploitable inference acceleration target, and a theoretical lens — the lottery-ticket hypothesis (Frankle \u0026 Carbin 2019) shows dense networks contain sparse subnetworks that train to full accuracy in isolation. Recent work (Mirzadeh et al. 2024, Liu et al. 2023) leverages activation sparsity for 2–10× LLM inference speedups via top-k routing.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"representation-learning\",\"path-representation-theory\",\"regularization\"],\"prerequisites\":[\"representation-learning\",\"relu\",\"autoencoders\"],\"related\":[\"lottery-ticket-hypothesis\",\"sparse-autoencoder-mechanistic-interpretability\",\"dropout\",\"sparse-mixture-of-experts-moe-layer\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"representation-collapse\",\"title\":\"Representation Collapse\",\"summary\":\"A failure mode of representation learning where the encoder produces low-rank or constant features, eliminating useful signal. Three common modes: \u003cb\u003ecomplete collapse\u003c/b\u003e (\\\\( f \\\\equiv c \\\\), seen in non-contrastive SSL without anti-collapse mechanisms), \u003cb\u003edimensional collapse\u003c/b\u003e (Jing et al. 2022 — features span a low-dimensional subspace), and \u003cb\u003eneural collapse\u003c/b\u003e (Papyan, Han \u0026 Donoho 2020 — late-training features cluster onto class-mean simplex). Each mode has distinct diagnostics (feature variance, eigenspectrum decay, simplex angle) and distinct mitigations.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"representation-learning\",\"path-representation-theory\"],\"prerequisites\":[\"representation-learning\",\"byol-self-distillation\",\"contrastive-learning-simclr-moco\"],\"related\":[\"neural-collapse\",\"non-contrastive-ssl\",\"batch-normalization\",\"contrastive-learning-theory\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"invariance-vs-equivariance\",\"title\":\"Invariance vs Equivariance\",\"summary\":\"A representation \\\\( f: X \\\\to Z \\\\) is \u003ci\u003einvariant\u003c/i\u003e to a group action \\\\( g \\\\in G \\\\) if \\\\( f(g \\\\cdot x) = f(x) \\\\), and \u003ci\u003eequivariant\u003c/i\u003e if \\\\( f(g \\\\cdot x) = \\\\rho_Z(g) \\\\cdot f(x) \\\\) for some representation \\\\( \\\\rho_Z \\\\) of \\\\( G \\\\) on \\\\( Z \\\\). Invariance throws away the group's information; equivariance preserves it in a structured form. Choosing one over the other depends on whether the downstream task needs to recover the group element. CNNs are translation-equivariant; group-equivariant CNNs (Cohen \u0026 Welling 2016) extend this to rotations, reflections, and beyond.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"representation-learning\",\"path-representation-theory\",\"architecture\"],\"prerequisites\":[\"representation-learning\",\"convolutional-neural-network-cnn\"],\"related\":[\"set-transformer-deep-sets\",\"contrastive-learning-simclr-moco\",\"data-augmentation\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"embedding-geometry\",\"title\":\"Embedding Geometry\",\"summary\":\"The geometry of learned vector representations — how distance, angle, and clustering structure encode semantics. Word2vec produced the famous parallelogram \\\\( \\\\vec{\\\\text{king}} - \\\\vec{\\\\text{man}} + \\\\vec{\\\\text{woman}} \\\\approx \\\\vec{\\\\text{queen}} \\\\) (Mikolov et al. 2013). Modern embeddings exhibit anisotropy — token embeddings cluster in narrow cones — addressed by whitening and isotropy-promoting losses. Cosine similarity dominates as the standard metric because magnitude in trained embeddings often confounds frequency rather than semantics.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"representation-learning\",\"path-representation-theory\"],\"prerequisites\":[\"word-embedding\",\"representation-learning\",\"cosine-similarity\"],\"related\":[\"word2vec\",\"glove-word-embeddings\",\"umap-uniform-manifold-approximation\",\"distributed-representation\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"metric-learning-at-scale\",\"title\":\"Metric Learning at Scale\",\"summary\":\"Metric learning trains an encoder so that distances in embedding space match a semantic similarity. At billion-vector scale (web search, face identification, ad recommendation), the bottleneck shifts from loss design to nearest-neighbour data structures (HNSW, IVF-PQ in FAISS), product quantization for index compression, and hard-negative mining strategies that don't blow up training cost. ArcFace's angular margin loss (Deng et al. 2019) and proxy losses replaced triplet/contrastive once the negatives became impractical to enumerate.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"representation-learning\",\"path-representation-theory\"],\"prerequisites\":[\"siamese-networks-metric-learning\",\"triplet-margin-loss\",\"cosine-similarity\"],\"related\":[\"hnsw-hierarchical-navigable-small-world\",\"k-nearest-neighbors-knn\",\"dense-retrieval\",\"contrastive-learning-simclr-moco\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"representation-alignment-across-modalities\",\"title\":\"Representation Alignment Across Modalities\",\"summary\":\"Cross-modal alignment trains separate encoders for different input types (image, text, audio) so that paired examples land near each other in a shared embedding space. CLIP (Radford et al. 2021) uses a symmetric InfoNCE on \\\\( 4 \\\\times 10^8 \\\\) image–text pairs from the web, learning a joint space where zero-shot image classification is performed by similarity to a text prototype. The geometry of the joint space is the entire interface between modalities — downstream tasks (retrieval, classification, generation guidance) operate on this aligned embedding rather than on raw pixels or tokens.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"representation-learning\",\"path-representation-theory\",\"vision\",\"language\"],\"prerequisites\":[\"clip-contrastive-language-image-pre-training\",\"representation-learning\",\"contrastive-learning-simclr-moco\"],\"related\":[\"vision-language-contrastive-beyond-clip\",\"infonce-nt-xent-losses\",\"vision-encoder\",\"encoder-transformer\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tokenization-as-representation\",\"title\":\"Tokenization as Representation\",\"summary\":\"Tokenization is a representation choice, not a preprocessing detail — it determines what the model can and cannot see. BPE/Unigram merges encode frequency-weighted statistical priors over the corpus; the vocabulary fixes the model's lexical resolution; and morphologically poor segmentations (digit splits, code-token splits, multilingual under-coverage) cap downstream performance regardless of model size. Recent work (Limisiewicz et al. 2024, Tay et al. 2022) treats the tokenizer as a learnable component co-designed with the model.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"language\",\"representation-learning\",\"path-representation-theory\"],\"prerequisites\":[\"tokenization\",\"subword-tokenization\",\"word-embedding\"],\"related\":[\"wordpiece-unigram-sentencepiece-tokenization\",\"tokenizer-training-dynamics\",\"tokenization-pipeline\",\"embedding-geometry\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"autoregressive-vs-diffusion-tradeoffs\",\"title\":\"Autoregressive vs Diffusion Tradeoffs\",\"summary\":\"Autoregressive models factorise \\\\( p(x) = \\\\prod_t p(x_t \\\\mid x_{\u003ct}) \\\\) and dominate text generation; diffusion models learn a denoising process and dominate continuous-modality generation. The two paradigms differ in likelihood tractability, sampling cost, controllability, and compositionality — and the right choice depends on whether tokens are discrete, parallel decoding is required, and whether log-likelihood or perceptual quality is the figure of merit.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"generative\",\"architecture\",\"path-generative-models\"],\"prerequisites\":[\"autoregressive-language-model\",\"denoising-diffusion-probabilistic-models-ddpm\"],\"related\":[\"latent-diffusion\",\"flow-matching-rectified-flow\",\"consistency-models\",\"diffusion-transformers-dit\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"text-to-image-alignment\",\"title\":\"Text-to-Image Alignment\",\"summary\":\"Text-to-image (T2I) alignment is the task of making generated images faithfully follow textual prompts — covering spatial layout, attribute binding, count, and style. Modern alignment relies on contrastive image–text encoders (CLIP, SigLIP, T5) injected via cross-attention into a diffusion or flow backbone, plus classifier-free guidance, RLHF-style preference fine-tuning, and reward models that grade prompt adherence.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"generative\",\"cv\",\"nlp\",\"path-generative-models\"],\"prerequisites\":[\"clip-contrastive-language-image-pre-training\",\"latent-diffusion\",\"classifier-free-guidance\"],\"related\":[\"text-to-image-dalle-imagen\",\"stable-diffusion-pipeline\",\"siglip\",\"diffusion-transformers-dit\",\"preference-based-alignment\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"generative-model-evaluation\",\"title\":\"Generative Model Evaluation (FID, IS, and their limits)\",\"summary\":\"Fréchet Inception Distance (FID) and Inception Score (IS) are the standard automated metrics for image generative models; both rely on Inception-v3 features and have well-known biases. Modern T2I evaluation supplements them with CLIPScore, prompt-adherence benchmarks (T2I-CompBench, GenEval), human-preference Elo (ImageReward, HPS), and likelihood / NLL where applicable.\",\"domain\":\"evaluation\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"evaluation\",\"generative\",\"cv\",\"path-generative-models\"],\"prerequisites\":[\"benchmark-ml-evaluation\",\"denoising-diffusion-probabilistic-models-ddpm\",\"clip-contrastive-language-image-pre-training\"],\"related\":[\"text-to-image-alignment\",\"lmsys-chatbot-arena\",\"stable-diffusion-pipeline\",\"core-llm-benchmarks\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"in-context-learning-mechanisms\",\"title\":\"In-Context Learning Mechanisms\",\"summary\":\"In-context learning (ICL) is the empirical phenomenon that a frozen LLM solves new tasks from few-shot examples in the prompt. Mechanistic studies show ICL is implemented by a small set of attention circuits — induction heads, function vectors, and implicit gradient-descent-like updates — that emerge during pretraining once the data and depth budget cross a threshold.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"transformer\",\"interpretability\",\"path-mechanistic-interpretability\",\"path-transformer-llm\"],\"prerequisites\":[\"in-context-learning\",\"induction-heads\",\"self-attention\"],\"related\":[\"mechanistic-interpretability\",\"circuit-analysis\",\"what-are-emergent-capabilities-in-large-language-models\",\"prompt-engineering\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"memory-in-llms\",\"title\":\"Memory in LLMs\",\"summary\":\"An LLM's working memory is the KV-cache for the current context window; longer-term memory is implemented externally by retrieval over vector / hybrid stores, by writing to scratchpads or tool state, or by parameter updates (continual fine-tuning). Each option has a different latency, capacity, and forgetting profile; production systems combine all three.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"transformer\",\"implementation\",\"path-transformer-llm\"],\"prerequisites\":[\"large-language-model-llm\",\"context-window\",\"key-value-kv-caching\",\"retrieval-augmented-generation-rag\"],\"related\":[\"memory-augm
