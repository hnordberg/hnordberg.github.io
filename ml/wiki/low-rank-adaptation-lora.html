ented-transformers\",\"vector-database\",\"long-context-pretraining\",\"neural-turing-machine-ntm\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"alignment-techniques-rlhf-dpo-rlaif\",\"title\":\"Alignment Techniques (RLHF, DPO, RLAIF, comparison)\",\"summary\":\"Modern LLM alignment uses preference data to adjust a pretrained model so it follows instructions, refuses unsafe content, and ranks desired behaviours above undesired ones. The dominant recipes — RLHF with PPO, DPO and its variants, and RLAIF with AI-generated preferences — share the same Bradley–Terry preference model but differ in optimiser, reward-model dependence, and stability.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"reinforcement\",\"theory\",\"path-alignment-rlhf\",\"path-transformer-llm\"],\"prerequisites\":[\"reinforcement-learning-from-human-feedback-rlhf\",\"direct-preference-optimization-dpo\",\"rlaif-rl-from-ai-feedback\"],\"related\":[\"preference-based-alignment\",\"reward-model\",\"kl-divergence-penalty-in-rlhf\",\"constitutional-ai\",\"iterative-dpo\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-fields-implicit-representations\",\"title\":\"Neural Fields / Implicit Neural Representations\",\"summary\":\"A neural field represents a signal — image, 3D shape, scene, or PDE solution — as a neural network that maps coordinates to values, e.g., \\\\( f_\\\\theta : \\\\mathbb{R}^d \\\\to \\\\mathbb{R}^k \\\\). The model parameters \u003ci\u003eare\u003c/i\u003e the data: storage, querying, and editing all flow through the network. NeRF is the most famous instance, but the framework spans signed distance functions, occupancy fields, light fields, and physics fields.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"cv\",\"architecture\",\"generative\"],\"prerequisites\":[\"multilayer-perceptron-mlp\",\"sinusoidal-positional-encoding\"],\"related\":[\"nerf-gaussian-splatting\",\"convolutional-neural-network-cnn\",\"vision-transformer-vit\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vision-transformer-variants\",\"title\":\"Vision Transformer (ViT) Variants\",\"summary\":\"Since the original ViT, a wide family of variants has emerged that improve data efficiency, locality, hierarchy, and pretraining objective. The most influential are DeiT (training recipe), Swin (windowed hierarchical attention), MAE (masked-image pretraining), DINOv2 (self-distilled features), and SigLIP (sigmoid contrastive pretraining). Each addresses a specific weakness of the vanilla ViT.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"cv\",\"architecture\",\"transformer\"],\"prerequisites\":[\"vision-transformer-vit\",\"self-attention\",\"transformer\"],\"related\":[\"masked-autoencoder-mae\",\"dinov2\",\"siglip\",\"convolutional-neural-network-cnn\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"graph-transformers\",\"title\":\"Graph Transformers\",\"summary\":\"Graph Transformers apply self-attention over graph-structured data, with positional encodings (Laplacian eigenvectors, random walks, shortest-path distances) injecting graph topology that vanilla attention lacks. They generalise message-passing GNNs and have become the leading architecture for molecular property prediction, code understanding, and combinatorial optimisation.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"architecture\",\"transformer\"],\"prerequisites\":[\"transformer\",\"self-attention\",\"message-passing-in-graph-neural-networks-gnns\"],\"related\":[\"graph-attention-network-gat\",\"graph-convolutional-network-gcn\",\"vision-transformer-vit\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"perceiver-architecture\",\"title\":\"Perceiver Architecture\",\"summary\":\"The Perceiver is a cross-attention-based architecture that handles arbitrary input modalities (images, audio, point clouds, video) by first attending from a small fixed-size \u003ci\u003elatent\u003c/i\u003e array onto the input, then iterating self-attention over latents. This decouples compute from input size and gives a unified backbone for multimodal models.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"architecture\",\"transformer\"],\"prerequisites\":[\"transformer\",\"cross-attention\",\"self-attention\"],\"related\":[\"vision-transformer-vit\",\"linear-attention\",\"multi-head-latent-attention-mla\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-architecture-search\",\"title\":\"Neural Architecture Search (modern approaches)\",\"summary\":\"NAS automates the design of network architectures by searching a parameterised space against a validation objective. Modern NAS abandons the slow RL-controller approach (NASNet) in favour of weight-sharing one-shot supernets (DARTS, ProxylessNAS), zero-cost proxies, and architecture-aware scaling laws (EfficientNet, NFNet). NAS has produced strong vision backbones but plays a smaller role in the LLM era.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"architecture\",\"optimization\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"transformer\",\"hyperparameter\"],\"related\":[\"mixture-of-depths\",\"scaling-laws\",\"knowledge-distillation\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"modular-neural-networks\",\"title\":\"Modular Neural Networks\",\"summary\":\"A modular network composes specialised sub-networks (modules) under a routing or composition rule that decides which modules process each input. Mixture-of-Experts is the most successful instance, but the family includes routed adapter networks, modular meta-learners, and compositional architectures designed for systematic generalisation. The motivation is parameter efficiency and reusable skills.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"architecture\",\"transformer\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\",\"low-rank-adaptation-lora\",\"neural-network\"],\"related\":[\"adapter-layers-houlsby\",\"router-network\",\"mixture-of-depths\",\"multi-head-latent-attention-mla\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-program-interpreters\",\"title\":\"Neural Program Interpreters\",\"summary\":\"A neural program interpreter (NPI) is a network that executes program-like computations: looking up arguments, calling sub-routines, manipulating an external memory or stack, and conditioning on intermediate state. Early work (NPI, NTM, DNC, NeuralGPU) targeted symbolic algorithms; modern descendants are tool-using LLMs and chain-of-thought executors that lean on external interpreters and structured memory.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"architecture\",\"historical\"],\"prerequisites\":[\"recurrent-neural-network-rnn\",\"neural-turing-machine-ntm\",\"transformer\"],\"related\":[\"function-calling\",\"tool-use-function-calling-benchmarks\",\"memory-augmented-transformers\",\"chain-of-thought\"],\"updatedAt\":\"2026-04-25\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"compressed-sparse-attention-csa\",\"title\":\"Compressed Sparse Attention (CSA)\",\"summary\":\"Compressed Sparse Attention (CSA) reduces Key-Value cache memory overhead for ultra-long context windows by merging consecutive tokens into a single compressed representation. A specialized Lightning Indexer then sparsely selects only the most relevant compressed blocks for standard attention, cutting both memory footprint and inference compute.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"ml\",\"implementation\",\"advanced\",\"attention\",\"transformer\",\"architecture\"],\"prerequisites\":[\"self-attention\",\"key-value-kv-caching\"],\"related\":[\"sliding-window-attention\",\"multi-head-latent-attention-mla\",\"longformer-bigbird-sparse-attention\"],\"updatedAt\":\"2026-04-26\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"}]}}]}]}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"14:I[27201,[\"/_next/static/chunks/08u3pj27txr.q.js\",\"/_next/static/chunks/0kcw4xwqzc_eo.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"IconMark\"]\na:null\nf:[[\"$\",\"title\",\"0\",{\"children\":\"Low-Rank Adaptation (LoRA) | ML Wiki\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"LoRA fine-tunes a model by expressing each weight update as a low-rank product \\\\( \\\\Delta W = BA \\\\) while keeping the original weight matrix frozen. This dramatically cuts trainable parameters and optimizer state, which is why LoRA became the default PEFT method for LLMs.\"}],[\"$\",\"meta\",\"2\",{\"name\":\"google-site-verification\",\"content\":\"dSCg0rCRcZOPSbSef9V6h5pLtxGs_osM0t7viz7yKUk\"}],[\"$\",\"link\",\"3\",{\"rel\":\"shortcut icon\",\"href\":\"/favicon.ico\"}],[\"$\",\"link\",\"4\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\"}],[\"$\",\"link\",\"5\",{\"rel\":\"apple-touch-icon\",\"href\":\"/favicon.ico\"}],[\"$\",\"$L14\",\"6\",{}]]\n"])</script></body></html>
