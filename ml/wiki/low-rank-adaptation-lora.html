",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"poisson-and-exponential-distributions\",\"title\":\"Poisson and Exponential Distributions\",\"summary\":\"Poisson \\\\( (\\\\lambda) \\\\) models counts of independent events in a fixed interval; Exponential \\\\( (\\\\lambda) \\\\) models the waiting time between them. They are the two marginals of the Poisson process — one discrete, one continuous — and between them cover rare-event counts, waiting times, and the building blocks of survival analysis, rate modelling, and queueing theory.\",\"domain\":\"math\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"bernoulli-binomial-categorical-distributions\",\"random-variables-expectation-variance-axiomatic\"],\"related\":[\"cross-entropy\",\"exponential-family-of-distributions\",\"maximum-likelihood-estimate-mle\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mutual-information-and-conditional-entropy\",\"title\":\"Mutual Information and Conditional Entropy\",\"summary\":\"Conditional entropy \\\\( H(Y \\\\mid X) \\\\) measures the residual uncertainty in \\\\( Y \\\\) given \\\\( X \\\\). Mutual information \\\\( I(X; Y) = H(Y) - H(Y \\\\mid X) \\\\) measures how much \\\\( X \\\\) reduces the uncertainty in \\\\( Y \\\\) — equivalently, the KL divergence from the joint \\\\( p(X,Y) \\\\) to the product of marginals \\\\( p(X)p(Y) \\\\). Together they quantify dependence, drive information-bottleneck theory, and define decision-tree splits.\",\"domain\":\"math\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"shannon-entropy\",\"kl-divergence\",\"cross-entropy\"],\"related\":[\"information-gain-decision-trees\",\"variational-inference-elbo\",\"contrastive-learning-simclr-moco\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hypothesis-testing-and-p-values\",\"title\":\"Hypothesis Testing, p-values, and Statistical Power\",\"summary\":\"A hypothesis test compares a null \\\\( H_0 \\\\) to an alternative \\\\( H_1 \\\\) by computing a test statistic and its tail probability under \\\\( H_0 \\\\) — the p-value. Statistical power is \\\\( 1 - \\\\beta \\\\), the probability of rejecting \\\\( H_0 \\\\) when \\\\( H_1 \\\\) is true. For ML evaluation, these are the tools that separate \\\"this model is better\\\" from \\\"this split was lucky\\\".\",\"domain\":\"math\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"evaluation\",\"path-core-foundations\"],\"prerequisites\":[\"central-limit-theorem\",\"random-variables-expectation-variance-axiomatic\",\"bernoulli-binomial-categorical-distributions\"],\"related\":[\"a-b-testing-ml-systems\",\"confidence-interval\",\"bootstrap-resampling\",\"cramer-rao-lower-bound\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cramer-rao-lower-bound\",\"title\":\"Cramér–Rao Lower Bound\",\"summary\":\"The Cramér–Rao bound states that any unbiased estimator \\\\( \\\\hat\\\\theta \\\\) of a parameter \\\\( \\\\theta \\\\) has variance \\\\( \\\\text{Var}(\\\\hat\\\\theta) \\\\ge 1/I(\\\\theta) \\\\), where \\\\( I(\\\\theta) \\\\) is the Fisher information. It is the foundational efficiency bound of classical statistics and gives an immediate lower bound on the uncertainty of MLE-based procedures.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"the-fisher-information-matrix\",\"maximum-likelihood-estimate-mle\",\"random-variables-expectation-variance-axiomatic\"],\"related\":[\"hypothesis-testing-and-p-values\",\"log-likelihood\",\"central-limit-theorem\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gaussian-process-regression\",\"title\":\"Gaussian Process Regression\",\"summary\":\"A Gaussian process defines a distribution over functions such that any finite set of evaluations is jointly Gaussian. Given a kernel \\\\( k \\\\) and noisy observations, the posterior at a test point is \\\\( \\\\mathcal{N}(\\\\mu_*, \\\\sigma_*^2) \\\\) with closed-form mean and variance. GP regression gives both predictions and calibrated uncertainty, costs \\\\( O(n^3) \\\\) for \\\\( n \\\\) training points, and is the Bayesian counterpart of kernel ridge regression.\",\"domain\":\"supervised\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"multivariate-gaussian-distribution\",\"kernel-methods\",\"cholesky-decomposition\",\"positive-semi-definite-matrices\"],\"related\":[\"neural-tangent-kernel-ntk\",\"variational-inference-elbo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vc-dimension-and-shattering\",\"title\":\"VC Dimension and Shattering\",\"summary\":\"The Vapnik–Chervonenkis dimension of a hypothesis class \\\\( \\\\mathcal{H} \\\\) is the largest number of points \\\\( \\\\mathcal{H} \\\\) can shatter — label in every possible way. It controls PAC generalisation: if \\\\( \\\\text{VC}(\\\\mathcal{H}) = d \\\\), then with probability \\\\( 1 - \\\\delta \\\\) all \\\\( h \\\\in \\\\mathcal{H} \\\\) satisfy \\\\( L(h) \\\\le \\\\hat L(h) + O(\\\\sqrt{d/n}) \\\\). VC dimension explains why linear classifiers in \\\\( \\\\mathbb{R}^d \\\\) need \\\\( \\\\Omega(d) \\\\) examples and why simple hypothesis classes generalise.\",\"domain\":\"foundations\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"pac-learning-probably-approximately-correct\",\"generalization\"],\"related\":[\"rademacher-complexity\",\"no-free-lunch-theorem\",\"double-descent\",\"support-vector-machine-svm\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"rademacher-complexity\",\"title\":\"Rademacher Complexity\",\"summary\":\"The empirical Rademacher complexity of a function class \\\\( \\\\mathcal{F} \\\\) on data \\\\( S = (z_1, \\\\dots, z_n) \\\\) is \\\\( \\\\hat{\\\\mathfrak{R}}_S(\\\\mathcal{F}) = \\\\mathbb{E}_\\\\sigma[\\\\sup_{f \\\\in \\\\mathcal{F}} \\\\tfrac{1}{n}\\\\sum_i \\\\sigma_i f(z_i)] \\\\) — the expected ability of \\\\( \\\\mathcal{F} \\\\) to correlate with random \\\\( \\\\pm 1 \\\\) signs. It is the data-dependent workhorse of modern generalisation bounds, usually tighter than VC, and gives direct norm-based bounds for deep networks.\",\"domain\":\"foundations\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"vc-dimension-and-shattering\",\"pac-learning-probably-approximately-correct\"],\"related\":[\"no-free-lunch-theorem\",\"generalization\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"no-free-lunch-theorem\",\"title\":\"No-Free-Lunch Theorem\",\"summary\":\"Averaged over all possible target functions or data distributions, every learning algorithm performs identically. Any algorithm's superiority on one class of problems must be paid for by inferior performance on another. NFL is not a practical barrier — real-world problems occupy a tiny, structured subset — but it is the theoretical basis for why \u003ci\u003einductive bias\u003c/i\u003e is a first-class design choice, not an implementation detail.\",\"domain\":\"foundations\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"generalization\",\"pac-learning-probably-approximately-correct\",\"bias-variance-tradeoff\"],\"related\":[\"the-bitter-lesson\",\"vc-dimension-and-shattering\",\"rademacher-complexity\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"goodharts-law-and-specification-gaming\",\"title\":\"Goodhart's Law and Specification Gaming\",\"summary\":\"When a measure becomes a target, it ceases to be a good measure. Optimising a proxy metric \\\\( \\\\hat{M} \\\\) for a true-but-unobservable goal \\\\( M \\\\) tends to decouple them once optimisation pressure is strong enough. Specification gaming is the RL-specific manifestation: agents maximise reward by exploiting the reward specification rather than achieving the intended behaviour. These twin failure modes underlie most benchmark-gaming, reward-hacking, and evaluation-contamination stories in modern ML.\",\"domain\":\"evaluation\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"evaluation\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-evaluation\",\"reinforcement-learning-rl\"],\"related\":[\"reward-model\",\"misalignment\",\"reinforcement-learning-from-human-feedback-rlhf\",\"benchmark-ml-evaluation\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"t-distributed-stochastic-neighbor-embedding-tsne\",\"title\":\"t-SNE (t-Distributed Stochastic Neighbor Embedding)\",\"summary\":\"t-SNE embeds high-dimensional points into 2D/3D by matching a heavy-tailed joint \\\\( Q \\\\) in the embedding space to a Gaussian-kernel joint \\\\( P \\\\) over neighbourhoods in the input space, minimising \\\\( D_{\\\\text{KL}}(P\\\\|Q) \\\\). The heavy Student-t tail in \\\\( Q \\\\) solves the crowding problem; perplexity tunes neighbourhood size. t-SNE preserves local structure well but distorts global distances.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"implementation\",\"path-core-foundations\"],\"prerequisites\":[\"kl-divergence\",\"dimensionality-reduction\",\"principal-component-analysis-pca\"],\"related\":[\"umap-uniform-manifold-approximation\",\"principal-component-analysis-pca\",\"semantic-space\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"umap-uniform-manifold-approximation\",\"title\":\"UMAP (Uniform Manifold Approximation and Projection)\",\"summary\":\"UMAP constructs a fuzzy topological representation of the data using local Riemannian metrics, then finds a low-dimensional embedding whose fuzzy topology matches. Its cross-entropy objective has distinct attractive and repulsive terms — easier to scale than t-SNE — and a theoretical motivation grounded in category theory and Riemannian geometry. In practice, UMAP preserves more global structure than t-SNE at similar or better speed.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"implementation\",\"path-core-foundations\"],\"prerequisites\":[\"dimensionality-reduction\",\"t-distributed-stochastic-neighbor-embedding-tsne\"],\"related\":[\"nearest-neighbor-search\",\"principal-component-analysis-pca\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dbscan-density-based-clustering\",\"title\":\"DBSCAN (Density-Based Clustering)\",\"summary\":\"DBSCAN clusters points by density: a point is a core point if it has at least \\\\( \\\\text{minPts} \\\\) neighbours within radius \\\\( \\\\varepsilon \\\\); clusters are connected components of core-point neighbourhoods. Non-core points without core neighbours are labelled noise. Unlike \\\\( k \\\\)-means, DBSCAN does not need the number of clusters in advance and handles arbitrary cluster shapes, at the cost of \\\\( \\\\varepsilon \\\\) tuning.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"implementation\",\"path-core-foundations\"],\"prerequisites\":[\"k-means-objective-function-inertia\",\"nearest-neighbor-search\"],\"related\":[\"t-distributed-stochastic-neighbor-embedding-tsne\",\"umap-uniform-manifold-approximation\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"linear-and-quadratic-discriminant-analysis\",\"title\":\"Linear and Quadratic Discriminant Analysis (LDA / QDA)\",\"summary\":\"LDA and QDA are generative classifiers: model class-conditionals \\\\( p(x \\\\mid y = k) = \\\\mathcal{N}(\\\\mu_k, \\\\Sigma_k) \\\\) and apply Bayes' rule. LDA assumes shared covariance \\\\( \\\\Sigma \\\\) across classes, giving linear decision boundaries and shrinkage-like regularisation; QDA uses per-class \\\\( \\\\Sigma_k \\\\), giving quadratic boundaries at the cost of \\\\( K \\\\times d^2 \\\\) parameters. Both are the generative counterparts of logistic regression.\",\"domain\":\"supervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"multivariate-gaussian-distribution\",\"naive-bayes-classifier\",\"logistic-regression\"],\"related\":[\"bayes-theorem\",\"logistic-regression\",\"maximum-likelihood-estimate-mle\",\"positive-semi-definite-matrices\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"matrix-factorization-and-collaborative-filtering\",\"title\":\"Matrix Factorisation and Collaborative Filtering\",\"summary\":\"Matrix factorisation decomposes a sparse user–item rating matrix \\\\( R \\\\approx UV^\\\\top \\\\) into low-rank user and item embeddings, learned by minimising squared error on observed entries with regularisation. This is the canonical collaborative-filtering recipe behind Netflix-style recommenders, the spiritual ancestor of modern embedding-based retrieval, and a clean worked example of low-rank learning.\",\"domain\":\"supervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"implementation\",\"path-core-foundations\"],\"prerequisites\":[\"singular-value-decomposition-svd\",\"ordinary-least-squares-ols-closed-form-solution\",\"embedding-vector\"],\"related\":[\"distributed-representation\",\"nearest-neighbor-search\",\"matrix-rank-and-rank-nullity-theorem\",\"moore-penrose-pseudoinverse\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"lottery-ticket-hypothesis\",\"title\":\"Lottery Ticket Hypothesis\",\"summary\":\"A dense randomly-initialised neural network contains subnetworks (\\\"winning tickets\\\") that — when trained in isolation with their original initialisation — match the full network's accuracy in the same number of steps. This Frankle–Carbin observation motivates one-shot and iterative magnitude pruning as search algorithms for sparse trainable subnetworks, reframing pruning as an initialisation search rather than a post-hoc compression.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-scaling-advanced\"],\"prerequisites\":[\"pruning\",\"weight-initialization\",\"structured-pruning\"],\"related\":[\"unstructured-pruning\",\"implicit-regularization-of-sgd\",\"loss-landscape-flat-vs-sharp-minima\",\"double-descent\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"loss-landscape-flat-vs-sharp-minima\",\"title\":\"Loss Landscape: Flat vs Sharp Minima\",\"summary\":\"Flat minima (low curvature / small Hessian eigenvalues) generalise better than sharp minima (high curvature), empirically and via PAC-Bayes bounds. SGD's noise, large batch sizes, and the Sharpness-Aware Minimisation (SAM) optimiser all interact with this: small-batch SGD prefers flat minima, large-batch SGD falls into sharper ones, and SAM explicitly penalises sharpness during training.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"stochastic-gradient-descent-sgd\",\"jacobian-and-hessian\",\"generalization\"],\"related\":[\"implicit-regularization-of-sgd\",\"lottery-ticket-hypothesis\",\"double-descent\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"implicit-regularization-of-sgd\",\"title\":\"Implicit Regularisation of SGD\",\"summary\":\"Over-parameterised networks trained by SGD generalise despite being able to fit pure noise — SGD's trajectory biases the solution toward specific minima. For linear models, gradient flow converges to the minimum-norm interpolator; for deep nets, SGD with small LR and moderate batch behaves like Bayesian inference with an implicit prior on flat minima. This implicit bias is why modern deep learning does not need explicit capacity control.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"optimization\",\"path-scaling-advanced\"],\"prerequisites\":[\"stochastic-gradient-descent-sgd\",\"generalization\",\"overfitting\"],\"related\":[\"loss-landscape-flat-vs-sharp-minima\",\"double-descent\",\"neural-tangent-kernel-ntk\",\"lottery-ticket-hypothesis\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multi-armed-bandits\",\"title\":\"Multi-Armed Bandits: ε-Greedy, UCB, Thompson Sampling\",\"summary\":\"A multi-armed bandit is the simplest setting for exploration vs exploitation: \\\\( K \\\\) arms, each with unknown reward distribution; pull one per step; minimise cumulative regret. The three canonical strategies — ε-greedy, Upper Confidence Bound (UCB), and Thompson sampling — illustrate optimism, confidence-based exploration, and probability matching respectively, and generalise to contextual bandits and full RL.\",\"domain\":\"other\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"reinforcement\",\"path-reinforcement\"],\"prerequisites\":[\"reinforcement-learning-rl\",\"bernoulli-binomial-categorical-distributions\",\"beta-and-dirichlet-distributions\"],\"related\":[\"temporal-difference-learning\",\"policy-gradient-theorem\",\"a-b-testing-ml-systems\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"temporal-difference-learning\",\"title\":\"Temporal-Difference Learning: TD(0), SARSA, TD(λ)\",\"summary\":\"Temporal-difference learning updates value estimates using the Bellman bootstrapped target \\\\( R_t + \\\\gamma V(S_{t+1}) \\\\) rather than a full Monte Carlo return. TD(0) is the one-step instance; SARSA extends it on-policy to action-values; TD(λ) interpolates between TD(0) and Monte Carlo via eligibility traces. TD is the central learning rule behind Q-learning, DQN, and actor-critic.\",\"domain\":\"other\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"reinforcement\",\"path-reinforcement\"],\"prerequisites\":[\"reinforcement-learning-rl\",\"the-bellman-equation\",\"value-function\",\"q-learning\"],\"related\":[\"actor-critic-methods\",\"generalized-advantage-estimation-gae\",\"reinforce-algorithm\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"deep-q-network-dqn\",\"title\":\"Deep Q-Network (DQN)\",\"summary\":\"DQN parameterises \\\\( Q(s, a; \\\\theta) \\\\) by a CNN and trains it by Q-learning on mini-batches sampled from a replay buffer, with a slowly-updated target network stabilising the bootstrapped target. Mnih et al. (2015) showed a single DQN architecture learning 49 Atari games from raw pixels at human-level on many — the empirical breakthrough that ignited modern deep RL.\",\"domain\":\"other\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"reinforcement\",\"path-reinforcement\"],\"prerequisites\":[\"q-learning\",\"temporal-difference-learning\",\"convolutional-neural-network-cnn\",\"stochastic-gradient-descent-sgd\"],\"related\":[\"policy-gradient-theorem\",\"actor-critic-methods\",\"trust-region-policy-optimization-trpo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"policy-gradient-theorem\",\"title\":\"Policy Gradient Theorem\",\"summary\":\"For a stochastic policy \\\\( \\\\pi_\\\\theta(a \\\\mid s) \\\\), the gradient of expected return \\\\( J(\\\\theta) = \\\\mathbb{E}_{\\\\tau \\\\sim \\\\pi_\\\\theta}[G(\\\\tau)] \\\\) is \\\\( \\\\nabla_\\\\theta J(\\\\theta) = \\\\mathbb{E}_{\\\\pi_\\\\theta}[\\\\nabla_\\\\theta \\\\log \\\\pi_\\\\theta(A \\\\mid S) \\\\cdot Q^{\\\\pi_\\\\theta}(S, A)] \\\\). No gradient flows through the environment dynamics — the theorem turns RL into a stochastic optimisation over policy parameters. It is the foundation of REINFORCE, actor-critic, PPO, TRPO, and GRPO.\",\"domain\":\"other\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"reinforcement\",\"path-reinforcement\"],\"prerequisites\":[\"policy-reinforcement-learning\",\"value-function\",\"reinforce-algorithm\",\"actor-critic-methods\"],\"related\":[\"proximal-policy-optimization-ppo\",\"trust-region-policy-optimization-trpo\",\"generalized-advantage-estimation-gae\",\"grpo-group-relative-policy-optimization\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"trust-region-policy-optimization-trpo\",\"title\":\"Trust Region Policy Optimization (TRPO)\",\"summary\":\"TRPO performs policy updates by solving a constrained optimisation: maximise a surrogate advantage subject to \\\\( \\\\mathbb{E}[D_{\\\\text{KL}}(\\\\pi_\\\\text{old} \\\\| \\\\pi_\\\\theta)] \\\\le \\\\delta \\\\). The KL trust region gives a monotonic-improvement guarantee and prevents collapse under function approximation. TRPO is solved by natural-gradient + line search; PPO is its first-order clipped approximation with near-identical performance at much lower cost.\",\"domain\":\"other\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"reinforcement\",\"path-reinforcement\"],\"prerequisites\":[\"policy-gradient-theorem\",\"proximal-policy-optimization-ppo\",\"kl-divergence\",\"conjugate-gradient-method\"],\"related\":[\"kkt-conditions-and-lagrangian-duality\",\"the-fisher-information-matrix\",\"generalized-advantage-estimation-gae\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bert-bidirectional-encoder-pretraining\",\"title\":\"BERT: Bidirectional Encoder Pretraining\",\"summary\":\"BERT (Devlin et al., 2019) is a Transformer encoder pretrained with masked language modelling (MLM) and next-sentence prediction (NSP), producing bidirectional contextual representations. Unlike GPT's causal, left-to-right pretraining, MLM sees both past and future tokens, making BERT the go-to encoder for classification, span extraction, and sentence embeddings. Base/Large variants (110M/340M params) dominated GLUE/SQuAD until decoder-only LLMs took over.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"path-transformer-llm\"],\"prerequisites\":[\"masked-language-model\",\"transformer\",\"encoder-transformer\",\"self-attention\"],\"related\":[\"gpt-1-generative-pre-training\",\"elmo-embeddings-from-language-models\",\"t5-text-to-text-transfer-transformer\",\"wordpiece-unigram-sentencepiece-tokenization\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"wordpiece-unigram-sentencepiece-tokenization\",\"title\":\"WordPiece, Unigram, and SentencePiece Tokenisation\",\"summary\":\"Three subword tokenisers complement BPE: WordPiece greedily builds a vocabulary by maximising training-data likelihood per merge (used by BERT); Unigram starts from a large vocabulary and prunes by likelihood (used by XLNet, mT5); SentencePiece is an \u003ci\u003eimplementation\u003c/i\u003e that treats input as a raw byte stream including whitespace, letting tokenisation work language-agnostically.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"implementation\",\"path-transformer-llm\"],\"prerequisites\":[\"byte-pair-encoding-bpe\",\"tokenization\",\"subword-tokenization\"],\"related\":[\"bert-bidirectional-encoder-pretraining\",\"t5-text-to-text-transfer-transformer\",\"vocabulary\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"prefix-tuning-and-prompt-tuning\",\"title\":\"Prefix-Tuning and Prompt-Tuning\",\"summary\":\"Prefix-tuning (Li \u0026amp; Liang, 2021) and prompt-tuning (Lester et al., 2021) are parameter-efficient fine-tuning methods that freeze the base LM and learn only a small set of \u003ci\u003esoft prompt\u003c/i\u003e vectors prepended to the input (prompt-tuning) or concatenated to each layer's keys and values (prefix-tuning). With \u0026lt; 0.1% trainable parameters, they match full fine-tuning at sufficient scale — the input-side counterpart to LoRA's weight-side adaptation.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"implementation\",\"path-transformer-llm\"],\"prerequisites\":[\"parameter-efficient-fine-tuning-peft\",\"low-rank-adaptation-lora\",\"transformer\",\"self-attention\"],\"related\":[\"finetuning\",\"supervised-fine-tuning-sft\",\"adapter-layers-houlsby\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adapter-layers-houlsby\",\"title\":\"Adapter Layers (Houlsby-style)\",\"summary\":\"Adapters (Houlsby et al., 2019) insert small bottleneck MLPs inside each Transformer block and train only them for downstream tasks, freezing the backbone. With ~3% trainable parameters they match full fine-tune on GLUE, launched the PEFT literature, and remain the cleanest conceptual template. LoRA later dominated in practice, but adapters are the original.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"implementation\",\"landmark\",\"path-transformer-llm\"],\"prerequisites\":[\"parameter-efficient-fine-tuning-peft\",\"transformer\",\"finetuning\"],\"related\":[\"low-rank-adaptation-lora\",\"prefix-tuning-and-prompt-tuning\",\"supervised-fine-tuning-sft\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mixture-of-depths\",\"title\":\"Mixture of Depths (MoD)\",\"summary\":\"Mixture of Depths (Raposo et al., 2024) lets each token choose whether to go through the expensive self-attention + MLP stack at each layer, or to skip it via a residual. A small router predicts a saliency score; the top-\\\\( k \\\\) tokens per batch compute, the rest pass through. This per-token adaptive compute is the depth-axis counterpart of Mixture-of-Experts (width-axis) and substantially reduces FLOPs at matched quality.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"architecture\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\",\"transformer\",\"router-network\",\"top-k-routing\"],\"related\":[\"switch-transformer\",\"sparsely-gated-mixture-of-experts-moe\",\"speculative-decoding\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gpu-memory-hierarchy-and-roofline-model\",\"title\":\"GPU Memory Hierarchy and the Roofline Model\",\"summary\":\"Modern GPUs have a layered memory hierarchy: HBM (high-bandwidth global, ~1–3 TB/s), L2 cache, SRAM / shared memory per SM (~20 TB/s), and registers. The roofline model plots achievable throughput vs arithmetic intensity: low-intensity kernels are memory-bound (limited by HBM bandwidth), high-intensity kernels compute-bound (limited by peak FLOPs). Understanding the roofline is the fastest way to spot the bottleneck of any GPU kernel.\",\"domain\":\"other\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"gpu-acceleration\",\"cuda\",\"inference-optimization\"],\"related\":[\"arithmetic-intensity\",\"flashattention\",\"tensor-cores-gemm-fundamentals\",\"triton-gpu-kernel-programming\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"nccl-collectives-allreduce-allgather-reducescatter\",\"title\":\"NCCL Collectives: All-Reduce, All-Gather, Reduce-Scatter\",\"summary\":\"NCCL (NVIDIA Collective Communications Library) implements ring and tree algorithms for GPU-to-GPU communication primitives — the building blocks of distributed deep learning. All-reduce sums gradients across workers; reduce-scatter + all-gather are the two halves of all-reduce, exploited by ZeRO and FSDP to shard parameters. Understanding these primitives is essential to reasoning about training scalability.\",\"domain\":\"other\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"data-parallelism\",\"distributed-computing-ml-training\",\"fully-sharded-data-parallel-fsdp\"],\"related\":[\"zero-zero-redundancy-optimizer\",\"gpu-memory-hierarchy-and-roofline-model\",\"mixed-precision-training\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"arithmetic-intensity\",\"title\":\"Arithmetic Intensity\",\"summary\":\"Arithmetic intensity \\\\( I = \\\\text{FLOPs}/\\\\text{bytes moved} \\\\) quantifies how much compute a kernel performs per byte it reads or writes. It places any kernel on the roofline: low \\\\( I \\\\) → memory-bound, high \\\\( I \\\\) → compute-bound. Optimisation strategy flips sign with \\\\( I \\\\) — reduce bytes vs reduce FLOPs. Understanding \\\\( I \\\\) is the single most valuable concept for reasoning about GPU performance.\",\"domain\":\"other\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"gpu-memory-hierarchy-and-roofline-model\",\"floating-point-operations-flops\"],\"related\":[\"flashattention\",\"gradient-checkpointing-activation-recomputation\",\"key-value-kv-caching\",\"tensor-cores-gemm-fundamentals\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"triton-gpu-kernel-programming\",\"title\":\"Triton GPU Kernel Programming\",\"summary\":\"Triton (OpenAI, 2019) is a Python-embedded DSL for writing high-performance GPU kernels. It exposes tile-level primitives (block pointers, block-scoped arithmetic, automatic vectorisation) while hiding shared-memory management and thread-level scheduling. FlashAttention-2, Mamba kernels, many PyTorch 2 inductor-generated kernels, and most modern custom ops are written in Triton — fast enough to match hand-tuned CUTLASS with far less code.\",\"domain\":\"other\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"path-scaling-advanced\"],\"prerequisites\":[\"gpu-acceleration\",\"cuda\",\"gpu-memory-hierarchy-and-roofline-model\"],\"related\":[\"flashattention\",\"arithmetic-intensity\",\"tensor-cores-gemm-fundamentals\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"llava-visual-instruction-tuning\",\"title\":\"LLaVA: Visual Instruction Tuning\",\"summary\":\"LLaVA (Liu et al., 2023) connects a frozen CLIP vision encoder to a frozen LLM via a small learned projection, then instruction-tunes the combined model on GPT-4-generated multimodal dialogues. The recipe is minimal — a single linear (later two-layer MLP) projector — yet competitive with closed VLMs, establishing the canonical open VLM pattern: (pretrained vision encoder) + (learned bridge) + (pretrained LLM) + (visual instruction data).\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"cv\",\"ml\",\"nlp\",\"path-transformer-llm\",\"path-vision\"],\"prerequisites\":[\"vision-language-model-vlm\",\"clip-contrastive-language-image-pre-training\",\"instruction-tuning\",\"vision-encoder\"],\"related\":[\"vision-transformer-vit\",\"cross-attention\",\"parameter-efficient-fine-tuning-peft\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"audio-language-models-audiolm-musiclm\",\"title\":\"Audio Language Models (AudioLM, MusicLM)\",\"summary\":\"Audio language models tokenise raw audio into discrete codes via neural audio codecs (SoundStream, Encodec), then model sequences of codes with a Transformer — the same next-token-prediction recipe as LLMs, applied to audio. AudioLM (Borsos et al., 2022) uses a two-level hierarchy of semantic and acoustic tokens for speech continuation; MusicLM extends to text-conditioned music generation.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"path-transformer-llm\"],\"prerequisites\":[\"autoregressive-language-model\",\"encodec-neural-audio-codecs\",\"transformer\",\"tokenization\"],\"related\":[\"whisper-speech-to-text\",\"vision-transformer-vit\",\"next-token-prediction-objective-causal-language-modeling\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hnsw-hierarchical-navigable-small-world\",\"title\":\"HNSW (Hierarchical Navigable Small World)\",\"summary\":\"HNSW is the graph-based approximate nearest-neighbour (ANN) algorithm powering most production vector databases. It maintains a multi-layer proximity graph where each layer is a small-world graph at a different density; search descends from sparse top layers to dense bottom layers by greedy edge-following. Query cost is \\\\( O(\\\\log n) \\\\); recall-latency trade-off is tunable per query.\",\"domain\":\"other\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"implementation\",\"path-transformer-llm\"],\"prerequisites\":[\"nearest-neighbor-search\",\"cosine-similarity\",\"vector-database\",\"dense-retrieval\"],\"related\":[\"retrieval-augmented-generation-rag\",\"semantic-search\",\"embedding-vector\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"colbert-late-interaction-retrieval\",\"title\":\"ColBERT and Late-Interaction Retrieval\",\"summary\":\"ColBERT (Khattab \u0026amp; Zaharia, 2020) represents each document as a bag of contextualised token vectors rather than a single vector, and scores against a query via \u003cb\u003eMaxSim\u003c/b\u003e: for each query token, find its best-matching document token and sum the similarities. Late interaction preserves token-level granularity that pooling destroys, closing the quality gap between dense retrievers and cross-encoders at a fraction of the cost.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"implementation\",\"path-transformer-llm\"],\"prerequisites\":[\"dense-retrieval\",\"bm25\",\"semantic-search\",\"bert-bidirectional-encoder-pretraining\"],\"related\":[\"retrieval-augmented-generation-rag\",\"hnsw-hierarchical-navigable-small-world\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"graph-convolutional-network-gcn\",\"title\":\"Graph Convolutional Network (GCN)\",\"summary\":\"Kipf \u0026amp; Welling's GCN (2017) applies a first-order spectral convolution on graphs: each node's representation is updated as a normalised sum of its neighbours' features, \\\\( H^{(\\\\ell+1)} = \\\\sigma(\\\\tilde D^{-1/2} \\\\tilde A \\\\tilde D^{-1/2} H^{(\\\\ell)} W^{(\\\\ell)}) \\\\). The symmetric normalisation comes from a spectral argument; practically, it is the simplest and most widely-taught GNN layer, setting the template for all message-passing architectures.\",\"domain\":\"supervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"architecture\",\"path-core-foundations\"],\"prerequisites\":[\"message-passing-in-graph-neural-networks-gnns\",\"neural-network\",\"eigenvalues-and-eigenvectors\"],\"related\":[\"graph-attention-network-gat\",\"convolutional-neural-network-cnn\",\"representation-learning\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"graph-attention-network-gat\",\"title\":\"Graph Attention Network (GAT)\",\"summary\":\"GAT (Veličković et al., 2018) replaces GCN's fixed degree-normalised aggregation with \u003cb\u003eattention\u003c/b\u003e: each node learns per-edge weights via a shared attention mechanism. This gives inductive generalisation (no dependence on the full graph's degree matrix), handles heterogeneous neighbourhoods, and approaches Transformer-style flexibility — though at higher computational cost than GCN.\",\"domain\":\"supervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"architecture\",\"attention\",\"path-core-foundations\"],\"prerequisites\":[\"graph-convolutional-network-gcn\",\"attention-mechanism\",\"multi-head-attention\"],\"related\":[\"message-passing-in-graph-neural-networks-gnns\",\"self-attention\",\"transformer\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"active-inference-and-free-energy-principle\",\"title\":\"Active Inference and the Free-Energy Principle\",\"summary\":\"Friston's free-energy principle frames perception, learning, and action as minimising a single quantity — variational free energy, a KL-plus-accuracy bound on surprise. Active inference extends the principle to behaviour: agents select actions that minimise expected free energy, simultaneously seeking reward and information. It is a generative-model-based alternative to classical RL with tight links to variational inference, ELBO, and exploration–exploitation.\",\"domain\":\"foundations\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"reinforcement\",\"path-core-foundations\",\"path-reinforcement\"],\"prerequisites\":[\"variational-inference-elbo\",\"kl-divergence\",\"evidence-lower-bound-elbo-derivation\",\"reinforcement-learning-rl\"],\"related\":[\"world-model\",\"reinforce-algorithm\",\"policy-gradient-theorem\",\"multi-armed-bandits\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"wasserstein-distance-optimal-transport\",\"title\":\"Wasserstein Distance \u0026 Optimal Transport\",\"summary\":\"The \\\\( p \\\\)-Wasserstein distance \\\\( W_p(\\\\mu,\\\\nu) = \\\\inf_{\\\\gamma \\\\in \\\\Pi(\\\\mu,\\\\nu)} \\\\big( \\\\mathbb{E}_{(x,y)\\\\sim\\\\gamma}\\\\|x-y\\\\|^p \\\\big)^{1/p} \\\\) measures the minimum cost of reshaping distribution \\\\( \\\\mu \\\\) into \\\\( \\\\nu \\\\). It underpins WGAN, flow matching, and a whole family of divergences that remain well-behaved when KL blows up.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-core-foundations\",\"path-generative-models\"],\"prerequisites\":[\"probability-distribution\",\"kl-divergence\",\"multivariate-gaussian-distribution\"],\"related\":[\"gan-minimax-objective\",\"flow-matching-rectified-flow\",\"f-divergences-unified-view\",\"jensens-inequality\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"f-divergences-unified-view\",\"title\":\"f-Divergences (Unified View)\",\"summary\":\"For any convex \\\\( f \\\\) with \\\\( f(1) = 0 \\\\), the \\\\( f \\\\)-divergence \\\\( D_f(P \\\\| Q) = \\\\mathbb{E}_Q[f(dP/dQ)] \\\\) recovers KL (\\\\( f = t \\\\log t \\\\)), reverse KL, Jensen–Shannon, total variation, \\\\( \\\\chi^2 \\\\), Hellinger, and α-divergences as special cases. The variational (Fenchel) form underlies f-GAN and density-ratio estimation.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-core-foundations\",\"path-generative-models\"],\"prerequisites\":[\"kl-divergence\",\"jensens-inequality\",\"convex-function\"],\"related\":[\"wasserstein-distance-optimal-transport\",\"gan-minimax-objective\",\"noise-contrastive-estimation\",\"mutual-information-and-conditional-entropy\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ito-calculus-stochastic-differential-equations\",\"title\":\"Itô Calculus \u0026 Stochastic Differential Equations\",\"summary\":\"Itô calculus extends ordinary calculus to processes driven by Brownian motion. An SDE \\\\( dX_t = \\\\mu(X_t, t)\\\\,dt + \\\\sigma(X_t, t)\\\\,dW_t \\\\) combines a drift and a diffusion term; Itô's lemma replaces the chain rule. This is the mathematical substrate of score-based diffusion models, flow matching, and neural SDEs.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"probability-distribution\",\"multivariate-gaussian-distribution\",\"taylor-series-expansion\"],\"related\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"score-matching\",\"fokker-planck-probability-flow-ode\",\"score-based-sdes-continuous-diffusion\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"fokker-planck-probability-flow-ode\",\"title\":\"Fokker–Planck \u0026 Probability-Flow ODE\",\"summary\":\"The Fokker–Planck equation \\\\( \\\\partial_t p_t = -\\\\nabla \\\\cdot (f p_t) + \\\\tfrac{1}{2} \\\\nabla^2 : (g g^\\\\top p_t) \\\\) governs how the density of an SDE-driven process evolves. The probability-flow ODE shares these exact marginals with a deterministic vector field, enabling DDIM-style deterministic sampling and likelihood computation.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"ito-calculus-stochastic-differential-equations\",\"score-matching\",\"denoising-diffusion-probabilistic-models-ddpm\"],\"related\":[\"ddim-deterministic-diffusion-sampling\",\"flow-matching-rectified-flow\",\"score-based-sdes-continuous-diffusion\",\"neural-ode\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reproducing-kernel-hilbert-spaces-rkhs\",\"title\":\"Reproducing Kernel Hilbert Spaces (RKHS) \u0026 the Representer Theorem\",\"summary\":\"An RKHS is a Hilbert space of functions in which point evaluation is continuous, implemented by a kernel \\\\( k(x, y) \\\\) with the reproducing property \\\\( f(x) = \\\\langle f, k(\\\\cdot, x) \\\\rangle \\\\). The representer theorem says that the minimiser of any regularised empirical risk lies in the span of kernel evaluations on the training points — reducing infinite-dimensional optimisation to \\\\( n \\\\) coefficients.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"kernel-methods\",\"convex-optimization-fundamentals\",\"positive-semi-definite-matrices\"],\"related\":[\"support-vector-machine-svm\",\"gaussian-process-regression\",\"mercers-theorem-kernel-feature-maps\",\"kernel-pca\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mercers-theorem-kernel-feature-maps\",\"title\":\"Mercer's Theorem \u0026 Kernel Feature Maps\",\"summary\":\"Mercer's theorem: any continuous, symmetric, positive semi-definite kernel \\\\( k(x, y) \\\\) on a compact domain admits an eigendecomposition \\\\( k(x, y) = \\\\sum_i \\\\lambda_i \\\\phi_i(x) \\\\phi_i(y) \\\\). The map \\\\( \\\\varphi(x) = (\\\\sqrt{\\\\lambda_i} \\\\phi_i(x))_i \\\\) makes every kernel an inner product in a (possibly infinite-dimensional) Hilbert space.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"kernel-methods\",\"eigenvalues-and-eigenvectors\",\"positive-semi-definite-matrices\"],\"related\":[\"reproducing-kernel-hilbert-spaces-rkhs\",\"kernel-pca\",\"support-vector-machine-svm\",\"gaussian-process-regression\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"natural-gradient-fisher-rao-geometry\",\"title\":\"Natural Gradient \u0026 Fisher–Rao Geometry\",\"summary\":\"The natural gradient \\\\( \\\\tilde\\\\nabla_\\\\theta \\\\mathcal{L} = F(\\\\theta)^{-1} \\\\nabla_\\\\theta \\\\mathcal{L} \\\\) preconditions the Euclidean gradient by the inverse Fisher information matrix, yielding steepest descent under the KL-divergence metric on the statistical manifold. It underlies K-FAC, Shampoo, TRPO's trust region, and the original motivation for reparameterisation-invariant optimisation.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"theory\",\"reinforcement\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"the-fisher-information-matrix\",\"gradient-descent\",\"kl-divergence\"],\"related\":[\"trust-region-policy-optimization-trpo\",\"shampoo-kfac-preconditioners\",\"proximal-policy-optimization-ppo\",\"adam-optimizer\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hamiltonian-monte-carlo-hmc\",\"title\":\"Hamiltonian Monte Carlo (HMC) \u0026 NUTS\",\"summary\":\"HMC augments the target distribution with an auxiliary momentum variable and simulates Hamiltonian dynamics so that proposals move long distances while staying on near-constant-energy shells. It explores complex posteriors dramatically faster than random-walk Metropolis; the No-U-Turn Sampler (NUTS) adapts the integration length automatically.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"markov-chain-monte-carlo-mcmc\",\"metropolis-hastings-algorithm\",\"gradient-descent\"],\"related\":[\"gibbs-sampling\",\"variational-inference-elbo\",\"langevin-dynamics\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"metropolis-hastings-algorithm\",\"title\":\"Metropolis–Hastings Algorithm\",\"summary\":\"The canonical MCMC recipe: propose \\\\( \\\\theta' \\\\sim q(\\\\theta' \\\\mid \\\\theta) \\\\), accept with probability \\\\( \\\\min(1, \\\\pi(\\\\theta')q(\\\\theta\\\\mid\\\\theta')/[\\\\pi(\\\\theta)q(\\\\theta'\\\\mid\\\\theta)]) \\\\). Produces a Markov chain with stationary distribution \\\\( \\\\pi \\\\) for any valid proposal, turning intractable posterior sampling into a correctness-guaranteed iterative procedure.\",\"domain\":\"math\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"markov-chain-monte-carlo-mcmc\",\"probability-distribution\",\"bayes-theorem\"],\"related\":[\"gibbs-sampling\",\"hamiltonian-monte-carlo-hmc\",\"variational-inference-elbo\",\"the-markov-property\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gibbs-sampling\",\"title\":\"Gibbs Sampling\",\"summary\":\"A special case of Metropolis–Hastings: cycle through variables, sampling each from its full conditional \\\\( p(\\\\theta_j \\\\mid \\\\theta_{-j}, D) \\\\). When the conditionals are tractable (conjugate priors, mixture models, LDA), Gibbs is simple, always accepts, and has been the workhorse of Bayesian inference for four decades.\",\"domain\":\"math\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"markov-chain-monte-carlo-mcmc\",\"metropolis-hastings-algorithm\",\"conditional-probability\"],\"related\":[\"conjugate-priors\",\"hidden-markov-model-hmm\",\"gaussian-mixture-models-gmm\",\"variational-inference-elbo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"concentration-inequalities-hoeffding-bernstein\",\"title\":\"Concentration Inequalities (Hoeffding, Bernstein, McDiarmid)\",\"summary\":\"High-probability bounds on how far a sum or function of independent random variables can deviate from its mean. Hoeffding uses boundedness, Bernstein exploits known variance for a tighter bound, and McDiarmid handles functions whose value changes little when any single argument changes — the workhorses behind PAC / generalization proofs.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"central-limit-theorem\",\"variance-covariance-correlation\",\"probability-distribution\"],\"related\":[\"pac-bayes-bounds\",\"rademacher-complexity\",\"vc-dimension-and-shattering\",\"pac-learning-probably-approximately-correct\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pac-bayes-bounds\",\"title\":\"PAC-Bayes Generalization Bounds\",\"summary\":\"PAC-Bayes bounds the generalization gap of a stochastic classifier \\\\( Q \\\\) by a Kullback–Leibler term against a data-independent prior \\\\( P \\\\): with probability \\\\( 1 - \\\\delta \\\\), \\\\( \\\\mathbb{E}_{h\\\\sim Q}[R(h)] \\\\le \\\\mathbb{E}_{h\\\\sim Q}[\\\\hat R(h)] + O(\\\\sqrt{\\\\text{KL}(Q\\\\|P)/n}) \\\\). Used for non-vacuous bounds on overparameterised networks.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"pac-learning-probably-approximately-correct\",\"kl-divergence\",\"rademacher-complexity\",\"concentration-inequalities-hoeffding-bernstein\"],\"related\":[\"vc-dimension-and-shattering\",\"double-descent\",\"generalization\",\"neural-tangent-kernel-ntk\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"xgboost-lightgbm-catboost\",\"title\":\"XGBoost, LightGBM, and CatBoost\",\"summary\":\"Three production gradient-boosted-decision-tree implementations with distinct tree-construction strategies: XGBoost does level-wise exact/approximate splits with second-order Taylor objective; LightGBM uses histogram-based leaf-wise growth and GOSS subsampling; CatBoost uses ordered boosting to avoid target leakage with categorical features.\",\"domain\":\"supervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"product\",\"path-core-foundations\"],\"prerequisites\":[\"gradient-boosting-machines-gbm\",\"decision-tree\",\"loss-function\"],\"related\":[\"random-forest\",\"adaboost-adaptive-boosting\",\"bootstrap-aggregating-bagging\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hierarchical-clustering\",\"title\":\"Hierarchical Clustering \u0026 Linkage\",\"summary\":\"Builds a tree (dendrogram) of clusters either bottom-up (agglomerative: start with singletons, merge closest pairs) or top-down (divisive). The linkage criterion — single, complete, average, Ward — defines distance between clusters and dictates the cluster shapes the algorithm prefers.\",\"domain\":\"unsupervised\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intro\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"k-means-objective-function-inertia\"],\"related\":[\"dbscan-density-based-clustering\",\"spectral-clustering-graph-laplacian\",\"dimensionality-reduction\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"spectral-clustering-graph-laplacian\",\"title\":\"Spectral Clustering \u0026 the Graph Laplacian\",\"summary\":\"Construct a similarity graph over data points, embed each point into \\\\( \\\\mathbb{R}^k \\\\) using the \\\\( k \\\\) smallest eigenvectors of the graph Laplacian, and run k-means in that space. The Laplacian's spectrum encodes cluster structure as low-frequency eigenmodes — works for non-convex clusters where Euclidean k-means fails.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"k-means-objective-function-inertia\",\"eigenvalues-and-eigenvectors\",\"dimensionality-reduction\"],\"related\":[\"hierarchical-clustering\",\"graph-convolutional-network-gcn\",\"principal-component-analysis-pca\",\"kernel-pca\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"non-negative-matrix-factorization\",\"title\":\"Non-Negative Matrix Factorization (NMF)\",\"summary\":\"Factorise a nonnegative matrix \\\\( V \\\\approx W H \\\\) with \\\\( W, H \\\\ge 0 \\\\) entrywise. The nonnegativity constraint yields parts-based, interpretable components (topic–word, basis–image) and distinguishes NMF from PCA, whose sign-free components are typically holistic and hard to name.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"matrix-factorization-and-collaborative-filtering\",\"principal-component-analysis-pca\",\"gradient-descent\"],\"related\":[\"latent-space\",\"dimensionality-reduction\",\"independent-component-analysis\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"independent-component-analysis\",\"title\":\"Independent Component Analysis (ICA)\",\"summary\":\"ICA separates a linear mixture \\\\( x = A s \\\\) into statistically independent non-Gaussian sources by finding a de-mixing matrix \\\\( W \\\\) that maximises the non-Gaussianity of \\\\( y = W x \\\\). Classical application: the cocktail-party problem. Key distinction from PCA: maximises independence, not variance.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"principal-component-analysis-pca\",\"central-limit-theorem\",\"mutual-information-and-conditional-entropy\"],\"related\":[\"non-negative-matrix-factorization\",\"dimensionality-reduction\",\"kernel-pca\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"kernel-pca\",\"title\":\"Kernel PCA\",\"summary\":\"Principal component analysis in the implicit feature space of a positive-definite kernel \\\\( k(x, y) \\\\). Eigendecomposes the centred Gram matrix \\\\( K \\\\) rather than the data covariance; recovers non-linear principal directions without ever instantiating the feature map. Used for non-linear dimensionality reduction and feature extraction.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"principal-component-analysis-pca\",\"mercers-theorem-kernel-feature-maps\",\"eigenvalues-and-eigenvectors\"],\"related\":[\"reproducing-kernel-hilbert-spaces-rkhs\",\"spectral-clustering-graph-laplacian\",\"isomap-locally-linear-embedding\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"isomap-locally-linear-embedding\",\"title\":\"Isomap \u0026 Locally Linear Embedding (LLE)\",\"summary\":\"Two classical manifold-learning algorithms: Isomap replaces Euclidean distances with geodesic distances on a \\\\( k \\\\)-NN graph and applies MDS; LLE reconstructs each point from its neighbours' linear weights and finds a low-dimensional embedding that preserves those weights. Both set the conceptual stage for t-SNE and UMAP.\",\"domain\":\"unsupervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"principal-component-analysis-pca\",\"dimensionality-reduction\"],\"related\":[\"t-distributed-stochastic-neighbor-embedding-tsne\",\"umap-uniform-manifold-approximation\",\"spectral-clustering-graph-laplacian\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"conditional-random-fields\",\"title\":\"Conditional Random Fields (CRF)\",\"summary\":\"A discriminative model of \\\\( p(y \\\\mid x) = \\\\tfrac{1}{Z(x)} \\\\exp \\\\sum_k \\\\lambda_k f_k(y, x) \\\\) over structured outputs. Linear-chain CRFs add sequence-level constraints on top of per-token scores, enabling tractable training via forward–backward and Viterbi decoding — still the backbone of NER/tagging heads above neural encoders.\",\"domain\":\"supervised\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"hidden-markov-model-hmm\",\"logistic-regression\",\"log-likelihood\"],\"related\":[\"bayesian-networks-directed-graphical-models\",\"belief-propagation-sum-product\",\"maximum-likelihood-estimate-mle\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bayesian-networks-directed-graphical-models\",\"title\":\"Bayesian Networks \u0026 Directed Graphical Models\",\"summary\":\"A Bayesian network is a DAG \\\\( G \\\\) over variables whose joint factorises as \\\\( p(x) = \\\\prod_i p(x_i \\\\mid \\\\text{pa}_G(x_i)) \\\\). D-separation reads conditional independences off the graph; parameter learning uses MLE under complete data, EM under latent variables. The mathematical foundation of structured probabilistic modelling.\",\"domain\":\"math\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"chain-rule-of-probability\",\"conditional-probability\",\"bayes-theorem\"],\"related\":[\"hidden-markov-model-hmm\",\"belief-propagation-sum-product\",\"conditional-random-fields\",\"variational-inference-elbo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"belief-propagation-sum-product\",\"title\":\"Belief Propagation (Sum–Product Algorithm)\",\"summary\":\"A message-passing algorithm that computes exact marginals on tree-structured graphical models in linear time and approximate marginals (loopy BP) on general graphs. Each node sends summarising messages to neighbours; final beliefs equal the product of incoming messages.\",\"domain\":\"math\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"bayesian-networks-directed-graphical-models\",\"hidden-markov-model-hmm\",\"chain-rule-of-probability\"],\"related\":[\"conditional-random-fields\",\"variational-inference-elbo\",\"message-passing-in-graph-neural-networks-gnns\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"variational-autoencoder-vae\",\"title\":\"Variational Autoencoder (VAE)\",\"summary\":\"A latent-variable generative model trained by maximising the ELBO \\\\( \\\\mathcal{L}(x) = \\\\mathbb{E}_{q_\\\\phi(z\\\\mid x)}[\\\\log p_\\\\theta(x\\\\mid z)] - D_{\\\\text{KL}}(q_\\\\phi(z\\\\mid x)\\\\,\\\\|\\\\,p(z)) \\\\). The reparameterisation trick makes the encoder \\\\( q_\\\\phi \\\\) differentiable; the decoder \\\\( p_\\\\theta \\\\) learns to reconstruct \\\\( x \\\\) from latent codes \\\\( z \\\\sim \\\\mathcal{N}(0, I) \\\\).\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"generative\",\"landmark\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"reparameterization-trick-vae\",\"variational-inference-elbo\",\"autoencoders\",\"kl-divergence\"],\"related\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"normalizing-flows\",\"gan-minimax-objective\",\"evidence-lower-bound-elbo-derivation\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"beta-vae-disentanglement\",\"title\":\"β-VAE \u0026 Disentanglement\",\"summary\":\"β-VAE replaces the ELBO's KL term with a weighted \\\\( \\\\beta \\\\cdot D_{\\\\text{KL}} \\\\). Values \\\\( \\\\beta \u003e 1 \\\\) push the encoder toward an isotropic prior, encouraging each latent dimension to capture one independent factor of variation — the original disentanglement recipe.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"variational-autoencoder-vae\",\"kl-divergence\",\"evidence-lower-bound-elbo-derivation\"],\"related\":[\"latent-space\",\"autoencoders\",\"normalizing-flows\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"normalizing-flows\",\"title\":\"Normalizing Flows (RealNVP, Glow)\",\"summary\":\"Invertible neural networks \\\\( f_\\\\theta: \\\\mathbb{R}^d \\\\to \\\\mathbb{R}^d \\\\) with tractable Jacobian determinant. The change-of-variables formula \\\\( \\\\log p_X(x) = \\\\log p_Z(f(x)) + \\\\log |\\\\det J_f(x)| \\\\) gives exact likelihood; sampling runs \\\\( f^{-1} \\\\). RealNVP and Glow use coupling layers to make both directions \\\\( O(d) \\\\) per step.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"variational-autoencoder-vae\",\"multivariate-gaussian-distribution\",\"jacobian-and-hessian\"],\"related\":[\"autoregressive-flows-maf-iaf\",\"flow-matching-rectified-flow\",\"denoising-diffusion-probabilistic-models-ddpm\",\"variational-inference-elbo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"autoregressive-flows-maf-iaf\",\"title\":\"Autoregressive Flows (MAF \u0026 IAF)\",\"summary\":\"Flows in which the \\\\( i \\\\)-th output depends only on previous inputs \\\\( x_{\u003ci} \\\\), giving a triangular Jacobian. MAF (masked autoregressive flow) has fast density evaluation but slow sampling; IAF (inverse autoregressive flow) is the mirror image — fast sampling, slow density. Both are cornerstones of modern density estimation.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"normalizing-flows\",\"autoregressive-language-model\",\"chain-rule-of-probability\"],\"related\":[\"pixelcnn\",\"flow-matching-rectified-flow\",\"variational-autoencoder-vae\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"energy-based-models\",\"title\":\"Energy-Based Models (EBM)\",\"summary\":\"A generative model \\\\( p_\\\\theta(x) = \\\\exp(-E_\\\\theta(x))/Z(\\\\theta) \\\\) defined by a scalar energy \\\\( E_\\\\theta \\\\). The intractable normaliser \\\\( Z(\\\\theta) = \\\\int e^{-E_\\\\theta(x)} dx \\\\) precludes direct MLE; training uses contrastive divergence, score matching, or noise-contrastive estimation to approximate it.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"restricted-boltzmann-machines\",\"score-matching\",\"maximum-likelihood-estimate-mle\"],\"related\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"noise-contrastive-estimation\",\"variational-inference-elbo\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"restricted-boltzmann-machines\",\"title\":\"Restricted Boltzmann Machines (RBM)\",\"summary\":\"A bipartite EBM over visible and hidden binary units with energy \\\\( E(v, h) = -v^\\\\top W h - b^\\\\top v - c^\\\\top h \\\\). Conditional independence within each layer gives closed-form conditionals \\\\( p(h\\\\mid v), p(v\\\\mid h) \\\\); Hinton's Contrastive Divergence trains them and the RBM stack forms a deep belief net.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"generative\",\"historical\",\"landmark\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"energy-based-models\",\"autoencoders\",\"gibbs-sampling\"],\"related\":[\"deep-neural-network\",\"noise-contrastive-estimation\",\"variational-autoencoder-vae\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"noise-contrastive-estimation\",\"title\":\"Noise-Contrastive Estimation (NCE)\",\"summary\":\"Learn an unnormalised model \\\\( \\\\tilde p_\\\\theta(x) \\\\) by training a binary classifier to distinguish data samples from noise samples. The classifier's logit becomes \\\\( \\\\log \\\\tilde p_\\\\theta(x) - \\\\log q_{\\\\text{noise}}(x) \\\\), so the partition function is absorbed into a learnable constant. Foundation of word2vec's negative sampling and of InfoNCE contrastive learning.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"path-core-foundations\",\"path-generative-models\"],\"prerequisites\":[\"maximum-likelihood-estimate-mle\",\"cross-entropy\",\"logistic-regression\"],\"related\":[\"word2vec\",\"skip-gram\",\"contrastive-learning-simclr-moco\",\"energy-based-models\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"score-based-sdes-continuous-diffusion\",\"title\":\"Score-Based SDEs (Continuous-Time Diffusion)\",\"summary\":\"Song et al. (2021) showed that discrete-time DDPM and noise-conditional score models are both limits of a continuous-time SDE \\\\( dx = f(x,t)dt + g(t)dW \\\\). The unified framework gives a reverse-time SDE and a probability-flow ODE that share marginals, enabling flexible samplers (Euler, Heun, DPM-Solver) and exact likelihoods.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"ito-calculus-stochastic-differential-equations\",\"fokker-planck-probability-flow-ode\",\"score-matching\"],\"related\":[\"ddim-deterministic-diffusion-sampling\",\"flow-matching-rectified-flow\",\"denoising-score-matching\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gan-family-wgan-stylegan-biggan\",\"title\":\"GAN Family: WGAN, StyleGAN, BigGAN\",\"summary\":\"Three architectural and objective milestones: WGAN uses the Kantorovich–Rubinstein dual of \\\\( W_1 \\\\) as a smoother critic, StyleGAN introduces AdaIN-controlled style injection for image generation, BigGAN scales class-conditional GANs to 512×512 with orthogonal regularisation and truncation tricks.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"cv\",\"generative\",\"landmark\",\"ml\",\"path-generative-models\"],\"prerequisites\":[\"gan-minimax-objective\",\"wasserstein-distance-optimal-transport\",\"f-divergences-unified-view\"],\"related\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"classifier-free-guidance\",\"stable-diffusion-pipeline\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"u-net-architecture\",\"title\":\"U-Net Architecture\",\"summary\":\"A fully-convolutional encoder–decoder with symmetric skip connections between contracting and expanding paths. Designed for biomedical segmentation; now the standard backbone of Stable Diffusion and most pixel-to-pixel models because skip connections preserve spatial detail across downsampling.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"cv\",\"generative\",\"landmark\",\"ml\",\"path-generative-models\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"residual-connection-skip-connection\"],\"related\":[\"stable-diffusion-pipeline\",\"latent-diffusion\",\"denoising-diffusion-probabilistic-models-ddpm\",\"resnet-architecture\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"semantic-instance-segmentation\",\"title\":\"Semantic \u0026 Instance Segmentation\",\"summary\":\"Semantic segmentation assigns a class label to every pixel; instance segmentation further distinguishes object instances (two cats become two masks). Panoptic segmentation unifies them: one label per pixel with 'thing' vs 'stuff' classes. Backbones: FCN, DeepLab, Mask R-CNN, DETR/Mask2Former.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"cv\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"u-net-architecture\",\"vision-transformer-vit\"],\"related\":[\"object-detection-rcnn-detr\",\"yolo-family\",\"resnet-architecture\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"object-detection-rcnn-detr\",\"title\":\"Object Detection: R-CNN → Faster R-CNN → DETR\",\"summary\":\"R-CNN ran a CNN classifier on externally-proposed regions; Fast R-CNN shared backbone features across proposals; Faster R-CNN introduced a learned Region Proposal Network; DETR replaced the entire region-proposal pipeline with a transformer that predicts a fixed set of boxes via bipartite matching.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"cv\",\"landmark\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"vision-transformer-vit\",\"attention-mechanism\"],\"related\":[\"yolo-family\",\"semantic-instance-segmentation\",\"resnet-architecture\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"yolo-family\",\"title\":\"YOLO Family (v1 – v10)\",\"summary\":\"Single-stage detectors that divide the image into a grid and predict bounding boxes and class probabilities directly from a single CNN forward pass. YOLOv1 was real-time but coarse; YOLOv3–v10 progressively adopted anchor boxes, FPN, CSP blocks, decoupled heads, and finally anchor-free / NMS-free designs for edge deployment.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"cv\",\"implementation\",\"ml\",\"product\",\"path-core-foundations\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"object-detection-rcnn-detr\"],\"related\":[\"semantic-instance-segmentation\",\"resnet-architecture\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"nerf-gaussian-splatting\",\"title\":\"Neural Radiance Fields (NeRF) \u0026 3D Gaussian Splatting\",\"summary\":\"NeRF encodes a 3-D scene as a continuous function \\\\( (x, y, z, \\\\theta, \\\\phi) \\\\to (\\\\text{colour}, \\\\text{density}) \\\\) queried along camera rays and volume-rendered into pixels. 3D Gaussian Splatting replaces the implicit MLP with an explicit set of anisotropic Gaussians rasterised in real time.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"cv\",\"generative\",\"landmark\",\"ml\",\"path-generative-models\"],\"prerequisites\":[\"multilayer-perceptron-mlp\",\"positional-encoding\"],\"related\":[\"denoising-diffusion-probabilistic-models-ddpm\",\"vision-transformer-vit\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pointnet-3d-deep-learning\",\"title\":\"PointNet \u0026 3D Deep Learning on Point Clouds\",\"summary\":\"PointNet processes an unordered point set by applying a shared MLP to each point, then pooling across points with a symmetric function (max-pool). Permutation-invariant by construction; PointNet++ adds local-region hierarchies to capture geometric structure.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"cv\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"multilayer-perceptron-mlp\",\"convolutional-neural-network-cnn\"],\"related\":[\"graph-convolutional-network-gcn\",\"nerf-gaussian-splatting\",\"set-transformer-deep-sets\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-ode\",\"title\":\"Neural Ordinary Differential Equations\",\"summary\":\"A neural ODE defines the hidden-state evolution as \\\\( dh/dt = f_\\\\theta(h, t) \\\\), integrated by a black-box ODE solver. Training uses the adjoint method to back-propagate at constant memory regardless of solver depth. Connects residual networks to continuous flows and underlies continuous normalising flows and flow matching.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"generative\",\"ml\",\"theory\",\"path-generative-models\"],\"prerequisites\":[\"residual-connection-skip-connection\",\"multilayer-perceptron-mlp\",\"backpropagation\"],\"related\":[\"normalizing-flows\",\"flow-matching-rectified-flow\",\"ito-calculus-stochastic-differential-equations\",\"fokker-planck-probability-flow-ode\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pointer-networks\",\"title\":\"Pointer Networks\",\"summary\":\"A seq2seq architecture whose decoder outputs indices into the input sequence via attention weights (a 'pointer') rather than tokens from a fixed vocabulary. Ideal for combinatorial problems whose output vocabulary depends on the input (convex hull, TSP, sorting) and for extractive QA / span prediction.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"landmark\",\"ml\",\"nlp\",\"path-transformer-llm\"],\"prerequisites\":[\"attention-mechanism\",\"sequence-to-sequence-seq2seq\"],\"related\":[\"luong-attention-global-and-local\",\"encoder-decoder-architecture\",\"react-reason-act\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"siamese-networks-metric-learning\",\"title\":\"Siamese Networks \u0026 Metric Learning\",\"summary\":\"Train a shared encoder so that semantically similar inputs map to nearby embeddings (contrastive / triplet loss) or that query-key scores reflect similarity directly. Used in face verification, signature matching, image retrieval; the conceptual parent of SimCLR, CLIP, and BiEncoder retrieval.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"cv\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"cosine-similarity\",\"triplet-margin-loss\",\"loss-function\"],\"related\":[\"contrastive-learning-simclr-moco\",\"clip-contrastive-language-image-pre-training\",\"dense-retrieval\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"highway-networks\",\"title\":\"Highway Networks\",\"summary\":\"Predecessor to ResNet: a gated skip connection \\\\( y = H(x) \\\\cdot T(x) + x \\\\cdot (1 - T(x)) \\\\), where \\\\( T(x) \\\\in [0,1] \\\\) is a learned transform gate. Enabled training of 100+ layer networks before residual connections simplified the construction in ResNet.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"historical\",\"landmark\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"deep-neural-network\",\"residual-connection-skip-connection\",\"sigmoid\"],\"related\":[\"resnet-architecture\",\"gated-recurrent-unit-gru\",\"long-short-term-memory-lstm\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"capsule-networks\",\"title\":\"Capsule Networks\",\"summary\":\"Hinton's alternative to CNN pooling: neurons are grouped into 'capsules' whose vector output encodes both existence and pose of an entity. Dynamic routing by agreement replaces max-pool, so each capsule decides which higher-level capsule to vote for based on agreement. Historically significant; practically superseded by transformers.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"architecture\",\"cv\",\"historical\",\"ml\",\"path-core-foundations\"],\"prerequisites\":[\"convolutional-neural-network-cnn\",\"activation-function\"],\"related\":[\"vision-transformer-vit\",\"attention-mechanism\",\"pointnet-3d-deep-learning\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"memory-augmented-transformers\",\"title\":\"Memory-Augmented Transformers\",\"summary\":\"Transformer variants that extend effective context length with an external memory — Recurrent Memory Transformers (RMT) pass summary tokens across chunks, Memorizing Transformers retrieve past kNN keys, Infini-attention compresses the tail of context into a linear-attention state. A bridge between fixed-context Transformers and sequence models with unbounded memory.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"attention\",\"ml\",\"transformer\",\"path-transformer-llm\"],\"prerequisites\":[\"transformer\",\"attention-mechanism\",\"sliding-window-attention\",\"long-context-pretraining\"],\"related\":[\"retnet-retention-networks\",\"state-space-models-mamba\",\"linear-attention\",\"ring-attention-context-parallel\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"set-transformer-deep-sets\",\"title\":\"Set Transformer \u0026 Deep Sets (Permutation Invariance)\",\"summary\":\"Deep Sets: any permutation-invariant function on sets equals \\\\( \\\\rho(\\\\sum_i \\\\phi(x_i)) \\\\) for learnable \\\\( \\\\phi, \\\\rho \\\\). Set Transformer replaces the sum with self-attention via Induced Set Attention Blocks, giving element-wise interactions while remaining permutation-equivariant.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"attention\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"multilayer-perceptron-mlp\",\"self-attention\",\"pointnet-3d-deep-learning\"],\"related\":[\"pointer-networks\",\"graph-convolutional-network-gcn\"],\"updatedAt\":\"2026-04-18\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sharpness-aware-minimization-sam\",\"title\":\"Sharpness-Aware Minimization (SAM)\",\"summary\":\"Minimise a loss whose value is worst-case over a small \\\\( \\\\rho \\\\)-ball of weight perturbations: \\\\( \\\\min_\\\\theta \\\\max_{\\\\|\\\\varepsilon\\\\| \\\\le \\\\rho} \\\\mathcal{L}(\\\\theta + \\\\varepsilon) \\\\). The ascent step \\\\( \\\\varepsilon^\\\\star \\\\approx \\\\rho \\\\, \\\\nabla \\\\mathcal{L}/\\\\|\\\\nabla \\\\mathcal{L}\\\\| \\\\) biases training toward flat minima, improving generalisation across ViT, ResNet, and LLM finetuning.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"theory\",\"path-scaling-advanced\",\"path-core-foundations\"],\"prerequisites\":[\"gradient-descent\",\"stochastic-gradient-descent-sgd\",\"loss-landscape-flat-vs-sharp-minima\"],\"related\":[\"adamw-optimizer\",\"pac-bayes-bounds\",\"weight-decay\",\"double-descent
