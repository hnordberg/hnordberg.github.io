 toward zero without usually making them exactly sparse. In plain SGD it is equivalent to weight decay and is widely used because it improves stability and reduces variance.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"regularization\",\"l1-vs-l2-norms\"],\"related\":[\"l1-regularization-lasso\",\"weight-decay\",\"linear-regression\",\"adamw-optimizer\",\"maximum-a-posteriori-map-estimation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"early-stopping\",\"title\":\"Early stopping\",\"summary\":\"Early stopping regularizes training by halting optimization when validation performance stops improving and keeping the best checkpoint seen so far. It works because prolonged optimization can eventually fit noise or idiosyncrasies of the training set rather than signal.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"regularization\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"overfitting\",\"epoch\"],\"related\":[\"regularization\",\"dropout\",\"hyperparameter\",\"bias-variance-tradeoff\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hyperparameter\",\"title\":\"Hyperparameter\",\"summary\":\"A hyperparameter is a setting chosen outside the optimization loop, such as learning rate, model width, regularization strength, or batch size. Unlike learned parameters, hyperparameters govern how the model is trained or structured and are usually selected by validation.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[],\"related\":[\"learning-rate\",\"early-stopping\",\"epoch\",\"learning-rate-schedule\",\"data-leakage\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"data-leakage\",\"title\":\"Data leakage\",\"summary\":\"Data leakage occurs when information that would not be available at prediction time leaks into training or model selection, causing overly optimistic evaluation. Common examples are fitting preprocessing on the full dataset, peeking at test labels, or using future information in time-series tasks.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"generalization\"],\"related\":[\"overfitting\",\"hyperparameter\",\"benchmark-ml-evaluation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"backpropagation\",\"title\":\"Backpropagation\",\"summary\":\"Backpropagation computes gradients of a scalar loss with respect to all network parameters by applying the chain rule backward through the computation graph. It makes deep learning practical because it turns a complicated nested function into reusable local gradient calculations.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"chain-rule\",\"forward-pass\",\"backward-pass\"],\"related\":[\"automatic-differentiation\",\"gradient-descent\",\"neural-network\",\"backpropagation-through-time-bptt\",\"what-is-the-vanishing-gradient-problem\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"forward-pass\",\"title\":\"Forward pass\",\"summary\":\"The forward pass is the computation that maps input data through the model to produce activations and an output prediction. During training it also caches intermediate values needed later by the backward pass.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"backward-pass\",\"computational-graph\",\"backpropagation\",\"activation-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"backward-pass\",\"title\":\"Backward pass\",\"summary\":\"The backward pass propagates gradients from the loss back through the computation graph to determine how each parameter affected the final error. It uses stored forward-pass intermediates and the chain rule to accumulate derivatives efficiently.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"forward-pass\",\"chain-rule\"],\"related\":[\"backpropagation\",\"automatic-differentiation\",\"gradient-descent\",\"computational-graph\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"chain-rule\",\"title\":\"Chain rule\",\"summary\":\"The chain rule gives the derivative of a composition of functions by multiplying local derivatives along the computation path. It is the mathematical principle that backpropagation applies at scale throughout a neural network.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"composite-function\"],\"related\":[\"backpropagation\",\"automatic-differentiation\",\"backward-pass\",\"gradient-descent\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"automatic-differentiation\",\"title\":\"Automatic differentiation\",\"summary\":\"Automatic differentiation computes exact derivatives of a program by systematically composing derivatives of its primitive operations. Unlike symbolic differentiation it does not manipulate formulas, and unlike numerical differentiation it does not rely on finite-difference approximations.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"chain-rule\",\"computational-graph\"],\"related\":[\"backpropagation\",\"forward-pass\",\"backward-pass\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"computational-graph\",\"title\":\"Computational graph\",\"summary\":\"A computational graph represents a calculation as nodes for variables or operations and edges for data dependencies. It is useful because the same graph that defines the forward computation can also be traversed backward to perform automatic differentiation.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"automatic-differentiation\",\"forward-pass\",\"backward-pass\",\"neural-network\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-network\",\"title\":\"Neural network\",\"summary\":\"A neural network is a parameterized function built by composing affine transformations with nonlinear activations across layers. Its power comes from learning representations from data rather than relying on hand-crafted features for each task.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"neuron\",\"activation-function\",\"multilayer-perceptron-mlp\",\"deep-neural-network\",\"feedforward-neural-network\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"learning-rate\",\"title\":\"Learning rate\",\"summary\":\"The learning rate is the scalar that sets how large each optimization step is when parameters are updated. If it is too high training can diverge or oscillate, and if it is too low training can become extremely slow or get stuck.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"gradient-descent\"],\"related\":[\"learning-rate-schedule\",\"warmup\",\"hyperparameter\",\"adam-optimizer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"epoch\",\"title\":\"Epoch\",\"summary\":\"An epoch is one complete pass through the training dataset. In mini-batch training, an epoch consists of many updates, one for each batch needed to cover the data once.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[],\"related\":[\"mini-batch-gradient-descent\",\"learning-rate\",\"early-stopping\",\"hyperparameter\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"overfitting\",\"title\":\"Overfitting\",\"summary\":\"Overfitting happens when a model fits patterns specific to the training set, including noise, better than it captures the underlying data-generating structure. The usual symptom is low training error paired with substantially worse validation or test error.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"generalization\"],\"related\":[\"underfitting\",\"bias-variance-tradeoff\",\"regularization\",\"dropout\",\"early-stopping\",\"data-leakage\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"underfitting\",\"title\":\"Underfitting\",\"summary\":\"Underfitting happens when a model is too limited, too constrained, or too poorly trained to capture the main structure in the data. It usually shows up as high error on both training and validation data, indicating high bias rather than variance.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"generalization\"],\"related\":[\"overfitting\",\"bias-variance-tradeoff\",\"deep-neural-network\",\"hyperparameter\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neuron\",\"title\":\"Neuron\",\"summary\":\"A neuron in a neural network computes a weighted sum of its inputs, adds a bias, and applies an activation function. Collections of neurons form layers, so a single neuron's role is simple even though many together can represent complex functions.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"activation-function\",\"perceptron\",\"fully-connected-layer\",\"neural-network\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"activation-function\",\"title\":\"Activation function\",\"summary\":\"An activation function is the nonlinear mapping applied after an affine transformation in a neural network. It is what prevents a stack of layers from collapsing into one affine map, enabling deep networks to approximate complex functions.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"neuron\"],\"related\":[\"relu\",\"sigmoid\",\"tanh\",\"softmax\",\"swiglu-activation-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sigmoid\",\"title\":\"Sigmoid\",\"summary\":\"The sigmoid function maps a real number to a value between zero and one, making it easy to interpret as a probability or gate. Its downside is saturation at large positive or negative inputs, which can cause vanishing gradients in deep networks.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"activation-function\"],\"related\":[\"tanh\",\"logistic-regression\",\"binary-classification\",\"logit\",\"softmax\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tanh\",\"title\":\"Tanh\",\"summary\":\"The tanh function maps inputs to the range minus one to one and is zero-centered, which often makes optimization easier than with the sigmoid. Like the sigmoid, however, it still saturates at large magnitudes and can cause vanishing gradients.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"activation-function\"],\"related\":[\"sigmoid\",\"relu\",\"long-short-term-memory-lstm\",\"recurrent-neural-network-rnn\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"relu\",\"title\":\"ReLU\",\"summary\":\"ReLU outputs the positive part of its input and zero otherwise. It became the default activation in many deep networks because it is simple, cheap, and far less prone to saturation than sigmoid or tanh, though units can still die if they stay on the zero side.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"activation-function\"],\"related\":[\"sigmoid\",\"tanh\",\"he-initialization-kaiming-initialization\",\"swiglu-activation-function\",\"what-is-the-vanishing-gradient-problem\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"softmax\",\"title\":\"Softmax\",\"summary\":\"Softmax turns a vector of logits into a probability distribution by exponentiating and normalizing them so the components sum to one. It is commonly used for multiclass prediction because it converts arbitrary scores into class probabilities while preserving their ranking.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"activation-function\",\"discrete-probability-distribution\"],\"related\":[\"cross-entropy\",\"multiclass-classification\",\"softmax-temperature\",\"log-sum-exp-trick\",\"softmax-normalization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"fully-connected-layer\",\"title\":\"Fully connected layer\",\"summary\":\"A fully connected layer applies an affine transformation in which every output unit depends on every input feature. It is the standard dense layer used in multilayer perceptrons and as a projection block inside many larger architectures.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"affine-transformation\",\"neuron\"],\"related\":[\"multilayer-perceptron-mlp\",\"hidden-layer\",\"projection-matrix\",\"position-wise-mlp\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"input-layer\",\"title\":\"Input layer\",\"summary\":\"The input layer is the entry point of a network, where raw or preprocessed features are presented to the model. Unlike hidden layers, it usually performs little or no learned computation by itself and mainly defines the representation the rest of the network receives.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"hidden-layer\",\"output-layer\",\"embedding-layer\",\"fully-connected-layer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hidden-layer\",\"title\":\"Hidden layer\",\"summary\":\"A hidden layer is any internal layer between the input and output of a network. Hidden layers transform raw inputs into increasingly useful intermediate representations that the final output layer can read out.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"input-layer\",\"output-layer\",\"deep-neural-network\",\"multilayer-perceptron-mlp\",\"activation-function\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"output-layer\",\"title\":\"Output layer\",\"summary\":\"The output layer is the final transformation that maps a model's last hidden representation to a prediction space such as class logits, probabilities, or regression values. Its shape and activation depend on the task being solved.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"input-layer\",\"hidden-layer\",\"softmax\",\"softmax-head\",\"classification-head\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multilayer-perceptron-mlp\",\"title\":\"Multilayer perceptron (MLP)\",\"summary\":\"A multilayer perceptron is a feedforward neural network made of stacked fully connected layers and nonlinear activations. It is the canonical dense architecture for tabular function approximation and the feed-forward subnetwork inside many Transformer blocks.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"fully-connected-layer\",\"activation-function\"],\"related\":[\"deep-neural-network\",\"feedforward-neural-network\",\"neural-network\",\"position-wise-mlp\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"deep-neural-network\",\"title\":\"Deep neural network\",\"summary\":\"A deep neural network is a neural network with multiple hidden layers rather than just one or two. The extra depth lets it build hierarchical features and represent complex functions more efficiently than shallow networks in many settings.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"multilayer-perceptron-mlp\"],\"related\":[\"deep-learning\",\"feedforward-neural-network\",\"convolutional-neural-network-cnn\",\"recurrent-neural-network-rnn\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"deep-learning\",\"title\":\"Deep learning\",\"summary\":\"Deep learning is the study and practice of training multilayer neural networks on data to learn useful representations automatically. Its hallmark is end-to-end learning of features and predictors together, especially when large data and compute are available.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"deep-neural-network\",\"neural-network\",\"backpropagation\",\"representation-learning\",\"the-bitter-lesson\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"composite-function\",\"title\":\"Composite function\",\"summary\":\"A composite function applies one function to the output of another, such as f of g of x. Neural networks are composite functions at scale, which is why gradients are computed by repeatedly applying the chain rule.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"chain-rule\",\"deep-neural-network\",\"multilayer-perceptron-mlp\",\"backpropagation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"feedforward-neural-network\",\"title\":\"Feedforward neural network\",\"summary\":\"A feedforward neural network is a network whose computations move from input to output without recurrent cycles. Each layer depends only on earlier activations in the same pass, making feedforward networks the basic template for MLPs and many vision models.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"multilayer-perceptron-mlp\",\"convolutional-neural-network-cnn\",\"recurrent-neural-network-rnn\",\"computational-graph\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"convolutional-neural-network-cnn\",\"title\":\"Convolutional neural network (CNN)\",\"summary\":\"A convolutional neural network uses learned convolution filters with local receptive fields and weight sharing to process grid-like data such as images. Those inductive biases make CNNs especially effective and parameter-efficient for visual pattern recognition.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"cv\",\"foundational\",\"ml\",\"wiki-import\",\"path-architectures\",\"path-vision\"],\"prerequisites\":[\"feedforward-neural-network\"],\"related\":[\"imagenet-dataset\",\"recurrent-neural-network-rnn\",\"vision-encoder\",\"deep-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"recurrent-neural-network-rnn\",\"title\":\"Recurrent neural network (RNN)\",\"summary\":\"A recurrent neural network processes sequences by maintaining a hidden state that is updated one step at a time from the current input and previous state. This gives it a notion of temporal memory, but plain RNNs are hard to train on long dependencies because gradients can vanish or explode.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"hidden-state\",\"elman-rnn\",\"long-short-term-memory-lstm\",\"gated-recurrent-unit-gru\",\"backpropagation-through-time-bptt\",\"sequence-to-sequence-seq2seq\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"elman-rnn\",\"title\":\"Elman RNN\",\"summary\":\"An Elman RNN is the classic simple recurrent network in which the next hidden state is a nonlinear function of the current input and previous hidden state. It introduced the basic hidden-state recurrence used by later gated models, but long-range memory is poor without gating.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"nlp\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"recurrent-neural-network-rnn\"],\"related\":[\"hidden-state\",\"long-short-term-memory-lstm\",\"backpropagation-through-time-bptt\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hidden-state\",\"title\":\"Hidden state\",\"summary\":\"The hidden state is the internal representation a sequential model carries forward as it processes inputs over time. In an RNN or LSTM it summarizes relevant past context, and in broader neural architectures it usually means a layer's intermediate activation vector.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"recurrent-neural-network-rnn\",\"long-short-term-memory-lstm\",\"elman-rnn\",\"residual-connection-skip-connection\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"backpropagation-through-time-bptt\",\"title\":\"Backpropagation through time (BPTT)\",\"summary\":\"Backpropagation through time trains a recurrent network by unrolling it across sequence steps and applying backpropagation to the resulting deep computational graph. It exposes how earlier states influence later losses, but long unrolls make optimization and memory use difficult.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\"],\"prerequisites\":[\"backpropagation\",\"recurrent-neural-network-rnn\"],\"related\":[\"what-is-the-vanishing-gradient-problem\",\"long-short-term-memory-lstm\",\"hidden-state\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"what-is-the-vanishing-gradient-problem\",\"title\":\"What is the vanishing gradient problem?\",\"summary\":\"The vanishing gradient problem is the tendency for gradients propagated through many layers or time steps to shrink exponentially, making early parameters learn extremely slowly. It is especially severe in deep sigmoid or tanh networks and was a main motivation for LSTMs, better initialization, and residual connections.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"backpropagation\",\"chain-rule\"],\"related\":[\"long-short-term-memory-lstm\",\"residual-connection-skip-connection\",\"relu\",\"weight-initialization\",\"backpropagation-through-time-bptt\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"long-short-term-memory-lstm\",\"title\":\"Long short-term memory (LSTM)\",\"summary\":\"Long short-term memory is a gated recurrent architecture designed to preserve information over long timescales. Its input, forget, and output gates regulate a cell state with near-linear self-connections, which helps prevent the vanishing-gradient behavior of simple RNNs.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"recurrent-neural-network-rnn\",\"what-is-the-vanishing-gradient-problem\"],\"related\":[\"gated-recurrent-unit-gru\",\"xlstm\",\"backpropagation-through-time-bptt\",\"sequence-to-sequence-seq2seq\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"xlstm\",\"title\":\"xLSTM\",\"summary\":\"xLSTM is a family of modern LSTM variants that adds exponential gating and redesigned memory structures, including scalar-memory and matrix-memory forms, to make recurrent models more scalable. The goal is to keep LSTM-style recurrence while improving stability, parallelism, and long-context performance.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"nlp\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"long-short-term-memory-lstm\"],\"related\":[\"minlstm\",\"gated-recurrent-unit-gru\",\"recurrent-neural-network-rnn\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"minlstm\",\"title\":\"minLSTM\",\"summary\":\"minLSTM is a simplified LSTM variant designed to remove some of the sequential dependencies that make classical LSTMs expensive while keeping useful gating behavior. The result is a lighter recurrent block that can be trained more efficiently and scaled more easily.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"nlp\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"long-short-term-memory-lstm\"],\"related\":[\"xlstm\",\"gated-recurrent-unit-gru\",\"feedforward-neural-network\",\"hidden-state\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gated-recurrent-unit-gru\",\"title\":\"Gated recurrent unit (GRU)\",\"summary\":\"A gated recurrent unit is a recurrent architecture that uses update and reset gates to control how much past information is kept and how much new input is written into the hidden state. It is simpler than an LSTM because it has no separate cell state, yet it often achieves similar sequence-modeling performance.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"recurrent-neural-network-rnn\"],\"related\":[\"long-short-term-memory-lstm\",\"xlstm\",\"backpropagation-through-time-bptt\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"embedding-layer\",\"title\":\"Embedding layer\",\"summary\":\"An embedding layer maps discrete IDs such as words, subwords, or items to learned dense vectors. It is essential whenever symbolic inputs must be represented in a continuous space that gradient-based models can manipulate.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"one-hot-encoding\",\"vocabulary\"],\"related\":[\"embedding-vector\",\"word-embedding\",\"token-id\",\"representation-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"embedding-vector\",\"title\":\"Embedding vector\",\"summary\":\"An embedding vector is the dense continuous representation assigned to a discrete token, item, or entity by an embedding table or model. Its meaning comes from geometry: similar entities tend to occupy nearby directions or neighborhoods in the learned space.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"dense-vector\"],\"related\":[\"embedding-space\",\"word-embedding\",\"embedding-layer\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"word-embedding\",\"title\":\"Word embedding\",\"summary\":\"A word embedding is a dense vector representation of a word learned from distributional context rather than hand-coded features. Its purpose is to place semantically or syntactically related words near one another in vector space so downstream models can generalize across vocabulary items.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"embedding-vector\"],\"related\":[\"word2vec\",\"glove-word-embeddings\",\"fasttext\",\"semantic-similarity\",\"neural-probabilistic-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"word2vec\",\"title\":\"Word2Vec\",\"summary\":\"Word2Vec is a family of shallow neural methods that learn word embeddings from local context, most famously via the skip-gram and CBOW objectives. Its importance is that simple predictive training on large text corpora produced useful semantic geometry, including analogy-like linear regularities.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"word-embedding\",\"neural-network\"],\"related\":[\"skip-gram\",\"fasttext\",\"glove-word-embeddings\",\"semantic-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"skip-gram\",\"title\":\"Skip-gram\",\"summary\":\"Skip-gram trains a model to predict surrounding context words from a center word. It learns embeddings that are especially good for capturing rare-word semantics because each observed word directly becomes a prediction source for many context targets.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"word2vec\"],\"related\":[\"fasttext\",\"word-embedding\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"fasttext\",\"title\":\"FastText\",\"summary\":\"FastText extends Word2Vec by representing a word as a bag of character n-gram embeddings rather than as a single atomic vector. That lets it model morphology and produce reasonable embeddings for rare or even unseen words.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"word2vec\",\"subword\"],\"related\":[\"skip-gram\",\"word-embedding\",\"glove-word-embeddings\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"semantic-similarity\",\"title\":\"Semantic similarity\",\"summary\":\"Semantic similarity is the degree to which two words, sentences, or documents share meaning rather than just surface form. In machine learning it is often estimated with embeddings and cosine similarity, which turns meaning comparison into a geometric problem.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"embedding-vector\"],\"related\":[\"cosine-similarity\",\"word-embedding\",\"semantic-search\",\"semantic-space\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cosine-similarity\",\"title\":\"Cosine similarity\",\"summary\":\"Cosine similarity measures the angle between two vectors: \\\\( \\\\cos \\\\theta = x \\\\cdot y / (\\\\|x\\\\| \\\\|y\\\\|) \\\\). It ignores magnitude and compares direction, which is why it is the default similarity metric for embeddings in retrieval, clustering, and semantic search.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"dense-vector\"],\"related\":[\"semantic-similarity\",\"l1-vs-l2-norms\",\"embedding-space\",\"nearest-neighbor-search\",\"dense-retrieval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bag-of-words\",\"title\":\"Bag of words\",\"summary\":\"Bag of words represents a document by counts or weights of vocabulary terms while discarding word order and syntax. It is simple, sparse, and historically central to information retrieval and document classification, but it cannot distinguish sentences with the same words in different orders.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"tf-idf\",\"document-term-matrix\",\"n-gram\",\"sparse-vector\",\"word-embedding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"document-term-matrix\",\"title\":\"Document-term matrix\",\"summary\":\"A document-term matrix is a matrix whose rows are documents, columns are vocabulary terms, and entries are counts or weights such as TF-IDF. It is the core data structure behind bag-of-words retrieval, topic modeling, and many classical NLP pipelines.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"bag-of-words\"],\"related\":[\"tf-idf\",\"sparse-vector\",\"vocabulary\",\"information-retrieval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tf-idf\",\"title\":\"TF-IDF\",\"summary\":\"TF-IDF weights a term by how frequent it is in a document and how rare it is across the corpus, typically \\\\( tf(w,d) \\\\log(N/df(w)) \\\\). It downweights ubiquitous words and highlights terms that are especially informative for a given document.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"bag-of-words\",\"document-term-matrix\"],\"related\":[\"bm25\",\"sparse-retrieval\",\"zipf-s-law\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sparsity\",\"title\":\"Sparsity\",\"summary\":\"Sparsity means most entries in a vector, matrix, or parameter set are exactly zero. In ML it matters because sparse representations save memory and computation, and because sparsity-inducing penalties such as L1 can make models more interpretable.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"sparse-vector\",\"l1-regularization-lasso\",\"sparse-retrieval\",\"unstructured-pruning\",\"dense-vector\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dense-vector\",\"title\":\"Dense vector\",\"summary\":\"A dense vector is a low- or moderate-dimensional representation in which most entries are nonzero. Dense vectors are usually learned embeddings, so they capture semantic similarity better than sparse count vectors but are harder to interpret directly.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"sparse-vector\",\"embedding-vector\",\"dense-retrieval\",\"word-embedding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sparse-vector\",\"title\":\"Sparse vector\",\"summary\":\"A sparse vector has very few nonzero entries relative to its dimensionality. Classical text features such as bag-of-words and TF-IDF are sparse, which makes them memory-efficient and interpretable even when the feature space is huge.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"dense-vector\",\"one-hot-encoding\",\"sparsity\",\"bag-of-words\",\"sparse-retrieval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"one-hot-encoding\",\"title\":\"One-hot encoding\",\"summary\":\"One-hot encoding represents a categorical variable as a binary vector with exactly one 1 and all other entries 0. It preserves category identity without implying any ordering, but its dimensionality grows linearly with the number of categories.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"sparse-vector\",\"embedding-layer\",\"vocabulary\",\"softmax\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tokenization\",\"title\":\"Tokenization\",\"summary\":\"Tokenization is the process of splitting raw text into model-readable tokens such as words, subwords, bytes, or characters. It determines vocabulary size, sequence length, and how efficiently a language model handles rare words, multilingual text, and code.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[],\"related\":[\"token\",\"subword-tokenization\",\"byte-pair-encoding-bpe\",\"vocabulary\",\"tokenization-pipeline\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"token\",\"title\":\"Token\",\"summary\":\"A token is the discrete unit a language model reads and predicts. Depending on the tokenizer, a token may be a word, subword, byte, punctuation mark, or special control symbol, and token count determines both context usage and API cost.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"tokenization\"],\"related\":[\"subword\",\"token-id\",\"vocabulary\",\"special-tokens\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"subword\",\"title\":\"Subword\",\"summary\":\"A subword is a token unit smaller than a full word but larger than a character, learned to balance vocabulary size against sequence length. Subword tokenization lets models handle rare and novel words by composing them from reusable pieces.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"token\"],\"related\":[\"subword-tokenization\",\"byte-pair-encoding-bpe\",\"tokenization\",\"vocabulary\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vocabulary\",\"title\":\"Vocabulary\",\"summary\":\"A vocabulary is the fixed set of tokens a tokenizer can map text into and a model can natively process. Its size trades off compression against flexibility: larger vocabularies shorten sequences, while smaller ones rely more on subword or byte composition.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"tokenization\"],\"related\":[\"vocabulary-size\",\"token\",\"subword-tokenization\",\"document-term-matrix\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"corpus\",\"title\":\"Corpus\",\"summary\":\"A corpus is a structured collection of text used to train, fine-tune, or evaluate language models. Its size, quality, domain mix, and cleaning decisions strongly shape what a model knows, how it generalizes, and which biases it inherits.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"pretraining-corpus\",\"vocabulary\",\"n-gram\",\"language-model\",\"tokenization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"n-gram\",\"title\":\"N-gram\",\"summary\":\"An n-gram is a contiguous sequence of \\\\( n \\\\) tokens, such as a bigram for \\\\( n=2 \\\\) or trigram for \\\\( n=3 \\\\). N-grams are the basic units of classical language models and many text features because they capture short-range local context.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"count-based-language-model\",\"bag-of-words\",\"laplace-smoothing\",\"bleu\",\"subword-tokenization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"count-based-language-model\",\"title\":\"Count-based language model\",\"summary\":\"A count-based language model estimates sequence probabilities from n-gram counts in a corpus, then uses smoothing or backoff for unseen events. It was the dominant pre-neural approach to language modeling, but it struggles with long context and data sparsity.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"n-gram\",\"conditional-probability\"],\"related\":[\"laplace-smoothing\",\"backoff-n-gram-backoff\",\"language-model\",\"hidden-markov-model-hmm\",\"neural-probabilistic-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"language-model\",\"title\":\"Language model\",\"summary\":\"A language model assigns probabilities to token sequences, or equivalently predicts missing or next tokens from context. This unifies classical n-gram models, masked models like BERT, and autoregressive LLMs such as GPT under one probabilistic framework.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"autoregressive-language-model\",\"masked-language-model\",\"causal-language-model\",\"perplexity\",\"count-based-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"autoregressive-language-model\",\"title\":\"Autoregressive language model\",\"summary\":\"An autoregressive language model generates text left-to-right by modeling \\\\( P(w_t \\\\mid w_{\u003ct}) \\\\) for each token. Because it only conditions on past tokens, it can be used directly for open-ended generation as well as scoring sequences.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"language-model\",\"conditional-probability\"],\"related\":[\"causal-language-model\",\"masked-language-model\",\"decoder-only-transformer\",\"next-token-prediction-objective-causal-language-modeling\",\"autoregression\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"masked-language-model\",\"title\":\"Masked language model\",\"summary\":\"A masked language model is trained to recover tokens hidden within a sequence using both left and right context. This bidirectional training makes MLMs strong encoders for understanding tasks, but less natural than autoregressive models for direct generation.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"language-model\",\"self-attention\"],\"related\":[\"autoregressive-language-model\",\"encoder-transformer\",\"elmo-embeddings-from-language-models\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"causal-language-model\",\"title\":\"Causal language model\",\"summary\":\"A causal language model predicts each token using only earlier tokens, enforced by a causal attention mask. It is essentially the same modeling family as an autoregressive language model, with the word 'causal' emphasizing the masking constraint in self-attention.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"autoregressive-language-model\"],\"related\":[\"next-token-prediction-objective-causal-language-modeling\",\"causal-mask\",\"decoder-only-transformer\",\"masked-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"chat-language-model\",\"title\":\"Chat language model\",\"summary\":\"A chat language model is a pretrained LLM further tuned to follow instructions and handle multi-turn dialogue. It is usually built by supervised fine-tuning plus preference optimization or RLHF, so it behaves more helpfully and safely than the raw base model.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"causal-language-model\"],\"related\":[\"supervised-fine-tuning-sft\",\"prompting-format\",\"conversational-ai\",\"reinforcement-learning-from-human-feedback-rlhf\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"perplexity\",\"title\":\"Perplexity\",\"summary\":\"Perplexity is the exponentiated average negative log-likelihood of a test sequence, so lower perplexity means the model is less surprised by the data. It is a standard intrinsic metric for language models, though low perplexity does not guarantee downstream usefulness.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"cross-entropy\",\"language-model\"],\"related\":[\"negative-log-likelihood\",\"log-likelihood\",\"shannon-entropy\",\"n-gram\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"log-likelihood\",\"title\":\"Log-likelihood\",\"summary\":\"Log-likelihood is the logarithm of the probability a model assigns to the observed data under given parameter values. Taking logs turns products into sums, making estimation numerically stable and turning maximum likelihood into a tractable optimization problem.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"maximum-likelihood-estimate-mle\",\"probability-distribution\"],\"related\":[\"negative-log-likelihood\",\"cross-entropy\",\"perplexity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"negative-log-likelihood\",\"title\":\"Negative log-likelihood\",\"summary\":\"Negative log-likelihood is the loss obtained by negating the log-likelihood, so maximizing probability becomes minimizing a positive objective. It is the standard training loss for probabilistic classifiers, language models, and many generative models.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"log-likelihood\",\"maximum-likelihood-estimate-mle\"],\"related\":[\"cross-entropy\",\"binary-cross-entropy\",\"loss-function\",\"perplexity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"maximum-likelihood-estimate-mle\",\"title\":\"Maximum likelihood estimate (MLE)\",\"summary\":\"The maximum likelihood estimate selects the parameter values that make the observed data most probable under the model. Many standard ML objectives, including cross-entropy for classification and next-token prediction for LLMs, are just MLE written as minimization of negative log-likelihood.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\",\"log-likelihood\"],\"related\":[\"maximum-a-posteriori-map-estimation\",\"negative-log-likelihood\",\"ordinary-least-squares-ols-closed-form-solution\",\"laplace-smoothing\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"laplace-smoothing\",\"title\":\"Laplace smoothing\",\"summary\":\"Laplace smoothing adds a small constant, often 1, to every discrete count before normalizing probabilities. It prevents zero-probability events in models such as naive Bayes and n-gram LMs, though it can over-smooth when the vocabulary is large.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"conditional-probability\",\"n-gram\"],\"related\":[\"count-based-language-model\",\"maximum-likelihood-estimate-mle\",\"backoff-n-gram-backoff\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"conditional-probability\",\"title\":\"Conditional probability\",\"summary\":\"Conditional probability is the probability of an event after restricting attention to cases where another event is known to occur, written \\\\( P(A \\\\mid B) = P(A,B)/P(B) \\\\). It is the basic object behind Bayes' rule, autoregressive models, and all context-dependent prediction.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"maximum-a-posteriori-map-estimation\",\"laplace-smoothing\",\"autoregressive-language-model\",\"markov-chain-monte-carlo-mcmc\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"probability-distribution\",\"title\":\"Probability distribution\",\"summary\":\"A probability distribution specifies how probability mass or density is assigned over the possible outcomes of a random variable. In ML it is the central object because models learn, approximate, or transform distributions over labels, latent variables, sequences, or data.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"wiki-import\"],\"prerequisites\":[],\"related\":[\"discrete-probability-distribution\",\"conditional-probability\",\"maximum-likelihood-estimate-mle\",\"shannon-entropy\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"discrete-probability-distribution\",\"title\":\"Discrete probability distribution\",\"summary\":\"A discrete probability distribution assigns nonnegative probabilities to a countable set of outcomes that sum to 1. Softmax outputs in classification and next-token prediction are discrete distributions over labels or vocabulary items.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"softmax\",\"multiclass-classification\",\"log-likelihood\",\"shannon-entropy\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"backoff-n-gram-backoff\",\"title\":\"Backoff (N-gram backoff)\",\"summary\":\"Backoff is an n-gram smoothing strategy that uses a high-order estimate when it has enough evidence and otherwise falls back to a lower-order n-gram. It handles sparsity by preferring specific context when available without assigning zero probability to unseen sequences.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"n-gram\",\"count-based-language-model\"],\"related\":[\"laplace-smoothing\",\"language-model\",\"conditional-probability\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"zipf-s-law\",\"title\":\"Zipf's law\",\"summary\":\"Zipf's law says a word's frequency is roughly inversely proportional to its rank in the frequency table. This heavy-tailed structure explains why a few tokens dominate corpora, why vocabularies keep growing with more data, and why tokenization and smoothing are central in NLP.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"n-gram\",\"tokenization\",\"tf-idf\",\"bag-of-words\",\"subword-tokenization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cross-entropy\",\"title\":\"Cross-entropy\",\"summary\":\"Cross-entropy measures the average coding cost of samples from a true distribution \\\\( p \\\\) when encoded using a model distribution \\\\( q \\\\). In ML it is the standard loss for classification and language modeling, and minimizing it is equivalent to maximum likelihood up to an entropy constant.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"log-likelihood\",\"shannon-entropy\"],\"related\":[\"binary-cross-entropy\",\"negative-log-likelihood\",\"softmax\",\"classification\",\"perplexity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"binary-cross-entropy\",\"title\":\"Binary cross-entropy\",\"summary\":\"Binary cross-entropy is the cross-entropy loss for a Bernoulli target, typically \\\\( -[y\\\\log \\\\hat p + (1-y)\\\\log(1-\\\\hat p)] \\\\). It is the standard loss for binary classification and for multi-label problems where each label is predicted independently.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"cross-entropy\",\"binary-classification\"],\"related\":[\"negative-log-likelihood\",\"sigmoid\",\"logistic-regression\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"logit\",\"title\":\"Logit\",\"summary\":\"A logit is the raw score before sigmoid or softmax normalization. In binary settings, the logit is also the log-odds \\\\( \\\\log\\\\frac{p}{1-p} \\\\), which is why linear models such as logistic regression operate naturally in logit space.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"sigmoid\",\"softmax\",\"logistic-regression\",\"cross-entropy\",\"logit-adjustment\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"classification\",\"title\":\"Classification\",\"summary\":\"Classification is a supervised learning task in which the target is a discrete label rather than a continuous value. The model learns decision boundaries that separate classes, often outputting calibrated class probabilities as well as the predicted label.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"supervised-learning\"],\"related\":[\"binary-classification\",\"multiclass-classification\",\"regression\",\"logistic-regression\",\"accuracy\",\"cross-entropy\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"binary-classification\",\"title\":\"Binary classification\",\"summary\":\"Binary classification is classification with exactly two classes, usually framed as predicting the probability of a positive class. It is commonly trained with logistic regression or a sigmoid output and binary cross-entropy loss.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"classification\"],\"related\":[\"multiclass-classification\",\"logistic-regression\",\"binary-cross-entropy\",\"sigmoid\",\"receiver-operating-characteristic-roc-and-auc\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multiclass-classification\",\"title\":\"Multiclass classification\",\"summary\":\"Multiclass classification assigns each input to exactly one of \\\\( K\u003e2 \\\\) mutually exclusive classes. Models usually produce a softmax distribution over classes and train with cross-entropy against a one-hot or label-smoothed target.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"classification\"],\"related\":[\"binary-classification\",\"softmax\",\"cross-entropy\",\"logistic-regression\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"regression\",\"title\":\"Regression\",\"summary\":\"Regression is a supervised learning task where the target is continuous rather than categorical. The model predicts a numeric value, and common losses such as mean squared error correspond to assumptions about the noise model, especially Gaussian noise.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"supervised-learning\"],\"related\":[\"classification\",\"linear-regression\",\"mean-squared-error-mse\",\"prediction-error\",\"ordinary-least-squares-ols-closed-form-solution\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"linear-regression\",\"title\":\"Linear Regression\",\"summary\":\"Linear regression models a target as an affine function of the inputs, typically \\\\( y \\\\approx w^\\\\top x + b \\\\), and fits the parameters by minimizing squared residuals. It is the canonical baseline for regression because it is interpretable and often has a closed-form OLS solution.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"regression\",\"linear-function\"],\"related\":[\"linear-regression-basics\",\"ordinary-least-squares-ols-closed-form-solution\",\"logistic-regression\",\"mean-squared-error-mse\",\"l2-regularization-ridge-weight-decay\",\"l1-regularization-lasso\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"logistic-regression\",\"title\":\"Logistic Regression\",\"summary\":\"Logistic regression is a linear classifier that models the log-odds of a class as \\\\( w^\\\\top x + b \\\\) and maps that score through a sigmoid to get a probability. Despite its name, it is a classification model, not a regression model.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"linear-regression\",\"binary-classification\"],\"related\":[\"sigmoid\",\"binary-cross-entropy\",\"maximum-likelihood-estimate-mle\",\"support-vector-machine-svm\",\"softmax\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"accuracy\",\"title\":\"Accuracy\",\"summary\":\"Accuracy is the fraction of predictions that are correct, \\\\( (\\\\text{TP}+\\\\text{TN})/N \\\\). It is intuitive and useful when classes are balanced, but it can be badly misleading on imbalanced datasets where always predicting the majority class already yields high accuracy.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"classification\"],\"related\":[\"precision\",\"recall\",\"f1-score\",\"receiver-operating-characteristic-roc-and-auc\",\"confidence-interval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"precision\",\"title\":\"Precision\",\"summary\":\"Precision is the fraction of predicted positives that are truly positive, \\\\( \\\\text{TP}/(\\\\text{TP}+\\\\text{FP}) \\\\). It matters most when false positives are costly, such as spam filters, safety classifiers, or medical screening follow-ups.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"classification\"],\"related\":[\"recall\",\"f1-score\",\"accuracy\",\"receiver-operating-characteristic-roc-and-auc\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"recall\",\"title\":\"Recall\",\"summary\":\"Recall is the fraction of actual positives that the model successfully retrieves, \\\\( \\\\text{TP}/(\\\\text{TP}+\\\\text{FN}) \\\\). It matters most when missing positives is costly, such as fraud detection, disease screening, or retrieval systems where relevant items should not be overlooked.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"classification\"],\"related\":[\"precision\",\"f1-score\",\"accuracy\",\"receiver-operating-characteristic-roc-and-auc\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"f1-score\",\"title\":\"F1 Score\",\"summary\":\"F1 score is the harmonic mean of precision and recall, \\\\( 2PR/(P+R) \\\\). It is high only when both precision and recall are high, making it useful for imbalanced classification where accuracy hides the trade-off between false positives and false negatives.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"precision\",\"recall\"],\"related\":[\"accuracy\",\"receiver-operating-characteristic-roc-and-auc\",\"classification\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"rouge\",\"title\":\"ROUGE\",\"summary\":\"ROUGE is a family of overlap metrics for summarization and generation, based on matching n-grams, longest common subsequences, or skip-bigrams between a candidate and reference text. It measures lexical recall more than semantic faithfulness, so it is informative but limited.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"automated-evaluation\"],\"related\":[\"bleu\",\"longest-common-subsequence\",\"n-gram\",\"f1-score\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"longest-common-subsequence\",\"title\":\"Longest Common Subsequence\",\"summary\":\"The longest common subsequence is the longest sequence of symbols that appears in two sequences in the same order, not necessarily contiguously. It underlies edit-distance-style dynamic programming and metrics such as ROUGE-L because it captures shared sequence structure beyond exact n-gram matches.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"edit-distance\",\"rouge\",\"bleu\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"edit-distance\",\"title\":\"Edit Distance\",\"summary\":\"Edit distance is the minimum number of insertions, deletions, and substitutions needed to transform one sequence into another. The most common version, Levenshtein distance, is a dynamic-programming measure of string similarity used in spelling correction, alignment, and evaluation.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"longest-common-subsequence\",\"rouge\",\"bleu\",\"tokenization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"perceptron\",\"title\":\"Perceptron\",\"summary\":\"The perceptron is a linear threshold classifier that predicts a class from the sign of \\\\( w^\\\\top x + b \\\\) and updates its weights only on mistakes. It is historically important because it introduced gradient-like learning for linear separators, but it only converges when the data are linearly separable.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"binary-classification\"],\"related\":[\"neuron\",\"multilayer-perceptron-mlp\",\"support-vector-machine-svm\",\"logistic-regression\",\"decision-tree\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"decision-tree\",\"title\":\"Decision Tree\",\"summary\":\"A decision tree predicts by recursively splitting the feature space with if-then tests until a leaf assigns a class or value. Trees are easy to interpret and capture nonlinearity, but a single deep tree has high variance and overfits without pruning or ensembling.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"classification\"],\"related\":[\"random-forest\",\"information-gain-decision-trees\",\"gradient-boosting-machines-gbm\",\"adaboost-adaptive-boosting\",\"regression\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"random-forest\",\"title\":\"Random Forest\",\"summary\":\"A random forest is an ensemble of decision trees trained on bootstrap samples with random feature subsetting at each split. Averaging many decorrelated trees greatly reduces variance, which is why random forests are strong tabular baselines with little tuning.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"decision-tree\",\"bootstrap-aggregating-bagging\"],\"related\":[\"gradient-boosting-machines-gbm\",\"support-vector-machine-svm\",\"information-gain-decision-trees\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"support-vector-machine-svm\",\"title\":\"Support Vector Machine (SVM)\",\"summary\":\"A support vector machine finds the decision boundary that maximizes the margin between classes, depending only on the support vectors nearest the boundary. With kernels, SVMs can model nonlinear separators while retaining a convex optimization objective.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"binary-classification\",\"linear-function\"],\"related\":[\"kernel-methods\",\"lagrange-multipliers\",\"logistic-regression\",\"perceptron\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"kernel-methods\",\"title\":\"Kernel Methods\",\"summary\":\"Kernel methods turn linear algorithms into nonlinear ones by replacing inner products with a kernel function that implicitly measures similarity in a higher-dimensional feature space. This is the core trick behind SVMs, kernel ridge regression, and Gaussian processes.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"support-vector-machine-svm\"],\"related\":[\"principal-component-analysis-pca\",\"lagrange-multipliers\",\"cosine-similarity\",\"the-curse-of-dimensionality\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"principal-component-analysis-pca\",\"title\":\"Principal Component Analysis (PCA)\",\"summary\":\"Principal component analysis finds orthogonal directions of maximal variance in the data and projects onto the top few of them. It is a linear dimensionality-reduction method that compresses data, denoises features, and reveals dominant global structure through eigenvectors of the covariance matrix.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"singular-value-decomposition-svd\",\"linear-function\"],\"related\":[\"dimensionality-reduction\",\"autoencoders\",\"kernel-methods\",\"the-curse-of-dimensionality\",\"unsupervised-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dimensionality-reduction\",\"title\":\"Dimensionality Reduction\",\"summary\":\"Dimensionality reduction maps data into fewer dimensions while preserving as much important structure as possible, such as variance, distances, or neighborhood relations. It is used for compression, visualization, denoising, and making downstream learning easier in high-dimensional spaces.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"principal-component-analysis-pca\",\"singular-value-decomposition-svd\",\"autoencoders\",\"the-curse-of-dimensionality\",\"embedding-vector\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"transformer\",\"title\":\"Transformer\",\"summary\":\"A Transformer is a sequence model built from self-attention, position-wise MLPs, residual connections, and normalization, rather than recurrence or convolution. Its key advantage is that every token can directly attend to every other token in parallel, which made modern LLM scaling practical.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"landmark\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\",\"encoder-decoder-architecture\"],\"related\":[\"multi-head-attention\",\"decoder-only-transformer\",\"positional-encoding\",\"residual-connection-skip-connection\",\"layer-normalization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"decoder-block\",\"title\":\"Decoder Block\",\"summary\":\"A decoder block is the basic unit of a decoder-only Transformer: causal self-attention plus a position-wise MLP, wrapped with residual connections and normalization. Stacking these blocks lets the model mix context across tokens while preserving autoregressive generation.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\",\"position-wise-mlp\",\"residual-connection-skip-connection\"],\"related\":[\"decoder-only-transformer\",\"causal-masked-self-attention\",\"transformer\",\"pre-norm-vs-post-norm-architecture\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"decoder-only-transformer\",\"title\":\"Decoder-only Transformer\",\"summary\":\"A decoder-only Transformer is a Transformer architecture composed only of masked self-attention blocks, so each token can attend only to earlier tokens. This makes it the standard architecture for autoregressive language models such as GPT, LLaMA, and Claude.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"landmark\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"decoder-block\",\"causal-masked-self-attention\"],\"related\":[\"transformer\",\"autoregressive-language-model\",\"gpt-1-generative-pre-training\",\"encoder-decoder-architecture\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"self-attention\",\"title\":\"Self-Attention\",\"summary\":\"Self-attention lets each token compute a weighted combination of representations from other tokens in the same sequence, with weights determined by query-key similarity. It is the mechanism that gives Transformers flexible, content-dependent context mixing without recurrence.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"attention-mechanism\",\"query-key-value-qkv\"],\"related\":[\"multi-head-attention\",\"causal-masked-self-attention\",\"attention-head\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"attention-score\",\"title\":\"Attention Score\",\"summary\":\"An attention score is the compatibility value computed between a query and a key before normalization, often by dot product or a learned variant. Higher scores mean the corresponding token or memory slot should receive more weight after the softmax.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures
