ach sequence position its own encoding or embedding and combines it with token representations. It works well inside the trained context range, but it often extrapolates poorly because positions are treated as fixed IDs rather than relative distances.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"positional-encoding\"],\"related\":[\"sinusoidal-positional-encoding\",\"relative-position-encoding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"relative-position-encoding\",\"title\":\"Relative Position Encoding\",\"summary\":\"Relative position encoding represents how far apart tokens are rather than assigning each position a standalone ID. That lets attention depend on distance or offset, which often improves length generalization and transfers patterns more naturally across positions.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"positional-encoding\"],\"related\":[\"rotary-positional-embedding-rope\",\"absolute-position-encoding\",\"sinusoidal-positional-encoding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"token-id\",\"title\":\"Token ID\",\"summary\":\"A token ID is the integer index assigned to a token after tokenization. Models do not operate on raw text directly; they look up embeddings from token IDs and later map output logits back to IDs during decoding.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"token\",\"vocabulary\"],\"related\":[\"vocabulary-size\",\"embedding-layer\",\"tokenization-pipeline\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vocabulary-size\",\"title\":\"Vocabulary Size\",\"summary\":\"Vocabulary size is the number of distinct tokens a tokenizer can emit. A larger vocabulary shortens sequences but increases embedding and softmax size, while a smaller vocabulary produces longer sequences and more token fragmentation.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"vocabulary\"],\"related\":[\"token-id\",\"subword-tokenization\",\"byte-pair-encoding-bpe\",\"output-layer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"subword-tokenization\",\"title\":\"Subword Tokenization\",\"summary\":\"Subword tokenization splits text into frequent pieces smaller than words but larger than individual characters. It handles rare words and open vocabularies well by composing unfamiliar words from known subword units.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"tokenization\",\"subword\"],\"related\":[\"byte-pair-encoding-bpe\",\"vocabulary\",\"token\",\"zipf-s-law\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"special-tokens\",\"title\":\"Special Tokens\",\"summary\":\"Special tokens are reserved tokens with structural or control meaning, such as BOS, EOS, PAD, SEP, or mask tokens, rather than ordinary text content. They shape formatting, training objectives, and sometimes model behavior.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"tokenization\"],\"related\":[\"padding-token\",\"bos-token-beginning-of-sequence\",\"eos-token-end-of-sequence\",\"prompting-format\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"padding-token\",\"title\":\"Padding Token\",\"summary\":\"A padding token is a dummy token added so sequences in a batch have equal length. It should be ignored by the loss and usually masked from attention so it does not behave like real context.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"special-tokens\"],\"related\":[\"attention-mask\",\"bos-token-beginning-of-sequence\",\"eos-token-end-of-sequence\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bos-token-beginning-of-sequence\",\"title\":\"BOS Token (Beginning of Sequence)\",\"summary\":\"A BOS token marks the beginning of a sequence and gives the model a consistent start symbol for conditioning generation or encoding. It can help define sequence boundaries and sometimes carries special training semantics.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"special-tokens\"],\"related\":[\"eos-token-end-of-sequence\",\"padding-token\",\"autoregressive-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"eos-token-end-of-sequence\",\"title\":\"EOS Token (End of Sequence)\",\"summary\":\"An EOS token marks the end of a sequence and tells the model where generation should stop. During training it teaches sequence termination, and during inference it is one of the main stopping conditions.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"special-tokens\"],\"related\":[\"bos-token-beginning-of-sequence\",\"padding-token\",\"autoregressive-language-model\",\"greedy-decoding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"attention-mechanism\",\"title\":\"Attention Mechanism\",\"summary\":\"Attention computes a context-dependent weighted combination of values, where the weights come from similarities between queries and keys. It lets a model focus on the most relevant parts of an input instead of compressing everything into one fixed vector.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"attention\",\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"self-attention\",\"query-key-value-qkv\",\"cross-attention\",\"luong-attention-global-and-local\",\"key-value-memory-networks\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"encoder-decoder-architecture\",\"title\":\"Encoder-Decoder Architecture\",\"summary\":\"An encoder-decoder architecture uses an encoder to turn an input sequence into representations and a decoder to generate an output sequence conditioned on those representations. It is the standard design for translation, summarization, and other input-to-output generation tasks.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"transformer\",\"cross-attention\"],\"related\":[\"sequence-to-sequence-seq2seq\",\"encoder-transformer\",\"decoder-transformer\",\"t5-text-to-text-transfer-transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sequence-to-sequence-seq2seq\",\"title\":\"Sequence-to-Sequence (Seq2Seq)\",\"summary\":\"Sequence-to-sequence learning maps one sequence to another, often with different lengths, such as translation or summarization. Modern seq2seq models are usually encoder-decoder Transformers, though earlier versions used recurrent networks with attention.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"recurrent-neural-network-rnn\"],\"related\":[\"encoder-decoder-architecture\",\"long-short-term-memory-lstm\",\"attention-mechanism\",\"luong-attention-global-and-local\",\"t5-text-to-text-transfer-transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"distributed-representation\",\"title\":\"Distributed Representation\",\"summary\":\"A distributed representation stores a concept as a pattern across many features or neurons rather than in a single symbolic slot. This supports similarity, composition, and generalization because related concepts can occupy nearby regions of representation space.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"representation-learning\",\"embedding-vector\",\"word-embedding\",\"dense-vector\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"representation-learning\",\"title\":\"Representation Learning\",\"summary\":\"Representation learning is the process of learning useful features automatically from data rather than hand-engineering them. Good representations preserve the structure that downstream tasks need, such as semantic similarity, invariances, or factors of variation.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"distributed-representation\",\"embedding-vector\",\"word2vec\",\"autoencoders\",\"deep-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"latent-space\",\"title\":\"Latent Space\",\"summary\":\"A latent space is the internal feature space in which a model represents inputs after transformation, often in a form that is more compact or task-relevant than raw data. Distances or directions in latent space can encode meaningful variation, but only relative to the model and objective that learned it.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"generative\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-vision\"],\"prerequisites\":[],\"related\":[\"embedding-space\",\"autoencoders\",\"reparameterization-trick-vae\",\"principal-component-analysis-pca\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"embedding-space\",\"title\":\"Embedding Space\",\"summary\":\"An embedding space is the vector space produced by an embedding model, where tokens, sentences, images, or other objects are mapped to dense numerical representations. Similarity in that space is used for retrieval, clustering, and transfer, though the geometry depends on the training objective.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"embedding-vector\"],\"related\":[\"latent-space\",\"nearest-neighbor-search\",\"semantic-space\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"nearest-neighbor-search\",\"title\":\"Nearest Neighbor Search\",\"summary\":\"Nearest neighbor search finds the stored vectors most similar to a query under a chosen distance or similarity metric. Exact search is simple but expensive at scale, so large systems often use approximate nearest neighbor indexes instead.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"wiki-import\",\"path-scaling-advanced\"],\"prerequisites\":[\"embedding-vector\",\"cosine-similarity\"],\"related\":[\"vector-database\",\"semantic-search\",\"dense-retrieval\",\"embedding-space\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vector-database\",\"title\":\"Vector Database\",\"summary\":\"A vector database is a system optimized for storing embeddings and retrieving nearest neighbors together with metadata filtering, updates, and persistence. It is the common serving layer behind semantic search and many RAG systems.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"product\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"embedding-vector\"],\"related\":[\"nearest-neighbor-search\",\"semantic-search\",\"dense-retrieval\",\"retrieval-augmented-generation-rag\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bm25\",\"title\":\"BM25\",\"summary\":\"BM25 is a sparse retrieval scoring function that ranks documents using term matches weighted by inverse document frequency and document-length normalization. It remains strong for exact lexical search and is often combined with dense retrieval in hybrid systems.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"tf-idf\",\"information-retrieval\"],\"related\":[\"sparse-retrieval\",\"dense-retrieval\",\"document-term-matrix\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sparse-retrieval\",\"title\":\"Sparse Retrieval\",\"summary\":\"Sparse retrieval represents queries and documents with sparse term-based features such as inverted indexes, TF-IDF, or BM25. It excels at exact keywords and rare identifiers, but is weaker than dense retrieval on paraphrases and semantic matching.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"information-retrieval\",\"sparse-vector\"],\"related\":[\"bm25\",\"tf-idf\",\"dense-retrieval\",\"document-term-matrix\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dense-retrieval\",\"title\":\"Dense Retrieval\",\"summary\":\"Dense retrieval represents queries and documents with learned dense embeddings and retrieves by vector similarity. It handles paraphrase and semantic matching better than sparse retrieval, but it can miss exact lexical constraints and usually relies on approximate nearest neighbor search.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"information-retrieval\",\"embedding-vector\"],\"related\":[\"sparse-retrieval\",\"semantic-search\",\"vector-database\",\"cosine-similarity\",\"nearest-neighbor-search\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"grounding\",\"title\":\"Grounding\",\"summary\":\"Grounding means tying a model’s answer to external evidence, inputs, or world state rather than letting it generate from unsupported priors alone. In RAG or tool-use systems, grounding is what makes outputs traceable to retrieved context or observations.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"large-language-model-llm\",\"retrieval-augmented-generation-rag\"],\"related\":[\"faithfulness\",\"factuality\",\"hallucination\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"factuality\",\"title\":\"Factuality\",\"summary\":\"Factuality is whether the content of an answer is actually true in the world or according to trusted sources. An answer can be fluent and even faithful to its source while still being nonfactual if the source itself is wrong or outdated.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"hallucination\",\"grounding\",\"faithfulness\",\"benchmark-ml-evaluation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"faithfulness\",\"title\":\"Faithfulness\",\"summary\":\"Faithfulness is whether a model’s output is supported by the provided input, source document, or chain of evidence. It differs from factuality because a summary can be perfectly faithful to a source that contains false claims.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"large-language-model-llm\"],\"related\":[\"grounding\",\"factuality\",\"hallucination\",\"retrieval-augmented-generation-rag\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"calibration\",\"title\":\"Calibration\",\"summary\":\"Calibration measures whether predicted probabilities match observed frequencies, so events predicted at 70% should occur about 70% of the time. A model can be accurate but poorly calibrated if its confidence is systematically too high or too low.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"evaluation\",\"intermediate\",\"ml\",\"theory\",\"wiki-import\",\"path-core-foundations\"],\"prerequisites\":[\"probability-distribution\",\"classification\"],\"related\":[\"temperature-scaling\",\"label-smoothing\",\"receiver-operating-characteristic-roc-and-auc\",\"confidence-interval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"temperature-scaling\",\"title\":\"Temperature Scaling\",\"summary\":\"Temperature scaling calibrates a classifier by dividing logits by a learned scalar temperature before the softmax. It often improves probability calibration on a validation set without changing the model’s ranking of classes.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"evaluation\",\"implementation\",\"intermediate\",\"ml\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"calibration\",\"softmax\"],\"related\":[\"softmax-temperature\",\"label-smoothing\",\"logit\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"batch-normalization\",\"title\":\"Batch Normalization\",\"summary\":\"Batch normalization normalizes activations using mini-batch mean and variance, then applies learned scale and shift parameters. It stabilizes optimization and enables deeper networks, but its behavior differs between training and inference because it relies on running statistics.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"implementation\",\"intermediate\",\"ml\",\"regularization\",\"wiki-import\",\"path-architectures\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"layer-normalization\",\"dropout\",\"root-mean-square-normalization-rmsnorm\",\"convolutional-neural-network-cnn\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"layer-normalization\",\"title\":\"Layer Normalization\",\"summary\":\"Layer normalization normalizes activations across features within each example rather than across the batch. It works well for variable-length sequences and small batch sizes, which is why it is standard in Transformers.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"batch-normalization\",\"root-mean-square-normalization-rmsnorm\",\"pre-norm-vs-post-norm-architecture\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gradient-clipping\",\"title\":\"Gradient Clipping\",\"summary\":\"Gradient clipping limits gradient norms or values before the optimizer step to prevent unstable updates and exploding gradients. It does not fix a bad objective, but it can stabilize training when rare large gradients would otherwise dominate.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"gradient-descent\",\"backpropagation\"],\"related\":[\"what-is-the-vanishing-gradient-problem\",\"layer-normalization\",\"mixed-precision-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"weight-decay\",\"title\":\"Weight Decay\",\"summary\":\"Weight decay shrinks parameters toward zero by multiplying them by a factor slightly below 1 on each optimizer step. In plain SGD it is equivalent to L2 regularization, but in adaptive optimizers the decoupled AdamW form is usually preferred.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"regularization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"regularization\"],\"related\":[\"l2-regularization-ridge-weight-decay\",\"adamw-optimizer\",\"adam-optimizer\",\"dropout\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adam-optimizer\",\"title\":\"Adam Optimizer\",\"summary\":\"Adam is an adaptive first-order optimizer that keeps moving averages of the gradient and its square, then bias-corrects them to scale each parameter’s update. It converges quickly and is standard for Transformer training, though it is sensitive to weight decay design and hyperparameters.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"gradient-descent\",\"momentum\"],\"related\":[\"adamw-optimizer\",\"adagrad\",\"rmsprop\",\"learning-rate\",\"weight-decay\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adagrad\",\"title\":\"AdaGrad\",\"summary\":\"AdaGrad adapts learning rates by dividing each parameter’s update by the square root of the accumulated historical squared gradients. It works especially well for sparse features, but its learning rates can decay too aggressively over long training runs.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"gradient-descent\"],\"related\":[\"rmsprop\",\"adam-optimizer\",\"learning-rate\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"rmsprop\",\"title\":\"RMSProp\",\"summary\":\"RMSProp uses an exponential moving average of squared gradients to normalize updates, preventing the denominator from growing without bound as in AdaGrad. It is useful for nonstationary problems and was a key precursor to Adam.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"adagrad\"],\"related\":[\"adam-optimizer\",\"momentum\",\"learning-rate\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"momentum\",\"title\":\"Momentum\",\"summary\":\"Momentum accumulates a running velocity of past gradients so updates keep moving in consistent directions and damp noisy zig-zags. It speeds optimization in ravines and is commonly paired with SGD or Nesterov variants.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"stochastic-gradient-descent-sgd\"],\"related\":[\"adam-optimizer\",\"rmsprop\",\"adagrad\",\"learning-rate-schedule\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"learning-rate-schedule\",\"title\":\"Learning Rate Schedule\",\"summary\":\"A learning-rate schedule changes the learning rate over training instead of keeping it constant. Schedules matter because they balance fast early progress with stable late optimization and often determine final performance as much as the base optimizer.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"learning-rate\"],\"related\":[\"warmup\",\"cosine-annealing\",\"hyperparameter\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"warmup\",\"title\":\"Warmup\",\"summary\":\"Warmup starts training with a small learning rate and gradually increases it during the first steps. It reduces early instability, especially in Transformers where large updates before optimizer statistics settle can cause divergence.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"learning-rate-schedule\"],\"related\":[\"cosine-annealing\",\"learning-rate\",\"adam-optimizer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cosine-annealing\",\"title\":\"Cosine Annealing\",\"summary\":\"Cosine annealing decays the learning rate following a cosine curve from a high value to a low value, sometimes with restarts. It provides a smooth schedule that often works well in practice without needing many hand-tuned decay boundaries.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"learning-rate-schedule\"],\"related\":[\"warmup\",\"learning-rate\",\"adam-optimizer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"weight-initialization\",\"title\":\"Weight Initialization\",\"summary\":\"Weight initialization chooses starting parameter values before training begins. Good initialization keeps activations and gradients in useful ranges so learning can start without vanishing, exploding, or breaking symmetry.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"xavier-glorot-initialization\",\"he-initialization-kaiming-initialization\",\"what-is-the-vanishing-gradient-problem\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"he-initialization-kaiming-initialization\",\"title\":\"He Initialization (Kaiming Initialization)\",\"summary\":\"He initialization sets weight variance to roughly 2/fan-in so ReLU-like activations preserve signal magnitude through depth. It improves on Xavier initialization for one-sided activations that zero out about half the inputs.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"cv\",\"intermediate\",\"ml\",\"theory\",\"wiki-import\",\"path-vision\"],\"prerequisites\":[\"weight-initialization\"],\"related\":[\"xavier-glorot-initialization\",\"relu\",\"what-is-the-vanishing-gradient-problem\",\"convolutional-neural-network-cnn\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"label-smoothing\",\"title\":\"Label Smoothing\",\"summary\":\"Label smoothing replaces hard one-hot targets with a mostly-correct probability distribution that assigns a small amount of mass to other classes. It regularizes overconfident classifiers and often improves generalization and calibration, though it can hurt when exact probabilities matter.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"cross-entropy\",\"classification\"],\"related\":[\"regularization\",\"calibration\",\"dropout\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tokenization-pipeline\",\"title\":\"Tokenization Pipeline\",\"summary\":\"A tokenization pipeline is the full process that turns raw text into model-ready inputs, including normalization, pre-tokenization, subword splitting, token-to-ID mapping, truncation, padding, and special-token insertion. Choices here directly affect sequence length, vocabulary coverage, and downstream behavior.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"tokenization\"],\"related\":[\"byte-pair-encoding-bpe\",\"subword-tokenization\",\"special-tokens\",\"vocabulary\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"gpu-acceleration\",\"title\":\"GPU Acceleration\",\"summary\":\"GPU acceleration uses highly parallel graphics processors to speed the matrix and tensor operations that dominate modern ML workloads. It matters because deep learning is mostly throughput-bound linear algebra, which GPUs execute far more efficiently than general-purpose CPUs.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[],\"related\":[\"cuda\",\"floating-point-operations-flops\",\"mixed-precision-training\",\"distributed-computing-ml-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cuda\",\"title\":\"CUDA\",\"summary\":\"CUDA (Compute Unified Device Architecture) is an all-encompassing parallel array programming platform and compiled C-extension API engineered natively by NVIDIA. It operates as the unyielding translation bedrock empowering developers to…\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"gpu-acceleration\"],\"related\":[\"floating-point-operations-flops\",\"flashattention\",\"mixed-precision-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"inference-optimization\",\"title\":\"Inference Optimization\",\"summary\":\"A rigorous suite of highly engineered deployment scaling techniques fundamentally designed to systematically crush latency curves, decimate VRAM layout footprint sizes, and structurally shear down dollar-cost expenditures heavily mapping…\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"product\",\"wiki-import\",\"path-scaling-advanced\"],\"prerequisites\":[],\"related\":[\"key-value-kv-caching\",\"speculative-decoding\",\"pagedattention\",\"quantization\",\"flashattention\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"instruction-tuning\",\"title\":\"Instruction Tuning\",\"summary\":\"A supervised finetuning stage where a pretrained language model is trained on (instruction, response) pairs so that it learns to follow natural-language instructions across diverse tasks, rather than merely continuing text.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"supervised-fine-tuning-sft\"],\"related\":[\"instruction-dataset\",\"chat-language-model\",\"finetuning\",\"prompt-engineering\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"safety-alignment\",\"title\":\"Safety Alignment\",\"summary\":\"The process of training AI models — particularly LLMs — to behave in ways that are helpful, harmless, and honest (the \\\"HHH\\\" criteria), ensuring they refuse harmful requests and avoid generating dangerous, biased, or deceptive content.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"alignment-ai\"],\"related\":[\"red-teaming\",\"constitutional-ai\",\"reinforcement-learning-from-human-feedback-rlhf\",\"preference-based-alignment\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"red-teaming\",\"title\":\"Red-Teaming\",\"summary\":\"A structured adversarial evaluation process where testers deliberately attempt to elicit harmful, unsafe, or policy-violating outputs from an AI system, in order to identify vulnerabilities before deployment.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"safety-alignment\"],\"related\":[\"adversarial-prompting\",\"what-is-a-jailbreak-in-the-context-of-llms\",\"constitutional-classifiers-plus-plus\",\"ai-safety\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"what-is-a-jailbreak-in-the-context-of-llms\",\"title\":\"What is a jailbreak in the context of LLMs?\",\"summary\":\"A prompt or sequence of prompts that circumvents an LLM's safety training, causing it to produce outputs it was explicitly trained to refuse — such as harmful instructions, policy-violating content, or unrestricted \\\"unaligned\\\" behavior.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"safety-alignment\"],\"related\":[\"adversarial-prompting\",\"red-teaming\",\"constitutional-classifiers-plus-plus\",\"chain-of-thought-monitorability\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"adversarial-prompting\",\"title\":\"Adversarial Prompting\",\"summary\":\"The deliberate crafting of model inputs designed to manipulate an LLM into producing unintended, incorrect, or harmful outputs — encompassing prompt injection, jailbreaks, and extraction attacks as sub-categories.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"prompt-engineering\"],\"related\":[\"what-is-a-jailbreak-in-the-context-of-llms\",\"red-teaming\",\"safety-alignment\",\"constitutional-classifiers-plus-plus\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"benchmark-ml-evaluation\",\"title\":\"Benchmark (ML Evaluation)\",\"summary\":\"A standardized dataset and evaluation protocol used to measure and compare model performance on specific tasks. Benchmarks provide reproducible, quantitative scores that enable apples-to-apples comparison across models, architectures, an…\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"product\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"model-evaluation\"],\"related\":[\"human-evaluation\",\"automated-evaluation\",\"bleu\",\"rouge\",\"a-b-testing-ml-systems\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"human-evaluation\",\"title\":\"Human Evaluation\",\"summary\":\"The use of human judges to assess model outputs on subjective dimensions — such as fluency, helpfulness, harmlessness, and factual accuracy — that automated metrics cannot reliably capture.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"product\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"model-evaluation\"],\"related\":[\"pairwise-comparison\",\"automated-evaluation\",\"elo-rating\",\"benchmark-ml-evaluation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"automated-evaluation\",\"title\":\"Automated Evaluation\",\"summary\":\"The use of algorithmic metrics or model-based judges to score model outputs without human involvement, enabling fast, scalable, and reproducible evaluation at the cost of imperfect correlation with human preferences.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"product\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"model-evaluation\"],\"related\":[\"bleu\",\"rouge\",\"human-evaluation\",\"benchmark-ml-evaluation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bleu\",\"title\":\"BLEU\",\"summary\":\"Bilingual Evaluation Understudy — an automated metric that scores machine-generated text by measuring n-gram precision against one or more reference translations, with a brevity penalty to discourage overly short outputs.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"product\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"automated-evaluation\"],\"related\":[\"rouge\",\"n-gram\",\"beam-search\",\"edit-distance\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"a-b-testing-ml-systems\",\"title\":\"A/B Testing (ML Systems)\",\"summary\":\"A controlled experiment where users are randomly assigned to one of two (or more) groups — each served a different model variant — to measure which variant performs better on a chosen metric with statistical significance.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"product\",\"wiki-import\"],\"prerequisites\":[\"model-evaluation\",\"confidence-interval\"],\"related\":[\"shadow-deployment\",\"bootstrap-resampling\",\"human-evaluation\",\"feedback-loop-ml-systems\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"continual-learning\",\"title\":\"Continual Learning\",\"summary\":\"A learning paradigm where a model sequentially acquires knowledge from a stream of tasks or data distributions without forgetting previously learned information.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"finetuning\"],\"related\":[\"what-is-catastrophic-forgetting\",\"curriculum-learning\",\"transfer-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"what-is-catastrophic-forgetting\",\"title\":\"What is catastrophic forgetting?\",\"summary\":\"The tendency of neural networks to abruptly and severely lose performance on previously learned tasks when trained on new ones.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"finetuning\"],\"related\":[\"continual-learning\",\"transfer-learning\",\"low-rank-adaptation-lora\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"curriculum-learning\",\"title\":\"Curriculum Learning\",\"summary\":\"A training strategy where examples are presented to a model in a structured order of increasing difficulty, mimicking the human educational curriculum, to accelerate convergence and find better local optima.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\"],\"prerequisites\":[\"supervised-learning\"],\"related\":[\"data-mixture\",\"pretraining\",\"transfer-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pretraining-corpus\",\"title\":\"Pretraining Corpus\",\"summary\":\"The vast, unstructured text dataset used to train a language model's base weights during self-supervised learning (e.g., next-token prediction), establishing its fundamental linguistic capabilities and world knowledge.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"corpus\"],\"related\":[\"data-mixture\",\"pretraining\",\"tokenization\",\"instruction-dataset\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"instruction-dataset\",\"title\":\"Instruction Dataset\",\"summary\":\"A curated collection of (instruction, response) pairs used during the Supervised Fine-Tuning (SFT) phase to teach a foundation model to act as a helpful assistant rather than a pure text-continuation engine.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"supervised-fine-tuning-sft\"],\"related\":[\"preference-dataset\",\"pretraining-corpus\",\"instruction-tuning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"preference-dataset\",\"title\":\"Preference Dataset\",\"summary\":\"A dataset mapping human or AI evaluation queries to pairwise or ranked responses — typically a collection of (prompt, chosen, rejected) pairs — used to train Reward Models in RLHF or directly optimize language models via DPO.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"pairwise-comparison\",\"supervised-fine-tuning-sft\"],\"related\":[\"reward-model\",\"direct-preference-optimization-dpo\",\"reinforcement-learning-from-human-feedback-rlhf\",\"bradley-terry-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reward-signal\",\"title\":\"Reward Signal\",\"summary\":\"A scalar value returned by the environment (or a learned model) that indicates the desirability of an agent's recent action, serving as the sole objective function optimized in Reinforcement Learning.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-architectures\"],\"prerequisites\":[\"reinforcement-learning-rl\"],\"related\":[\"reward-model\",\"policy-reinforcement-learning\",\"value-function\",\"the-bellman-equation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"policy-reinforcement-learning\",\"title\":\"Policy (Reinforcement Learning)\",\"summary\":\"A mapping from environment states to actions (or a probability distribution over actions) defining an RL agent's behavior. In modern LLMs, the neural network itself embodies the policy layer $\\\\pi_\\\\theta(a \\\\mid s)$.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\",\"path-architectures\"],\"prerequisites\":[\"reinforcement-learning-rl\"],\"related\":[\"value-function\",\"reward-signal\",\"q-learning\",\"proximal-policy-optimization-ppo\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"value-function\",\"title\":\"Value Function\",\"summary\":\"A mapping that evaluates how \\\"good\\\" it is for an agent to be in a given state (or to take a given action from that state), defined mathematically as the expected cumulative future reward under a specific policy.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"reinforcement\",\"theory\",\"wiki-import\",\"path-reinforcement\"],\"prerequisites\":[\"policy-reinforcement-learning\",\"reward-signal\"],\"related\":[\"the-bellman-equation\",\"q-learning\",\"reinforcement-learning-rl\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ai-safety\",\"title\":\"AI Safety\",\"summary\":\"An interdisciplinary field of machine learning dedicated to understanding, evaluating, and mitigating the risks associated with highly capable artificial intelligence systems to ensure they remain reliably aligned with human intent.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"product\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"alignment-ai\",\"misalignment\",\"safety-alignment\",\"red-teaming\",\"bias-fairness\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"alignment-ai\",\"title\":\"Alignment (AI)\",\"summary\":\"The problem of ensuring that an AI system's objectives, behavior, and decision-making process faithfully reflect the intentions and values of its designers and users, rather than optimizing for a misspecified proxy.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"product\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"safety-alignment\",\"ai-safety\",\"misalignment\",\"reinforcement-learning-from-human-feedback-rlhf\",\"constitutional-ai\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"interpretability\",\"title\":\"Interpretability\",\"summary\":\"The study of understanding what a machine learning model has learned and why it produces specific outputs, making internal representations and decisions transparent to humans.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"mechanistic-interpretability\",\"explainability\",\"attention-visualization\",\"probing-neural-networks\",\"transparency-ai-systems\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mechanistic-interpretability\",\"title\":\"Mechanistic Interpretability\",\"summary\":\"A rigorous subfield of interpretability treating neural networks as phenomena to be reverse-engineered into understandable algorithms by identifying specific features, circuits, and computational motifs inside the weights.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"wiki-import\",\"path-scaling-advanced\"],\"prerequisites\":[\"interpretability\",\"neural-network\"],\"related\":[\"logit-lens\",\"activation-patching\",\"sparse-autoencoder-mechanistic-interpretability\",\"superposition-neural-networks\",\"steering-vectors\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"attention-visualization\",\"title\":\"Attention Visualization\",\"summary\":\"The practice of rendering the self-attention weight matrices of a Transformer as heatmaps or bipartite graphs to inspect which input tokens the model \\\"looks at\\\" when computing contextual embeddings.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"attention\",\"intermediate\",\"ml\",\"the :[\"bias-fairness\"],\"related\":[\"safety-alignment\",\"ai-safety\",\"feedback-loop-ml-systems\",\"explainability\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"transparency-ai-systems\",\"title\":\"Transparency (AI Systems)\",\"summary\":\"The principle that AI systems should provide clear, accessible documentation regarding their architecture, training data, inherent capabilities, and failure modes to enable structured accountability and human oversight.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"product\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"explainability\",\"interpretability\",\"ai-safety\",\"alignment-ai\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"steering-vectors\",\"title\":\"Steering Vectors\",\"summary\":\"A technique in representation engineering where a specific direction in a model's high-dimensional activation space is identified as corresponding to a semantic concept, and forcefully added to the residual stream during inference to alt…\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"mechanistic-interpretability\"],\"related\":[\"activation-patching\",\"activation-analysis\",\"safety-alignment\",\"mechanistic-oocr-steering-vectors\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"activation-patching\",\"title\":\"Activation Patching\",\"summary\":\"A causal interpretability technique used to precisely isolate the function of a specific neural network component. It works by grafting the activations from one forward pass into a different, corrupted forward pass to see if the network'…\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"mechanistic-interpretability\"],\"related\":[\"logit-lens\",\"activation-analysis\",\"steering-vectors\",\"mechanistic-oocr-steering-vectors\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"log-sum-exp-trick\",\"title\":\"Log-Sum-Exp Trick\",\"summary\":\"An essential numerical stabilization protocol used to compute \\\\\\\\( \\\\log \\\\sum_i e^{x_i} \\\\\\\\) without encountering catastrophic overflow (infinity) or underflow (zero) in floating-point mathematics.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"softmax\"],\"related\":[\"softmax-normalization\",\"cross-entropy\",\"mixed-precision-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"exponential-family-of-distributions\",\"title\":\"Exponential Family of Distributions\",\"summary\":\"The exponential family constitutes a broad class of probability distributions sharing a standardized mathematical factorization, structurally guaranteeing elegant statistical properties—yielding inference, maximum likelihood estimations,…\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\",\"maximum-likelihood-estimate-mle\"],\"related\":[\"logistic-regression\",\"softmax\",\"shannon-entropy\",\"the-fisher-information-matrix\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"kolmogorov-arnold-networks\",\"title\":\"Kolmogorov-Arnold Networks\",\"summary\":\"Kolmogorov-Arnold Networks (KANs) replace scalar weights in an MLP with learnable univariate functions on edges, so each layer computes sums of learned one-dimensional transforms rather than an affine map followed by a fixed activation.…\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"multilayer-perceptron-mlp\"],\"related\":[\"activation-function\",\"deep-neural-network\",\"continuous-thought-machines\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"kl-divergence\",\"title\":\"KL Divergence\",\"summary\":\"An information-theoretic measure of how one probability distribution differs from a reference distribution — the asymmetric \\\"extra bits\\\" needed to encode samples from \\\\( p \\\\) using a code optimized for \\\\( q \\\\). It underpins maximum-likelihood estimation, variational inference, RLHF, and countless other learning objectives.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"optimization\",\"path-core-foundations\"],\"prerequisites\":[\"probability-distribution\",\"shannon-entropy\"],\"related\":[\"cross-entropy\",\"shannon-entropy\",\"negative-log-likelihood\",\"kl-divergence-penalty-in-rlhf\",\"reparameterization-trick-vae\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"jensens-inequality\",\"title\":\"Jensen's Inequality\",\"summary\":\"For any convex function \\\\( \\\\varphi \\\\) and random variable \\\\( X \\\\), \\\\( \\\\varphi(\\\\mathbb{E}[X]) \\\\le \\\\mathbb{E}[\\\\varphi(X)] \\\\). This single inequality is the engine behind the non-negativity of KL divergence, the ELBO, the concavity of entropy, and most convergence proofs in machine learning.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"convex-function\",\"probability-distribution\"],\"related\":[\"convex-function\",\"kl-divergence\",\"cross-entropy\",\"shannon-entropy\",\"maximum-likelihood-estimate-mle\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bayes-theorem\",\"title\":\"Bayes' Theorem\",\"summary\":\"A rule for updating beliefs in light of new evidence: the posterior probability of a hypothesis given data is proportional to the likelihood of the data times the prior. It is the foundation of probabilistic inference and distinguishes Bayesian from frequentist statistics.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"maximum-a-posteriori-map-estimation\",\"maximum-likelihood-estimate-mle\",\"markov-chain-monte-carlo-mcmc\",\"kl-divergence\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"expectation-maximization-em-algorithm\",\"title\":\"Expectation–Maximization (EM) Algorithm\",\"summary\":\"An iterative algorithm for maximum-likelihood estimation in models with latent variables. Each iteration alternates between computing the expected complete-data log-likelihood under the current posterior (E-step) and maximising it with respect to the parameters (M-step), monotonically increasing the observed-data likelihood.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"optimization\",\"path-core-foundations\"],\"prerequisites\":[\"maximum-likelihood-estimate-mle\",\"jensens-inequality\"],\"related\":[\"k-means-objective-function-inertia\",\"hidden-markov-model-hmm\",\"kl-divergence\",\"maximum-likelihood-estimate-mle\",\"jensens-inequality\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"eigenvalues-and-eigenvectors\",\"title\":\"Eigenvalues and Eigenvectors\",\"summary\":\"For a square matrix \\\\( A \\\\), an eigenvector \\\\( v \\\\neq 0 \\\\) satisfies \\\\( Av = \\\\lambda v \\\\) for some scalar eigenvalue \\\\( \\\\lambda \\\\). Eigendecomposition diagonalises linear operators in a basis that rescales rather than rotates, and is the backbone of PCA, spectral clustering, stability analysis, and Fisher-information geometry.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[],\"related\":[\"singular-value-decomposition-svd\",\"principal-component-analysis-pca\",\"the-fisher-information-matrix\",\"convex-function\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"jacobian-and-hessian\",\"title\":\"Jacobian and Hessian\",\"summary\":\"The Jacobian is the matrix of first-order partial derivatives of a vector-valued function; the Hessian is the symmetric matrix of second-order partial derivatives of a scalar function. Together they encode the local linear and quadratic structure of a map, underpinning Newton's method, backpropagation, curvature analysis, and optimisation theory.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"optimization\",\"path-core-foundations\"],\"prerequisites\":[],\"related\":[\"gradient-descent\",\"convex-function\",\"the-fisher-information-matrix\",\"eigenvalues-and-eigenvectors\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multivariate-gaussian-distribution\",\"title\":\"Multivariate Gaussian Distribution\",\"summary\":\"The \\\\( d \\\\)-dimensional generalisation of the normal distribution, parameterised by a mean vector \\\\( \\\\mu \\\\) and positive-definite covariance matrix \\\\( \\\\Sigma \\\\). Its density, closed-form marginals, conditionals, and linear-transformation properties make it the most important continuous distribution in machine learning — the workhorse behind PCA, GMMs, Kalman filters, Gaussian processes, and VAEs.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"probability-distribution\",\"eigenvalues-and-eigenvectors\"],\"related\":[\"principal-component-analysis-pca\",\"reparameterization-trick-vae\",\"kl-divergence\",\"the-fisher-information-matrix\",\"expectation-maximization-em-algorithm\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"naive-bayes-classifier\",\"title\":\"Naive Bayes Classifier\",\"summary\":\"A family of linear probabilistic classifiers that apply Bayes' theorem under the strong (\\\"naïve\\\") assumption that features are conditionally independent given the class. Despite its obviously wrong assumption, it is extremely fast, works well with small data and high-dimensional sparse features, and remains a surprisingly strong baseline for text classification.\",\"domain\":\"supervised\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"path-core-foundations\"],\"prerequisites\":[\"bayes-theorem\",\"probability-distribution\"],\"related\":[\"bayes-theorem\",\"maximum-likelihood-estimate-mle\",\"linear-regression-basics\",\"logistic-regression\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"k-nearest-neighbors-knn\",\"title\":\"k-Nearest Neighbors (k-NN)\",\"summary\":\"A non-parametric algorithm that makes a prediction at a query point by looking up the \\\\( k \\\\) closest training examples and voting (classification) or averaging (regression). It has essentially no training and its decision boundary adapts directly to the data, at the cost of slow inference and severe sensitivity to the curse of dimensionality.\",\"domain\":\"supervised\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"implementation\",\"path-core-foundations\"],\"prerequisites\":[],\"related\":[\"the-curse-of-dimensionality\",\"bias-variance-tradeoff\",\"k-means-objective-function-inertia\",\"kernel-methods\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"universal-approximation-theorem\",\"title\":\"Universal Approximation Theorem\",\"summary\":\"A family of results showing that feed-forward neural networks with a single hidden layer and a suitable non-polynomial activation can approximate any continuous function on a compact set to arbitrary accuracy, given enough hidden units. The theorem is an existence guarantee — it says nothing about training, sample complexity, or how wide the network must be.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"multilayer-perceptron-mlp\"],\"related\":[\"multilayer-perceptron-mlp\",\"perceptron\",\"kernel-methods\",\"neural-tangent-kernel-ntk\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"double-descent\",\"title\":\"Double Descent\",\"summary\":\"The empirical phenomenon where test error, as a function of model complexity, first follows the classical U-shape (under-fit → sweet spot → over-fit), then \u003ci\u003edescends again\u003c/i\u003e once the model is large enough to interpolate the training data. Observed in random features, kernel methods, and deep networks, double descent is the clearest visual contradiction to the textbook bias–variance story.\",\"domain\":\"foundations\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"bias-variance-tradeoff\",\"overfitting\"],\"related\":[\"bias-variance-tradeoff\",\"overfitting\",\"generalization\",\"scaling-laws\",\"grokking\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"grokking\",\"title\":\"Grokking\",\"summary\":\"A late-generalisation phenomenon where a network first memorises the training set (near-perfect train, near-chance test) and then, after many additional steps of training, suddenly generalises — test accuracy shooting from chance to near-perfect. Discovered on small arithmetic tasks, grokking reveals that generalisation and memorisation can be decoupled in time and that weight decay / optimisation dynamics play the central role.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"optimization\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"overfitting\",\"weight-decay\"],\"related\":[\"double-descent\",\"weight-decay\",\"generalization\",\"neural-tangent-kernel-ntk\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"neural-tangent-kernel-ntk\",\"title\":\"Neural Tangent Kernel (NTK)\",\"summary\":\"In the limit of infinite width and small learning rate, a fully-trained neural network behaves like kernel regression with a deterministic kernel — the Neural Tangent Kernel — that depends only on the architecture, not on the particular initialisation. The NTK gave the first rigorous connection between deep networks and reproducing-kernel Hilbert spaces and is a major theoretical tool for analysing optimisation and generalisation.\",\"domain\":\"foundations\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"theory\",\"path-core-foundations\",\"path-architectures\"],\"prerequisites\":[\"kernel-methods\",\"gradient-descent\"],\"related\":[\"kernel-methods\",\"multilayer-perceptron-mlp\",\"jacobian-and-hessian\",\"universal-approximation-theorem\",\"double-descent\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"state-space-models-mamba\",\"title\":\"State Space Models / Mamba\",\"summary\":\"A family of sequence models that evolve a hidden state through a linear recurrence \\\\( h_t = \\\\bar{A} h_{t-1} + \\\\bar{B} x_t \\\\), \\\\( y_t = C h_t \\\\), making them RNN-like at inference yet convolutional and parallel at training. Mamba (Gu \u0026amp; Dao, 2023) added input-dependent (\\\"selective\\\") transitions and an efficient hardware-aware scan, turning SSMs into competitive Transformer alternatives with linear complexity in sequence length.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"recurrent-neural-network-rnn\",\"self-attention\"],\"related\":[\"transformer\",\"recurrent-neural-network-rnn\",\"long-short-term-memory-lstm\",\"flashattention\",\"linear-attention\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"linear-attention\",\"title\":\"Linear Attention\",\"summary\":\"A family of attention mechanisms that replace the softmax similarity in standard attention with a kernel feature map, collapsing the \\\\( O(T^2) \\\\) complexity of attention into \\\\( O(T) \\\\). Although lossy compared to softmax attention, linear attention is central to efficient Transformers (Performer, Linear Transformer) and deeply related to modern State Space Models.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"ml\",\"theory\",\"transformer\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"self-attention\",\"softmax\"],\"related\":[\"self-attention\",\"multi-head-attention\",\"state-space-models-mamba\",\"flashattention\",\"kernel-methods\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"alibi-attention-with-linear-biases\",\"title\":\"ALiBi (Attention with Linear Biases)\",\"summary\":\"A positional encoding for Transformers that adds a static, head-specific linear penalty \\\\( -m_h \\\\cdot (i - j) \\\\) directly into the attention logits, replacing sinusoidal or learned positional embeddings. Its training-free length extrapolation property — models trained on 1K tokens evaluate well on much longer sequences — made ALiBi influential before RoPE + NTK-style scaling took over.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"ml\",\"transformer\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\",\"sinusoidal-positional-encoding\"],\"related\":[\"rotary-positional-embedding-rope\",\"sinusoidal-positional-encoding\",\"self-attention\",\"multi-head-attention\",\"yarn-ntk-aware-rope-scaling\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"yarn-ntk-aware-rope-scaling\",\"title\":\"YaRN / NTK-aware RoPE Scaling\",\"summary\":\"A family of techniques for extending the usable context length of a RoPE-based Transformer beyond its training length by \u003ci\u003ere-parameterising\u003c/i\u003e the rotary frequencies rather than retraining from scratch. Position Interpolation, NTK-aware scaling, and YaRN (Peng et al., 2023) each preserve high-frequency components while compressing low-frequency ones, giving massive context extension (e.g., 4K → 128K) with only a short fine-tune.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"ml\",\"transformer\",\"implementation\",\"path-transformer-llm\"],\"prerequisites\":[\"rotary-positional-embedding-rope\"],\"related\":[\"rotary-positional-embedding-rope\",\"alibi-attention-with-linear-biases\",\"self-attention\",\"sinusoidal-positional-encoding\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sliding-window-attention\",\"title\":\"Sliding-Window Attention\",\"summary\":\"An attention pattern that restricts each query to attend only within a local window of the last \\\\( w \\\\) tokens, reducing the cost per query from \\\\( O(T) \\\\) to \\\\( O(w) \\\\) and the KV cache from \\\\( O(T) \\\\) to \\\\( O(w) \\\\) per layer. Combined with global tokens (Longformer), dilated windows (BigBird), or a few full-attention layers (Mistral), it is a ubiquitous tool for scaling Transformers to long contexts without abandoning softmax attention entirely.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"ml\",\"transformer\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\",\"attention-mask\"],\"related\":[\"self-attention\",\"flashattention\",\"pagedattention\",\"causal-masked-self-attention\",\"linear-attention\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multi-head-latent-attention-mla\",\"title\":\"Multi-head Latent Attention (MLA)\",\"summary\":\"An attention variant introduced in DeepSeek-V2 (2024) that compresses the keys and values of multi-head attention through a low-rank \u003ci\u003elatent\u003c/i\u003e projection, shrinking the KV cache by an order of magnitude while maintaining or improving quality over grouped-query attention. MLA is the dominant KV-cache compression technique in the DeepSeek / Qwen-2.5 / open-weight MoE family.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"ml\",\"implementation\",\"transformer\",\"path-transformer-llm\"],\"prerequisites\":[\"multi-head-attention\",\"grouped-query-attention-gqa\"],\"related\":[\"multi-head-attention\",\"grouped-query-attention-gqa\",\"flashattention\",\"pagedattention\",\"self-attention\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"chinchilla-scaling-laws\",\"title\":\"Chinchilla Scaling Laws\",\"summary\":\"DeepMind's 2022 analysis (Hoffmann et al.) showing that, under a fixed compute budget \\\\( C \\\\approx 6 N D \\\\), optimal pretraining allocates \u003cb\u003eroughly equal compute to parameters and data\u003c/b\u003e — meaning parameters \\\\( N \\\\) and training tokens \\\\( D \\\\) should scale in lockstep. This corrected the earlier Kaplan et al. (2020) recommendation to over-grow models and led to the \\\"Chinchilla-optimal\\\" rule-of-thumb \\\\( D \\\\approx 20 N \\\\).\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"theory\",\"scaling\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"scaling-laws\",\"large-language-model-llm\"],\"related\":[\"scaling-laws\",\"large-language-model-llm\",\"data-mixture\",\"next-token-prediction-objective-causal-language-modeling\",\"transformer\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"auxiliary-load-balancing-loss-moe\",\"title\":\"Auxiliary Load-Balancing Loss (MoE)\",\"summary\":\"A differentiable penalty added to a sparse Mixture-of-Experts training objective that pushes the router toward an even token distribution across experts, preventing the positive-feedback collapse where most tokens are sent to a few dominant experts.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"optimization\",\"transformer\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\",\"load-balancing-moe\"],\"related\":[\"router-network\",\"top-k-routing\",\"switch-transformer\",\"sparsely-gated-mixture-of-experts-moe\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"muon-optimizer\",\"title\":\"Muon Optimizer\",\"summary\":\"A second-order-style optimizer for hidden matrix weights that replaces each parameter-space gradient with its orthogonalized version (via a few Newton–Schulz iterations), effectively performing steepest descent under the spectral norm. Muon trains transformers measurably faster than AdamW on matching compute budgets.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"optimization\",\"theory\",\"path-scaling-advanced\",\"path-transformer-llm\"],\"prerequisites\":[\"adamw-optimizer\",\"gradient-descent\",\"singular-value-decomposition-svd\"],\"related\":[\"adam-optimizer\",\"learning-rate\",\"weight-decay\",\"learning-rate-schedule\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pretraining-data-deduplication\",\"title\":\"Pretraining Data Deduplication\",\"summary\":\"The systematic removal of near-duplicate documents and passages from a pretraining corpus. Deduplication reduces memorisation, improves per-token efficiency, and sharply lowers evaluation-set contamination — often delivering as much quality improvement as a 10× compute increase.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"implementation\",\"ml\",\"nlp\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pretraining-corpus\",\"pretraining\",\"tokenization\"],\"related\":[\"data-mixture\",\"chinchilla-scaling-laws\",\"data-leakage\",\"perplexity\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reinforce-algorithm\",\"title\":\"REINFORCE Algorithm\",\"summary\":\"The classical policy-gradient algorithm (Williams, 1992): estimate \\\\( \\\\nabla_\\\\theta J(\\\\theta) \\\\) by Monte-Carlo-sampling trajectories and weighting the log-probability of each action by the (possibly baseline-subtracted) return. All modern policy-gradient methods — A2C, PPO, GRPO, RLHF — are descendants of this one estimator.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"reinforcement\",\"theory\",\"path-reinforcement\"],\"prerequisites\":[\"reinforcement-learning-rl\",\"policy-reinforcement-learning\",\"gradient-descent\"],\"related\":[\"proximal-policy-optimization-ppo\",\"grpo-group-relative-policy-optimization\",\"actor-critic-methods\",\"generalized-advantage-estimation-gae\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"generalized-advantage-estimation-gae\",\"title\":\"Generalized Advantage Estimation (GAE)\",\"summary\":\"A family of advantage estimators that interpolates between low-variance 1-step TD residuals and high-variance Monte-Carlo returns, indexed by a parameter \\\\( \\\\lambda \\\\in [0, 1] \\\\). GAE is the default advantage signal in PPO and most modern on-policy RL.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"reinforcement\",\"theory\",\"path-reinforcement\"],\"prerequisites\":[\"reinforce-algorithm\",\"actor-critic-methods\",\"value-function\"],\"related\":[\"proximal-policy-optimization-ppo\",\"grpo-group-relative-policy-optimization\",\"policy-reinforcement-learning\",\"the-bellman-equation\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"actor-critic-methods\",\"title\":\"Actor–Critic Methods\",\"summary\":\"A hybrid policy-gradient framework that learns both a policy (\\\"actor\\\") and a value function (\\\"critic\\\") simultaneously. The critic's estimates serve as a learned baseline that sharply reduces the variance of the policy gradient, enabling stable on-policy RL at scale.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"reinforcement\",\"theory\",\"path-reinforcement\"],\"prerequisites\":[\"reinforce-algorithm\",\"value-function\",\"policy-reinforcement-learning\"],\"related\":[\"proximal-policy-optimization-ppo\",\"generalized-advantage-estimation-gae\",\"the-bellman-equation\",\"q-learning\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"process-reward-models-vs-outcome-reward-models\",\"title\":\"Process Reward Models (PRM) vs Outcome Reward Models (ORM)\",\"summary\":\"Two ways to score a multi-step solution: an ORM gives a single scalar for the final answer; a PRM grades each intermediate step. PRMs provide denser, per-step signal — essential for training and search in reasoning models, but expensive to annotate and vulnerable to reward hacking.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"reinforcement\",\"theory\",\"path-reinforcement\",\"path-scaling-advanced\"],\"prerequisites\":[\"reward-model\",\"reinforcement-learning-from-human-feedback-rlhf\",\"chain-of-thought\"],\"related\":[\"reasoning-models-long-cot\",\"process-supervision\",\"mcts-for-llm-reasoning\",\"test-time-compute-scaling\"],\"updatedAt\":\"2026-04-16\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"kto-kahneman-tversky-optimization\",\"title\":\"KTO (Kahneman–Tversky Optimization)\",\"summary\":\"A preference-optimization objective that trains on single-sided labels (\\\"this completion is good\\\" / \\\"this completion is bad\\\") instead of pairwise comparisons. KTO uses a reference-model-relative utility inspired by Kahneman–Tversky prospect theory: loss-aversion asymmetrically penalises completions that fall below the reference-implicit utility threshold.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"reinforcement\",\"theory\",\"path-reinforcement\",\"path-scaling-advanced\"],\"prerequisites\":[\"direct-preference-optimization-dpo\",\"preference-based-alignment\",\"reinforcement-learning-from-human-feedback-rlhf\"],\"
