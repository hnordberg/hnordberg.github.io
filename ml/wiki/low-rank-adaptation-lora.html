\"],\"prerequisites\":[\"query-key-value-qkv\"],\"related\":[\"what-is-a-scaled-attention-score\",\"attention-weights\",\"masked-attention-score\",\"self-attention\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"what-is-a-scaled-attention-score\",\"title\":\"What is a scaled attention score?\",\"summary\":\"A scaled attention score is a query-key dot product divided by \\\\( \\\\sqrt{d_k} \\\\) before softmax. The scaling keeps the variance of the logits from growing with key dimension, which helps prevent softmax saturation and keeps gradients well behaved.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"attention-score\"],\"related\":[\"attention-weights\",\"softmax\",\"masked-attention-score\",\"what-is-the-vanishing-gradient-problem\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"masked-attention-score\",\"title\":\"Masked Attention Score\",\"summary\":\"A masked attention score is an attention logit after adding a mask that blocks forbidden positions, typically by adding a very large negative value before softmax. This forces the resulting attention weight to be effectively zero at those positions.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"attention-score\",\"causal-mask\"],\"related\":[\"causal-masked-self-attention\",\"attention-mask\",\"attention-weights\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"attention-weights\",\"title\":\"Attention Weights\",\"summary\":\"Attention weights are the normalized coefficients, usually produced by a softmax over attention scores, that determine how much each value vector contributes to the output. They form a distribution over positions or memory entries for each query.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"attention-score\",\"softmax\"],\"related\":[\"attention-mask\",\"what-is-a-scaled-attention-score\",\"multi-head-attention\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"attention-mask\",\"title\":\"Attention Mask\",\"summary\":\"An attention mask is a tensor that tells an attention layer which positions may interact and which must be blocked. It is used for causal generation, padding suppression, and task-specific visibility patterns, and it must be applied before softmax, not after.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"self-attention\"],\"related\":[\"causal-mask\",\"masked-attention-score\",\"padding-token\",\"causal-masked-self-attention\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"causal-mask\",\"title\":\"Causal Mask\",\"summary\":\"A causal mask blocks attention to future positions by masking entries above the sequence diagonal. It enforces left-to-right autoregressive prediction, ensuring that token \\\\( t \\\\) can depend only on tokens \\\\( \\\\le t \\\\).\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"self-attention\"],\"related\":[\"causal-masked-self-attention\",\"attention-mask\",\"autoregressive-language-model\",\"decoder-only-transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"multi-head-attention\",\"title\":\"Multi-Head Attention\",\"summary\":\"Multi-head attention runs several attention mechanisms in parallel on different learned projections of the same input, then concatenates their outputs. This lets the model capture multiple relational patterns at once instead of forcing all interactions through a single attention map.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"intermediate\",\"landmark\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\",\"attention-head\"],\"related\":[\"grouped-query-attention-gqa\",\"transformer\",\"query-key-value-qkv\",\"flashattention\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"attention-head\",\"title\":\"Attention Head\",\"summary\":\"An attention head is one parallel query-key-value attention computation inside multi-head attention. Different heads can specialize to different patterns, such as local syntax, long-range dependencies, or induction-like copying behavior.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"self-attention\"],\"related\":[\"multi-head-attention\",\"query-key-value-qkv\",\"grouped-query-attention-gqa\",\"attention-visualization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"grouped-query-attention-gqa\",\"title\":\"Grouped-Query Attention (GQA)\",\"summary\":\"Grouped-query attention shares key and value heads across groups of query heads, reducing KV-cache size and bandwidth during inference. It sits between full multi-head attention and multi-query attention, preserving most quality while making long-context serving cheaper.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"multi-head-attention\",\"key-value-kv-caching\"],\"related\":[\"attention-head\",\"flashattention\",\"pagedattention\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"query-key-value-qkv\",\"title\":\"Query, Key, Value (QKV)\",\"summary\":\"Query, key, and value are the three learned projections used by attention: the query asks what to look for, the key says what each position offers, and the value is the content returned if that position is attended to. Attention weights come from query-key similarity, but outputs are weighted sums of values.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"attention\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"projection-matrix\"],\"related\":[\"self-attention\",\"attention-score\",\"multi-head-attention\",\"key-value-memory-networks\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"projection-matrix\",\"title\":\"Projection Matrix\",\"summary\":\"A projection matrix is a learned linear map that transforms vectors into another representation space. In Transformers, separate projection matrices create Q, K, and V from hidden states, and another projection maps concatenated head outputs back to the model dimension.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"linear-function\",\"affine-transformation\"],\"related\":[\"query-key-value-qkv\",\"fully-connected-layer\",\"position-wise-mlp\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"position-wise-mlp\",\"title\":\"Position-wise MLP\",\"summary\":\"A position-wise MLP is the feed-forward sublayer in a Transformer block, applied independently to each token after attention. It adds nonlinearity and channel mixing per token, complementing attention, which mixes information across positions.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"fully-connected-layer\"],\"related\":[\"multilayer-perceptron-mlp\",\"swiglu-activation-function\",\"residual-connection-skip-connection\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"residual-connection-skip-connection\",\"title\":\"Residual Connection (Skip Connection)\",\"summary\":\"A residual connection adds a layer's input back to its output, so the layer learns a correction rather than an entirely new representation. This stabilizes optimization, improves gradient flow, and is one reason very deep networks and Transformers train reliably.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"landmark\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"neural-network\"],\"related\":[\"deep-neural-network\",\"layer-normalization\",\"transformer\",\"what-is-the-vanishing-gradient-problem\",\"pre-norm-vs-post-norm-architecture\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"root-mean-square-normalization-rmsnorm\",\"title\":\"Root Mean Square Normalization (RMSNorm)\",\"summary\":\"RMSNorm normalizes activations by their root mean square without subtracting the mean. Compared with LayerNorm it is slightly cheaper and often just as effective, which is why many modern LLMs use RMSNorm in place of full mean-and-variance normalization.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"layer-normalization\"],\"related\":[\"pre-norm-vs-post-norm-architecture\",\"batch-normalization\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"context-window\",\"title\":\"Context Window\",\"summary\":\"The context window is the maximum number of tokens a model can process in one forward pass. It defines the model's accessible working memory at inference time, and longer windows increase both usefulness on long documents and computational cost.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"transformer\"],\"related\":[\"positional-encoding\",\"needle-in-a-haystack\",\"long-context-pretraining\",\"key-value-kv-caching\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"autoregression\",\"title\":\"Autoregression\",\"summary\":\"Autoregression is the factorization of a sequence distribution into a product of conditional next-step distributions. In language generation it means producing one token at a time, each conditioned on all previously generated tokens.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"autoregressive-language-model\",\"causal-language-model\",\"next-token-prediction-objective-causal-language-modeling\",\"greedy-decoding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"prompt\",\"title\":\"Prompt\",\"summary\":\"A prompt is the text or structured input given to a language model to condition its behavior and output. It can provide instructions, examples, retrieved context, or tool schemas, and in practice it acts as the model's temporary task specification.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"chat-language-model\"],\"related\":[\"system-prompt\",\"prompt-engineering\",\"few-shot-prompting\",\"prompting-format\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"system-prompt\",\"title\":\"System Prompt\",\"summary\":\"A system prompt is a high-priority instruction block that defines the assistant's role, rules, and behavioral constraints for a conversation. It is usually prepended invisibly to user messages and is intended to override lower-priority prompt content.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"prompt\"],\"related\":[\"prompting-format\",\"prompt-engineering\",\"chat-language-model\",\"role-playing-llms\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"prompting-format\",\"title\":\"Prompting Format\",\"summary\":\"Prompting format is the template used to serialize instructions, roles, examples, and conversation turns into the token sequence a model expects. It matters because the same words in a different format can change model behavior, especially for chat-tuned systems.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"prompt\",\"chat-language-model\"],\"related\":[\"special-tokens\",\"system-prompt\",\"function-calling\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"few-shot-prompting\",\"title\":\"Few-Shot Prompting\",\"summary\":\"Few-shot prompting includes a small number of labeled examples in the prompt so the model can infer the task from context without updating parameters. It is one of the clearest demonstrations of in-context learning in large language models.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"prompt\"],\"related\":[\"in-context-learning\",\"zero-shot-learning\",\"one-shot-learning\",\"gpt-3-and-few-shot-in-context-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"in-context-learning\",\"title\":\"In-Context Learning\",\"summary\":\"In-context learning is the ability of a model to adapt its behavior from instructions or examples placed in the prompt, without changing its weights. The model remains frozen; the adaptation happens within the forward pass through pattern recognition over the context.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"few-shot-prompting\",\"large-language-model-llm\"],\"related\":[\"chain-of-thought\",\"zero-shot-learning\",\"what-are-emergent-capabilities-in-large-language-models\",\"gpt-3-and-few-shot-in-context-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"prompt-engineering\",\"title\":\"Prompt Engineering\",\"summary\":\"Prompt engineering is the practice of designing prompts that make a model reliably produce the desired behavior. It includes choosing instructions, examples, structure, and reasoning scaffolds, and it trades parameter updates for careful interface design.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"prompt\"],\"related\":[\"chain-of-thought\",\"few-shot-prompting\",\"system-prompt\",\"instruction-tuning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"chain-of-thought\",\"title\":\"Chain of Thought\",\"summary\":\"Chain of thought is a prompting strategy that elicits intermediate reasoning steps before the final answer. It often improves performance on multi-step tasks because the model can use the generated text as an external scratchpad rather than compressing all reasoning into one token prediction.\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"prompt-engineering\",\"in-context-learning\"],\"related\":[\"tree-of-thought\",\"self-consistency\",\"react-reason-act\",\"what-are-emergent-capabilities-in-large-language-models\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tree-of-thought\",\"title\":\"Tree of Thought\",\"summary\":\"Tree of Thought extends chain-of-thought by exploring multiple candidate reasoning paths, evaluating intermediate states, and searching over them with strategies such as BFS or DFS. It is useful when solving the task requires branching, backtracking, or comparing alternative partial plans.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"chain-of-thought\"],\"related\":[\"self-consistency\",\"react-reason-act\",\"test-time-compute-scaling\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"self-consistency\",\"title\":\"Self-Consistency\",\"summary\":\"Self-consistency samples multiple reasoning traces for the same problem and chooses the most common final answer rather than trusting a single chain of thought. It often boosts accuracy because different samples make different mistakes, while the correct answer tends to recur.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"chain-of-thought\",\"sampling-in-language-models\"],\"related\":[\"tree-of-thought\",\"test-time-compute-scaling\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"react-reason-act\",\"title\":\"ReAct (Reason + Act)\",\"summary\":\"ReAct is a prompting pattern where a model alternates between reasoning in text and taking actions such as search or tool calls. This lets it use external information and observations to update its plan instead of reasoning only from the original prompt.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"chain-of-thought\",\"function-calling\"],\"related\":[\"tree-of-thought\",\"program-aided-language-model\",\"chain-of-thought-monitorability\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"function-calling\",\"title\":\"Function Calling\",\"summary\":\"Function calling is a language-model capability for producing structured tool invocations instead of only plain text. The model selects a function and arguments that match a schema, which makes tool use more reliable and easier to integrate with software systems.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"prompt\",\"chat-language-model\"],\"related\":[\"react-reason-act\",\"prompting-format\",\"program-aided-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"large-language-model-llm\",\"title\":\"Large Language Model (LLM)\",\"summary\":\"A large language model is a very large neural language model, usually with billions of parameters, pretrained on massive text corpora. Scale gives LLMs broad world knowledge and emergent capabilities such as in-context learning, but the core training objective is still language modeling.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"language-model\",\"transformer\"],\"related\":[\"foundation-model\",\"pretraining\",\"scaling-laws\",\"chat-language-model\",\"gpt-3-and-few-shot-in-context-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pretraining\",\"title\":\"Pretraining\",\"summary\":\"Pretraining is the large-scale first stage of training where a model learns general-purpose representations from unlabeled or self-supervised data. For LLMs this usually means next-token prediction over massive corpora, producing a base model that later fine-tuning can adapt.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\"],\"prerequisites\":[\"language-model\",\"gradient-descent\"],\"related\":[\"pretraining-corpus\",\"next-token-prediction-objective-causal-language-modeling\",\"supervised-fine-tuning-sft\",\"finetuning\",\"scaling-laws\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"supervised-fine-tuning-sft\",\"title\":\"Supervised Fine-Tuning (SFT)\",\"summary\":\"Supervised fine-tuning trains a pretrained model on curated input-output pairs so it follows instructions, styles, or task formats more reliably. In chat systems, SFT is the stage that turns a raw completion model into an assistant before preference alignment is applied.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"finetuning\",\"language-model\"],\"related\":[\"instruction-dataset\",\"instruction-tuning\",\"preference-based-alignment\",\"reinforcement-learning-from-human-feedback-rlhf\",\"chat-language-model\",\"parameter-efficient-fine-tuning-peft\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"finetuning\",\"title\":\"Finetuning\",\"summary\":\"Finetuning continues training a pretrained model on a smaller task-specific or domain-specific dataset. It adapts existing representations rather than learning from scratch, which is why it usually needs far less data and compute than pretraining.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"pretraining\",\"supervised-learning\"],\"related\":[\"supervised-fine-tuning-sft\",\"parameter-efficient-fine-tuning-peft\",\"full-fine-tune\",\"transfer-learning\",\"instruction-tuning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"full-fine-tune\",\"title\":\"Full Fine-Tune\",\"summary\":\"A full fine-tune updates all of a model's parameters on the new task or domain. It offers maximum flexibility, but it is much more memory- and compute-intensive than PEFT methods and produces a separate full checkpoint for each adapted model.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"finetuning\"],\"related\":[\"parameter-efficient-fine-tuning-peft\",\"low-rank-adaptation-lora\",\"supervised-fine-tuning-sft\",\"memory-optimization-ml-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"parameter-efficient-fine-tuning-peft\",\"title\":\"Parameter-Efficient Fine-Tuning (PEFT)\",\"summary\":\"PEFT is a family of fine-tuning methods that keep most pretrained weights frozen and train only a small number of added or selected parameters. It preserves much of full fine-tuning's quality while reducing memory, compute, and storage costs.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"finetuning\"],\"related\":[\"low-rank-adaptation-lora\",\"qlora-quantized-lora\",\"full-fine-tune\",\"lora-adapter\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"low-rank-adaptation-lora\",\"title\":\"Low-Rank Adaptation (LoRA)\",\"summary\":\"LoRA fine-tunes a model by expressing each weight update as a low-rank product \\\\( \\\\Delta W = BA \\\\) while keeping the original weight matrix frozen. This dramatically cuts trainable parameters and optimizer state, which is why LoRA became the default PEFT method for LLMs.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":\"$7:props:children:props:children:props:topic:tags\",\"prerequisites\":\"$7:props:children:props:children:props:topic:prerequisites\",\"related\":\"$7:props:children:props:children:props:topic:related\",\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"lora-adapter\",\"title\":\"LoRA Adapter\",\"summary\":\"A LoRA adapter is the task-specific pair of low-rank matrices inserted around a frozen base weight matrix to produce a learned update at inference or training time. Because adapters are small, many tasks can be stored, swapped, and merged without copying the full base model.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"low-rank-adaptation-lora\"],\"related\":[\"qlora-quantized-lora\",\"model-merging\",\"parameter-efficient-fine-tuning-peft\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"qlora-quantized-lora\",\"title\":\"QLoRA (Quantized LoRA)\",\"summary\":\"QLoRA combines 4-bit quantization of the frozen base model with LoRA adapters trained in higher precision. This makes fine-tuning very large models feasible on modest hardware because the base weights stay compressed while only the small adapter parameters receive gradient updates.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"optimization\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"low-rank-adaptation-lora\",\"quantization\"],\"related\":[\"post-training-quantization-ptq\",\"memory-optimization-ml-training\",\"lora-adapter\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"base-model\",\"title\":\"Base Model\",\"summary\":\"A base model is the pretrained model before instruction tuning, chat alignment, or task-specific fine-tuning. It is usually optimized only for language modeling, so it can complete text well but may not reliably follow user instructions or safety constraints.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"pretraining\"],\"related\":[\"foundation-model\",\"open-weight-model\",\"chat-language-model\",\"supervised-fine-tuning-sft\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"open-weight-model\",\"title\":\"Open-Weight Model\",\"summary\":\"An open-weight model is a model whose trained weights are publicly released for download and local use. That is more specific than 'open source': the weights may be open even when the training data, code, or full recipe are not.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"product\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"base-model\"],\"related\":[\"foundation-model\",\"large-language-model-llm\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sampling-in-language-models\",\"title\":\"Sampling (in Language Models)\",\"summary\":\"Sampling in language models means selecting the next token from the predicted probability distribution instead of always taking the argmax. The decoding rule strongly shapes diversity, coherence, and repetition, which is why temperature, top-k, and top-p matter so much.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"autoregressive-language-model\",\"discrete-probability-distribution\"],\"related\":[\"greedy-decoding\",\"top-k-sampling\",\"top-p-sampling-nucleus-sampling\",\"softmax-temperature\",\"beam-search\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"greedy-decoding\",\"title\":\"Greedy Decoding\",\"summary\":\"Greedy decoding always selects the highest-probability next token at each step. It is simple and deterministic, but it often gets trapped in bland or repetitive continuations because it never explores slightly less probable alternatives that might lead to better sequences.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"sampling-in-language-models\"],\"related\":[\"beam-search\",\"top-k-sampling\",\"top-p-sampling-nucleus-sampling\",\"softmax-temperature\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"top-k-sampling\",\"title\":\"Top-k Sampling\",\"summary\":\"Top-k sampling truncates the next-token distribution to the \\\\( k \\\\) most probable tokens, renormalizes, and samples from that set. It removes the low-probability tail that often contains junk while still allowing controlled randomness.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sampling-in-language-models\"],\"related\":[\"top-p-sampling-nucleus-sampling\",\"greedy-decoding\",\"softmax-temperature\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"top-p-sampling-nucleus-sampling\",\"title\":\"Top-p Sampling (Nucleus Sampling)\",\"summary\":\"Top-p, or nucleus, sampling chooses the smallest set of tokens whose cumulative probability exceeds a threshold \\\\( p \\\\), then samples from that adaptive set. Unlike top-k, it expands when the model is uncertain and shrinks when the distribution is sharp.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sampling-in-language-models\"],\"related\":[\"top-k-sampling\",\"softmax-temperature\",\"greedy-decoding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"frequency-penalty\",\"title\":\"Frequency Penalty\",\"summary\":\"A frequency penalty subtracts an amount proportional to how many times a token has already appeared, lowering its future logit more with each repetition. It encourages lexical diversity without banning reuse entirely, which makes it gentler than hard repetition constraints.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sampling-in-language-models\",\"logit\"],\"related\":[\"presence-penalty\",\"repetition-penalty\",\"top-p-sampling-nucleus-sampling\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"presence-penalty\",\"title\":\"Presence Penalty\",\"summary\":\"A presence penalty lowers the score of any token that has already appeared, encouraging the model to introduce new words or topics instead of repeating earlier ones. Unlike a frequency penalty, it depends only on whether the token has appeared at least once, not on how many times it appeared.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sampling-in-language-models\",\"logit\"],\"related\":[\"frequency-penalty\",\"repetition-penalty\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hallucination\",\"title\":\"Hallucination\",\"summary\":\"Hallucination is when a model produces content that is unsupported or false while presenting it as if it were correct. In language models it often comes from next-token training, weak grounding, or overconfident decoding rather than deliberate deception.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"large-language-model-llm\"],\"related\":[\"grounding\",\"faithfulness\",\"factuality\",\"retrieval-augmented-generation-rag\",\"misalignment\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"misalignment\",\"title\":\"Misalignment\",\"summary\":\"Misalignment is the failure mode where optimizing a model for its training objective or proxy reward does not produce the behavior humans actually want. It includes problems like reward hacking, unsafe shortcuts, and goal pursuit that diverges from the intended specification.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"alignment-ai\"],\"related\":[\"ai-safety\",\"bias-fairness\",\"reward-model\",\"reinforcement-learning-from-human-feedback-rlhf\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bias-fairness\",\"title\":\"Bias (Fairness)\",\"summary\":\"In fairness contexts, bias means systematic differences in treatment or error rates across groups caused by data, labels, measurement, or deployment choices. Fairness asks which notion of equal treatment matters, and different fairness criteria often cannot all be satisfied at once.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"bias-mitigation\",\"explainability\",\"ai-safety\",\"misalignment\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"explainability\",\"title\":\"Explainability\",\"summary\":\"Explainability is the ability to give a human-understandable reason for a model’s prediction or behavior using features, examples, rules, or mechanisms. A good explanation should be useful to a person and, ideally, faithful to what the model actually used.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"interpretability\",\"mechanistic-interpretability\",\"bias-fairness\",\"transparency-ai-systems\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"retrieval-augmented-generation-rag\",\"title\":\"Retrieval-Augmented Generation (RAG)\",\"summary\":\"Retrieval-augmented generation adds a retrieval step so the model conditions on external documents at inference time instead of relying only on memorized parameters. It can improve freshness and grounding, but answer quality depends heavily on retrieval recall, ranking, chunking, and how well the model uses the retrieved evidence.\",\"domain\":\"deep-learning\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"large-language-model-llm\",\"information-retrieval\"],\"related\":[\"semantic-search\",\"vector-database\",\"dense-retrieval\",\"grounding\",\"hallucination\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"semantic-search\",\"title\":\"Semantic Search\",\"summary\":\"Semantic search retrieves results by meaning rather than exact keyword overlap, usually by embedding queries and documents into a vector space and comparing similarity. It handles paraphrases well, but it is often combined with lexical search when exact terms or identifiers matter.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"information-retrieval\",\"embedding-vector\"],\"related\":[\"vector-database\",\"dense-retrieval\",\"cosine-similarity\",\"nearest-neighbor-search\",\"retrieval-augmented-generation-rag\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"sparse-mixture-of-experts-moe-layer\",\"title\":\"Sparse Mixture-of-Experts (MoE) Layer\",\"summary\":\"A sparse mixture-of-experts layer replaces one dense feed-forward block with many expert subnetworks, but routes each token to only a small subset such as top-1 or top-2 experts. This increases parameter count and specialization without increasing per-token compute proportionally.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sparsely-gated-mixture-of-experts-moe\"],\"related\":[\"router-network\",\"expert-network\",\"top-k-routing\",\"switch-transformer\",\"load-balancing-moe\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"router-network\",\"title\":\"Router Network\",\"summary\":\"A router network scores experts or computation paths for each token and decides where that token should be sent in a conditional-compute model such as an MoE. A good router improves specialization while avoiding collapsed routing, overload, and excessive communication.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\"],\"related\":[\"expert-network\",\"top-k-routing\",\"load-balancing-moe\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"expert-network\",\"title\":\"Expert Network\",\"summary\":\"An expert network is one of the specialized submodules inside an MoE layer that processes only the tokens routed to it. Experts usually share the same architecture but learn different functions, so specialization emerges from routing plus load-balancing constraints.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\"],\"related\":[\"router-network\",\"top-k-routing\",\"position-wise-mlp\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"top-k-routing\",\"title\":\"Top-k Routing\",\"summary\":\"Top-k routing sends each token only to the k highest-scoring experts instead of to every expert. This makes MoE computation sparse and efficient, but the choice of k trades off compute cost, robustness, and routing stability.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"router-network\"],\"related\":[\"expert-network\",\"switch-transformer\",\"load-balancing-moe\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"load-balancing-moe\",\"title\":\"Load Balancing (MoE)\",\"summary\":\"Load balancing in MoE training adds losses or routing constraints so tokens are spread across experts instead of collapsing onto a few popular ones. It matters because uneven routing wastes capacity, creates bottlenecks, and leaves underused experts poorly trained.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\"],\"related\":[\"router-network\",\"top-k-routing\",\"switch-transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"switch-transformer\",\"title\":\"Switch Transformer\",\"summary\":\"Switch Transformer is a simplified MoE Transformer that routes each token to exactly one expert in each sparse feed-forward layer. Top-1 routing reduces communication and implementation complexity, enabling very large sparse models, but makes router stability and load balancing especially important.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"attention\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"sparse-mixture-of-experts-moe-layer\",\"top-k-routing\"],\"related\":[\"load-balancing-moe\",\"sparsely-gated-mixture-of-experts-moe\",\"transformer\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-merging\",\"title\":\"Model Merging\",\"summary\":\"Model merging combines the weights or weight deltas of separately fine-tuned models into one model without full retraining. It can create multitask behavior cheaply, but naive averaging often causes interference unless the merged models share a common base and compatible parameter geometry.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"finetuning\"],\"related\":[\"model-soups\",\"task-vector\",\"ties-merging\",\"dare-drop-and-rescale\",\"slerp-spherical-linear-interpolation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-soups\",\"title\":\"Model Soups\",\"summary\":\"Model soups average the weights of multiple fine-tuned models that lie in the same low-loss basin, often improving accuracy and robustness without extra inference cost. Unlike an ensemble, a soup is still a single model at serving time.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-merging\"],\"related\":[\"slerp-spherical-linear-interpolation\",\"task-vector\",\"ties-merging\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"slerp-spherical-linear-interpolation\",\"title\":\"SLERP (Spherical Linear Interpolation)\",\"summary\":\"SLERP interpolates between two parameter vectors along the great-circle path on a sphere instead of using straight-line interpolation. In model merging it can preserve vector norms and sometimes produce smoother blends than linear interpolation when the two directions differ strongly.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-merging\"],\"related\":[\"model-soups\",\"ties-merging\",\"task-vector\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ties-merging\",\"title\":\"TIES-Merging\",\"summary\":\"TIES-Merging is a model-merging method that reduces interference by trimming small parameter changes, resolving sign conflicts, and merging only updates aligned with an agreed sign. It is designed for cases where separately fine-tuned models disagree on which weights should move and in what direction.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-merging\",\"task-vector\"],\"related\":[\"dare-drop-and-rescale\",\"model-soups\",\"slerp-spherical-linear-interpolation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"dare-drop-and-rescale\",\"title\":\"DARE (Drop And REscale)\",\"summary\":\"DARE sparsifies fine-tuning deltas by randomly dropping many update entries and rescaling the rest, preserving most behavior while greatly reducing storage and merge interference. It is commonly used as a preprocessing step for delta compression or model merging rather than as a standalone training method.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-merging\",\"task-vector\"],\"related\":[\"ties-merging\",\"model-soups\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"task-vector\",\"title\":\"Task Vector\",\"summary\":\"A task vector is the weight difference between a pre-trained model and the same model after fine-tuning on a task. Adding, subtracting, or scaling that vector can steer behavior, so task vectors provide a simple weight-space tool for editing or combining capabilities.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"optimization\",\"theory\",\"wiki-import\",\"path-core-foundations\"],\"prerequisites\":[\"finetuning\"],\"related\":[\"model-merging\",\"ties-merging\",\"dare-drop-and-rescale\",\"low-rank-adaptation-lora\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-compression\",\"title\":\"Model Compression\",\"summary\":\"Model compression reduces a model’s memory, latency, or energy cost while trying to preserve performance. Common compression methods include distillation, pruning, quantization, low-rank factorization, and architecture redesign.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[],\"related\":[\"quantization\",\"pruning\",\"knowledge-distillation\",\"model-merging\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"knowledge-distillation\",\"title\":\"Knowledge Distillation\",\"summary\":\"Knowledge distillation trains a smaller student model to match the outputs or internal representations of a larger teacher. It transfers some of the teacher’s behavior into a cheaper model, often using soft targets that contain more information than hard labels alone.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-compression\",\"cross-entropy\"],\"related\":[\"pruning\",\"quantization\",\"softmax-temperature\",\"transfer-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pruning\",\"title\":\"Pruning\",\"summary\":\"Pruning removes weights, neurons, heads, or entire blocks that contribute little to performance. It can reduce model size or compute, but aggressive pruning usually needs fine-tuning to recover lost accuracy.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-compression\"],\"related\":[\"structured-pruning\",\"unstructured-pruning\",\"knowledge-distillation\",\"quantization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"structured-pruning\",\"title\":\"Structured Pruning\",\"summary\":\"Structured pruning removes whole channels, heads, layers, or blocks, producing regular sparsity that hardware can exploit directly. It usually yields better real-world speedups than unstructured pruning, though it gives less fine-grained control.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pruning\"],\"related\":[\"unstructured-pruning\",\"model-compression\",\"knowledge-distillation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"unstructured-pruning\",\"title\":\"Unstructured Pruning\",\"summary\":\"Unstructured pruning zeros individual weights wherever they appear unimportant, creating irregular sparsity patterns. It can achieve high compression ratios, but specialized kernels are often needed to turn that sparsity into real latency gains.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pruning\"],\"related\":[\"structured-pruning\",\"sparsity\",\"model-compression\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"quantization\",\"title\":\"Quantization\",\"summary\":\"Quantization stores or computes with lower-precision numbers, such as INT8 or 4-bit values, instead of full-precision floats. It reduces memory bandwidth and can speed inference, but accuracy depends on how well the lower-precision representation preserves weights and activations.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-architectures\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-compression\"],\"related\":[\"post-training-quantization-ptq\",\"quantization-aware-training-qat\",\"qlora-quantized-lora\",\"mixed-precision-training\",\"inference-optimization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"post-training-quantization-ptq\",\"title\":\"Post-Training Quantization (PTQ)\",\"summary\":\"Post-training quantization converts a trained model to lower precision after optimization is finished, usually using a calibration set to estimate activation ranges. It is easy and cheap to apply, but accuracy can drop more than with quantization-aware training at very low bit widths.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"quantization\"],\"related\":[\"quantization-aware-training-qat\",\"qlora-quantized-lora\",\"inference-optimization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"quantization-aware-training-qat\",\"title\":\"Quantization-Aware Training (QAT)\",\"summary\":\"Quantization-aware training simulates low-precision arithmetic during training so the model learns weights that remain accurate after quantization. It usually outperforms post-training quantization at low bit widths, but it adds training cost and implementation complexity.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"quantization\"],\"related\":[\"post-training-quantization-ptq\",\"mixed-precision-training\",\"knowledge-distillation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"preference-based-alignment\",\"title\":\"Preference-Based Alignment\",\"summary\":\"Preference-based alignment trains models from judgments such as ‘response A is better than response B’ instead of only from supervised targets. It is useful when desired behavior is easier for humans to compare than to specify as a single correct answer.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"finetuning\",\"pairwise-comparison\"],\"related\":[\"reinforcement-learning-from-human-feedback-rlhf\",\"direct-preference-optimization-dpo\",\"reward-model\",\"bradley-terry-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reinforcement-learning-from-human-feedback-rlhf\",\"title\":\"Reinforcement Learning from Human Feedback (RLHF)\",\"summary\":\"RLHF aligns a model by collecting human preference data, training a reward model on those comparisons, and then optimizing the policy to maximize reward while staying close to a reference model. It improved helpfulness and instruction following, but it can also create reward hacking and training instability.\",\"domain\":\"history\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"preference-based-alignment\",\"proximal-policy-optimization-ppo\"],\"related\":[\"reward-model\",\"kl-divergence-penalty-in-rlhf\",\"direct-preference-optimization-dpo\",\"constitutional-ai\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"reward-model\",\"title\":\"Reward Model\",\"summary\":\"A reward model predicts a scalar preference score for a candidate response, usually from pairwise human comparisons. In RLHF it acts as a learned proxy objective, so the policy can exploit its mistakes if optimization pushes too hard against it.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"preference-dataset\",\"bradley-terry-model\"],\"related\":[\"reinforcement-learning-from-human-feedback-rlhf\",\"direct-preference-optimization-dpo\",\"reward-signal\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"self-critique\",\"title\":\"Self-Critique\",\"summary\":\"Self-critique is a prompting or training pattern where a model reviews its own draft, identifies problems, and then revises the answer. It can improve reasoning and safety, but only when the model can recognize errors more reliably than it makes them.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"chat-language-model\"],\"related\":[\"constitutional-ai\",\"chain-of-thought\",\"prompt-engineering\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"constitutional-ai\",\"title\":\"Constitutional AI\",\"summary\":\"Constitutional AI aligns a model using an explicit list of principles that guide critique and revision, reducing the need for dense human feedback on every example. The constitution acts like a rule set for self-improvement, though the resulting behavior still depends on the chosen principles and training procedure.\",\"domain\":\"history\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"reinforcement-learning-from-human-feedback-rlhf\",\"safety-alignment\"],\"related\":[\"self-critique\",\"chain-of-thought-monitorability\",\"constitutional-classifiers-plus-plus\",\"alignment-ai\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"direct-preference-optimization-dpo\",\"title\":\"Direct Preference Optimization (DPO)\",\"summary\":\"DPO learns directly from preference pairs by making chosen responses more likely than rejected ones without running a separate RL loop. It can be derived from a KL-constrained reward-maximization view, which is why it is often presented as a simpler alternative to PPO-based RLHF.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"preference-based-alignment\",\"bradley-terry-model\"],\"related\":[\"reinforcement-learning-from-human-feedback-rlhf\",\"reward-model\",\"preference-dataset\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bradley-terry-model\",\"title\":\"Bradley-Terry Model\",\"summary\":\"The Bradley-Terry model turns pairwise comparisons into latent scores by assuming the probability that item A beats item B depends on their score difference. It is widely used for preference modeling, ranking, and reward-model training from pairwise judgments.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"pairwise-comparison\",\"maximum-likelihood-estimate-mle\"],\"related\":[\"elo-rating\",\"reward-model\",\"direct-preference-optimization-dpo\",\"reinforcement-learning-from-human-feedback-rlhf\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pairwise-comparison\",\"title\":\"Pairwise Comparison\",\"summary\":\"A pairwise comparison asks which of two items is better instead of assigning each item an absolute score. These judgments are often easier and more consistent for humans, which is why they are common in ranking, Elo-style systems, and alignment datasets.\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[],\"related\":[\"bradley-terry-model\",\"pairwise-ranking\",\"elo-rating\",\"reward-model\",\"preference-based-alignment\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"ranking\",\"title\":\"Ranking\",\"summary\":\"Ranking is the task of ordering items by relevance, preference, or utility rather than predicting a single class label. It appears in search, recommendation, and alignment because the main question is which outputs should be placed above others.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"pairwise-ranking\",\"pairwise-comparison\",\"elo-rating\",\"information-retrieval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"elo-rating\",\"title\":\"Elo Rating\",\"summary\":\"Elo rating estimates skill from pairwise wins and losses by updating each participant’s score based on expected versus actual outcomes. It was designed for chess, but the same logic is used to aggregate model preferences and benchmark head-to-head evaluations.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"pairwise-comparison\"],\"related\":[\"pairwise-ranking\",\"bradley-terry-model\",\"human-evaluation\",\"ranking\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pairwise-ranking\",\"title\":\"Pairwise Ranking\",\"summary\":\"Pairwise ranking learns an ordering from relative preferences between pairs rather than from absolute target values. Many ranking losses optimize the probability that preferred items score above rejected ones, which fits search and alignment data naturally.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"pairwise-comparison\"],\"related\":[\"elo-rating\",\"ranking\",\"bradley-terry-model\",\"bootstrap-resampling\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bootstrap-resampling\",\"title\":\"Bootstrap Resampling\",\"summary\":\"Bootstrap resampling estimates uncertainty by repeatedly sampling with replacement from an observed dataset and recomputing a statistic on each resample. It is useful when analytic uncertainty formulas are hard to derive, though it assumes the sample is reasonably representative.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"confidence-interval\",\"bootstrap-aggregating-bagging\",\"random-forest\",\"pairwise-ranking\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"confidence-interval\",\"title\":\"Confidence Interval\",\"summary\":\"A confidence interval is a range produced by a procedure that would contain the true parameter a fixed fraction of the time over repeated samples, such as 95%. It quantifies estimation uncertainty, but it is not the probability that the parameter lies in this particular realized interval.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"theory\",\"wiki-import\",\"path-architectures\"],\"prerequisites\":[\"probability-distribution\"],\"related\":[\"bootstrap-resampling\",\"a-b-testing-ml-systems\",\"accuracy\",\"pac-learning-probably-approximately-correct\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vision-language-model-vlm\",\"title\":\"Vision Language Model (VLM)\",\"summary\":\"A vision-language model jointly processes images and text so it can describe, answer questions about, or reason across both modalities. Most VLMs combine a vision encoder with a language model through projection layers, cross-attention, or joint multimodal pretraining.\",\"domain\":\"llm\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"architecture\",\"cv\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-vision\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"vision-encoder\",\"large-language-model-llm\"],\"related\":[\"clip-contrastive-language-image-pre-training\",\"cross-attention\",\"multimodal-secure-alignment\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cross-attention\",\"title\":\"Cross-Attention\",\"summary\":\"Cross-attention lets one sequence or modality attend to representations produced by another sequence or modality. In encoder-decoder models the decoder queries encoder states, and in multimodal models text tokens often query visual features the same way.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"attention\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\",\"query-key-value-qkv\"],\"related\":[\"encoder-decoder-architecture\",\"sequence-to-sequence-seq2seq\",\"vision-language-model-vlm\",\"attention-mechanism\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"vision-encoder\",\"title\":\"Vision Encoder\",\"summary\":\"A vision encoder maps an image into features or tokens that downstream modules can use for classification, retrieval, or generation. CNNs and Vision Transformers are common vision encoders, differing mainly in how they represent spatial structure.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"cv\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-vision\",\"path-transformer-llm\"],\"prerequisites\":[\"convolutional-neural-network-cnn\"],\"related\":[\"clip-contrastive-language-image-pre-training\",\"vision-language-model-vlm\",\"imagenet-dataset\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"clip-contrastive-language-image-pre-training\",\"title\":\"CLIP (Contrastive Language-Image Pre-training)\",\"summary\":\"CLIP learns a shared embedding space for images and text by pulling matched image-caption pairs together and pushing mismatched pairs apart. This contrastive objective enables zero-shot classification by comparing an image embedding against text prompts for candidate labels.\",\"domain\":\"history\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"cv\",\"intermediate\",\"landmark\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-vision\",\"path-transformer-llm\"],\"prerequisites\":[\"vision-encoder\",\"triplet-margin-loss\"],\"related\":[\"vision-language-model-vlm\",\"word-embedding\",\"zero-shot-learning\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"program-aided-language-model\",\"title\":\"Program-Aided Language Model\",\"summary\":\"A program-aided language model uses the LLM to translate a problem into executable code, then lets an interpreter carry out the exact computation. This separates natural-language understanding from symbolic execution and often improves arithmetic or algorithmic reasoning over pure chain-of-thought.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"nlp\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"chain-of-thought\"],\"related\":[\"react-reason-act\",\"function-calling\",\"tree-of-thought\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"flashattention\",\"title\":\"FlashAttention\",\"summary\":\"FlashAttention is an exact attention algorithm that uses tiling and kernel fusion to minimize reads and writes between GPU HBM and on-chip SRAM. It preserves standard attention outputs while greatly reducing memory traffic, which yields large speed and memory gains on long sequences.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"self-attention\",\"multi-head-attention\"],\"related\":[\"pagedattention\",\"mixed-precision-training\",\"gpu-acceleration\",\"gradient-checkpointing-activation-recomputation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"data-parallelism\",\"title\":\"Data Parallelism\",\"summary\":\"Data parallelism replicates the model on multiple devices and splits each batch across them, synchronizing gradients after each step. It is the simplest way to scale training throughput, but every device still stores the full model unless sharding is added.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"distributed-computing-ml-training\"],\"related\":[\"model-parallelism\",\"fully-sharded-data-parallel-fsdp\",\"gradient-descent\",\"mixed-precision-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-parallelism\",\"title\":\"Model Parallelism\",\"summary\":\"Model parallelism splits one model across multiple devices because it is too large or compute-heavy for a single device. The split can happen by layers, tensors, experts, or sequence chunks, trading memory savings for extra communication.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"distributed-computing-ml-training\"],\"related\":[\"data-parallelism\",\"pipeline-parallelism\",\"tensor-parallelism\",\"model-sharding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"pipeline-parallelism\",\"title\":\"Pipeline Parallelism\",\"summary\":\"Pipeline parallelism partitions a model by layers across devices and sends microbatches through the partitions like an assembly line. It reduces per-device memory, but pipeline bubbles and stage imbalance can waste throughput if the schedule is poorly tuned.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-parallelism\"],\"related\":[\"tensor-parallelism\",\"data-parallelism\",\"fully-sharded-data-parallel-fsdp\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"tensor-parallelism\",\"title\":\"Tensor Parallelism\",\"summary\":\"Tensor parallelism shards individual large matrix operations across devices, such as splitting weight matrices by rows or columns. It is effective for very large Transformers, but the frequent collectives mean fast interconnects are important.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"model-parallelism\"],\"related\":[\"pipeline-parallelism\",\"context-parallelism\",\"fully-sharded-data-parallel-fsdp\",\"model-sharding\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"context-parallelism\",\"title\":\"Context Parallelism\",\"summary\":\"Context parallelism distributes a long sequence across devices so context tokens and their attention-related work are sharded instead of fully replicated. It helps long-context training or inference scale beyond one device, but requires extra communication to preserve exact attention across chunks.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"attention\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"tensor-parallelism\",\"self-attention\"],\"related\":[\"flashattention\",\"long-context-pretraining\",\"pipeline-parallelism\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"fully-sharded-data-parallel-fsdp\",\"title\":\"Fully Sharded Data Parallel (FSDP)\",\"summary\":\"Fully Sharded Data Parallel shards model parameters, gradients, and optimizer states across data-parallel workers, gathering full parameters only when needed for computation. It is the PyTorch analogue of ZeRO-style training and makes much larger models fit without custom model-parallel code.\",\"domain\":\"deep-learning\",\"level\":\"advanced\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\",\"path-core-foundations\",\"path-scaling-advanced\"],\"prerequisites\":[\"data-parallelism\",\"model-sharding\"],\"related\":[\"zero-zero-redundancy-optimizer\",\"tensor-parallelism\",\"mixed-precision-training\",\"memory-optimization-ml-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"model-sharding\",\"title\":\"Model Sharding\",\"summary\":\"Model sharding splits a model’s parameters across devices or storage tiers instead of keeping a full copy everywhere. It is a general systems technique used in tensor parallelism, FSDP, offloading, and large-model serving to reduce per-device memory requirements.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"distributed-computing-ml-training\"],\"related\":[\"fully-sharded-data-parallel-fsdp\",\"model-parallelism\",\"memory-optimization-ml-training\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"floating-point-operations-flops\",\"title\":\"Floating-Point Operations (FLOPs)\",\"summary\":\"FLOPs count the number of floating-point arithmetic operations required by a model or workload. They are a useful compute proxy for comparing training or inference cost, though real speed also depends on memory traffic, parallelism, and hardware utilization.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"scaling-laws\",\"gpu-acceleration\",\"mixed-precision-training\",\"inference-optimization\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"mixed-precision-training\",\"title\":\"Mixed Precision Training\",\"summary\":\"Mixed-precision training performs most computation in lower precision such as FP16 or bfloat16 while keeping selected quantities in higher precision for stability. It reduces memory use and often increases throughput without much accuracy loss when implemented carefully.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"implementation\",\"intermediate\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"backpropagation\"],\"related\":[\"gradient-clipping\",\"log-sum-exp-trick\",\"gpu-acceleration\",\"floating-point-operations-flops\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"long-context-pretraining\",\"title\":\"Long-Context Pretraining\",\"summary\":\"Long-context pretraining trains or continues training a model on examples with much longer sequences so it learns to use distant context instead of only fitting short windows. It is usually needed because simply changing positional scaling or the context limit does not teach robust long-range retrieval or reasoning.\",\"domain\":\"deep-learning\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"advanced\",\"implementation\",\"ml\",\"transformer\",\"wiki-import\",\"path-transformer-llm\",\"path-scaling-advanced\"],\"prerequisites\":[\"pretraining\",\"context-window\"],\"related\":[\"needle-in-a-haystack\",\"rotary-positional-embedding-rope\",\"scaling-laws\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"needle-in-a-haystack\",\"title\":\"Needle in a Haystack\",\"summary\":\"Needle in a Haystack is a long-context benchmark that tests whether a model can retrieve a small target fact embedded inside a large distractor context. It is useful for measuring position-sensitive retrieval, but strong needle scores do not guarantee broader long-document reasoning.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"product\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"context-window\"],\"related\":[\"long-context-pretraining\",\"benchmark-ml-evaluation\",\"rotary-positional-embedding-rope\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"positional-encoding\",\"title\":\"Positional Encoding\",\"summary\":\"Positional encoding injects token order information into architectures like Transformers whose attention is otherwise permutation-invariant. It can be absolute or relative, and the choice strongly affects extrapolation, long-context behavior, and inductive bias.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"self-attention\"],\"related\":[\"absolute-position-encoding\",\"relative-position-encoding\",\"sinusoidal-positional-encoding\",\"rotary-positional-embedding-rope\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"absolute-position-encoding\",\"title\":\"Absolute Position Encoding\",\"summary\":\"Absolute position encoding assigns e
