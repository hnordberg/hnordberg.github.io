 is trained with Cross-Entropy Loss to predict the very next token:\u003c/p\u003e\n  \\[ P(w_{1:T}) = \\prod_{t=1}^T P(w_t \\mid w_1, w_2, \\dots, w_{t-1}; \\theta) \\]\n\n  \u003ctable style=\"border-collapse:collapse; width:100%; margin:12px 0;\"\u003e\n    \u003ctbody\u003e\u003ctr style=\"background:#4a5568; color:#fff;\"\u003e\n      \u003cth style=\"padding:6px; text-align:left;\"\u003eArchitecture Timeline\u003c/th\u003e\n      \u003cth style=\"padding:6px; text-align:left;\"\u003eContext Mechanism\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr style=\"border-bottom:1px solid #ccc;\"\u003e\n      \u003ctd style=\"padding:6px;\"\u003e\u003cb\u003eFeedforward NN (2003)\u003c/b\u003e\u003c/td\u003e\n      \u003ctd style=\"padding:6px;\"\u003eFixed-width sliding window. Context \\( n \\) is hardcoded.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr style=\"border-bottom:1px solid #ccc;\"\u003e\n      \u003ctd style=\"padding:6px;\"\u003e\u003cb\u003eRNN / LSTM (2010-2015)\u003c/b\u003e\u003c/td\u003e\n      \u003ctd style=\"padding:6px;\"\u003eHidden state recurrently carried forward. Theoretically infinite context, but gradients vanish.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n      \u003ctd style=\"padding:6px;\"\u003e\u003cb\u003eTransformer (2017+)\u003c/b\u003e\u003c/td\u003e\n      \u003ctd style=\"padding:6px;\"\u003eSelf-attention directly queries any historical token without sequential decay. Massive parallelization.\u003c/td\u003e\n    \u003c/tr\u003e\n  \u003c/tbody\u003e\u003c/table\u003e"])</script><script>self.__next_f.push([1,"6:[\"$\",\"main\",null,{\"className\":\"wiki-main wiki-main--wide\",\"children\":[\"$\",\"$8\",null,{\"fallback\":[\"$\",\"div\",null,{\"style\":{\"padding\":\"2rem\",\"textAlign\":\"center\"},\"children\":\"Loading topic...\"}],\"children\":[\"$\",\"$L11\",null,{\"topic\":{\"slug\":\"neural-language-model\",\"title\":\"Neural Language Model\",\"summary\":\"An autoregressive model that estimates the proba n vanilla SGD, L2 regularization is mathematically equivalent to weight decay.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"regularization\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"regularization\",\"l1-vs-l2-norms\"],\"related\":[\"l1-regularization-lasso\",\"weight-decay\",\"linear-regression\",\"adamw-optimizer\",\"maximum-a-posteriori-map-estimation\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"early-stopping\",\"title\":\"Early stopping\",\"summary\":\"Early stopping halts training when validation performance stops improving, using the model weights from the best-performing epoch. It is one of the simplest and most effective regularization techniques in deep learning.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"regularization\",\"wiki-import\"],\"prerequisites\":[\"overfitting\",\"epoch\"],\"related\":[\"regularization\",\"dropout\",\"hyperparameter\",\"bias-variance-tradeoff\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"hyperparameter\",\"title\":\"Hyperparameter\",\"summary\":\"A hyperparameter is a configuration value set before training begins that governs the learning process or model architecture, as opposed to model parameters (weights, biases) which are learned from data via optimization.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"optimization\",\"wiki-import\"],\"prerequisites\":[],\"related\":[\"learning-rate\",\"early-stopping\",\"epoch\",\"learning-rate-schedule\",\"data-leakage\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"data-leakage\",\"title\":\"Data leakage\",\"summary\":\"Data leakage occurs when information from outside the training set — typically from th isites\":[\"recurrent-neural-network-rnn\"],\"related\":[\"long-short-term-memory-lstm\",\"xlstm\",\"backpropagation-through-time-bptt\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"embedding-layer\",\"title\":\"Embedding layer\",\"summary\":\"A learnable lookup table that maps discrete categorical inputs (such as token IDs) to dense, continuous vector representations of fixed dimensionality, serving as the interface between symbolic input and neural computation.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"architecture\",\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-architectures\",\"path-transformer-llm\"],\"prerequisites\":[\"one-hot-encoding\",\"vocabulary\"],\"related\":[\"embedding-vector\",\"word-embedding\",\"token-id\",\"representation-learning\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"embedding-vector\",\"title\":\"Embedding vector\",\"summary\":\"A dense, low-dimensional, continuous vector representing a discrete entity (word, token, item, or node) in a learned latent space where geometric proximity encodes semantic or functional similarity.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"dense-vector\"],\"related\":[\"embedding-space\",\"word-embedding\",\"embedding-layer\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"word-embedding\",\"title\":\"Word embedding\",\"summary\":\"A mapping from words in a vocabulary to dense, real-valued vectors in a continuous space, where distances and directions encode linguistic relationships such as synonymy, analogy, and syntactic role.\",\"domain\":\"history\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"embedding-vector\"],\"related\":[\"word2vec\",\"glove-word-embeddings\",\"fasttext\",\"semantic-similarity\",\"neural-probabilistic-language-model\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"word2vec\",\"title\":\"Word2Vec\",\"summary\":\"A family of shallow neural network models that learn word embeddings by predicting either a target word from its context (CBOW) or the context from a target word (Skip-gram), trained efficiently on billions of words using negative sampli…\",\"domain\":\"history\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"landmark\",\"ml\",\"nlp\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"word-embedding\",\"neural-network\"],\"related\":[\"skip-gram\",\"fasttext\",\"glove-word-embeddings\",\"semantic-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"skip-gram\",\"title\":\"Skip-gram\",\"summary\":\"A Word2Vec training objective that learns word embeddings by predicting surrounding context words given a center word, inverting the typical language modeling direction and producing high-quality representations especially for rare words.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"word2vec\"],\"related\":[\"fasttext\",\"word-embedding\",\"cosine-similarity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"fasttext\",\"title\":\"FastText\",\"summary\":\"An extension of Word2Vec's Skip-gram that represents each word as a bag of character n-grams, enabling meaningful embeddings for out-of-vocabulary words and morphologically rich languages.\",\"domain\":\"llm\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"intermediate\",\"ml\",\"nlp\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"word2vec\",\"subword\"],\"related\":[\"skip-gram\",\"word-embedding\",\"glove-word-embeddings\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"semantic-similarity\",\"title\":\"Semantic similarity\",\"summary\":\"A measure of how closely two linguistic units (words, sentences, or documents) relate in meaning, typically quantified by distance or angle in an embedding space using metrics such as cosine similarity.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"embedding-vector\"],\"related\":[\"cosine-similarity\",\"word-embedding\",\"semantic-search\",\"semantic-space\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"cosine-similarity\",\"title\":\"Cosine similarity\",\"summary\":\"A similarity metric that measures the cosine of the angle between two vectors, capturing directional alignment independently of magnitude. It is the standard metric for comparing embeddings in NLP and information retrieval.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"dense-vector\"],\"related\":[\"semantic-similarity\",\"l1-vs-l2-norms\",\"embedding-space\",\"nearest-neighbor-search\",\"dense-retrieval\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"bag-of-words\",\"title\":\"Bag of words\",\"summary\":\"A text representation that discards word order and grammar, encoding a document solely as an unordered multiset of its word frequencies — the simplest and historically most influential document representation in NLP and information retri…\",\"domain\":\"foundations\",\"level\":\"basic\",\"type\":\"mixed\",\"t arning by Henrik Nordberg\"},{\"slug\":\"tokenization\",\"title\":\"Tokenization\",\"summary\":\"The process of segmenting raw text into discrete units (tokens) that serve as the atomic inputs to a language model. Tokenization determines the vocabulary, sequence length, and the model's ability to handle unseen words.\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[],\"related\":[\"token\",\"subword-tokenization\",\"byte-pair-encoding-bpe\",\"vocabulary\",\"tokenization-pipeline\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"token\",\"title\":\"Token\",\"summary\":\"The atomic unit of text processed by a language model — a discrete symbol from a fixed vocabulary, which may represent a word, subword, character, or byte. Tokens are the fundamental unit of cost, context, and generation in modern LLMs.\",\"domain\":\"llm\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"tokenization\"],\"related\":[\"subword\",\"token-id\",\"vocabulary\",\"special-tokens\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"subword\",\"title\":\"Subword\",\"summary\":\"A linguistic unit smaller than a word but larger than a character, used as the tokenization granularity in modern language models to balance vocabulary size against sequence length. Subword tokenization is universally adopted in Transfor…\",\"domain\":\"deep-learning\",\"level\":\"basic\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"implementation\",\"ml\",\"nlp\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"token\"],\"related\":[\"subword-tokenization\",\"byte-pair-encoding-bpe\",\"tokenization\",\"vocabulary\" ug\":\"negative-log-likelihood\",\"title\":\"Negative log-likelihood\",\"summary\":\"The negation of the log-likelihood, used as a loss function so that maximizing likelihood is recast as a minimization problem compatible with gradient descent — the dominant training objective across deep learning.\",\"domain\":\"llm\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"transformer\",\"wiki-import\",\"path-transformer-llm\"],\"prerequisites\":[\"log-likelihood\",\"maximum-likelihood-estimate-mle\"],\"related\":[\"cross-entropy\",\"binary-cross-entropy\",\"loss-function\",\"perplexity\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"maximum-likelihood-estimate-mle\",\"title\":\"Maximum likelihood estimate (MLE)\",\"summary\":\"A parameter estimation method that selects the parameter values under which the observed data is most probable, providing the theoretical foundation for most neural network training objectives.\",\"domain\":\"foundations\",\"level\":\"intermediate\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"optimization\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"probability-distribution\",\"log-likelihood\"],\"related\":[\"maximum-a-posteriori-map-estimation\",\"negative-log-likelihood\",\"ordinary-least-squares-ols-closed-form-solution\",\"laplace-smoothing\"],\"updatedAt\":\"2026-04-15\",\"sourceDeck\":\"Machine Learning by Henrik Nordberg\"},{\"slug\":\"laplace-smoothing\",\"title\":\"Laplace smoothing\",\"summary\":\"A simple smoothing technique that adds a small constant to every count in a probability estimate, ensuring no event has zero probability — the earliest and most intuitive form of Bayesian regularization for discrete distributions.\",\"domain\":\"foundations\",\"level\":\"intro\",\"type\":\"mixed\",\"tags\":[\"foundational\",\"ml\",\"nlp\",\"theory\",\"wiki-import\"],\"prerequisites\":[\"conditional-probability\",\"n-
